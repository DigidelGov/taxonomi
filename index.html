te exkluderande i sig men blir det i mötet med andra system. Problemet är att ingen har ansvar för helheten.\n\nMyndigheter och leverantörer fokuserar ofta på sin del i kedjan, men inte på hur den samverkar med andra eller vilka barriärer det skapar för den enskilde. Resultatet är styrningsluckor där ingen fullt ut ansvarar för delaktighet, tillgång eller alternativ. Den enskilde skickas vidare utan att någon äger övergången.\n\nI praktiken faller ansvaret för övergångarna på aktörer som aldrig fick det. DIK:s biblioteksrapport (2025) visar att var tredje folkbibliotekarie uppskattar att mer än hälften av arbetstiden går åt till samhällsservice som myndighetskontakter och blanketter. Folkbibliotek, folkbildning, civilsamhälle och gatubyråkrater fungerar som samhällslotsar utan formellt uppdrag, resurser eller löpande kompetensutveckling (se vidare 3.2 Bildningens förutsättningar).\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § kräver begriplig information, 7 § tillgänglighet och 8 § att myndigheter samverkar med varandra. Hälso- och sjukvårdslagen (2017:30) 13 kap. 8 § kräver individuell plan när den enskilde behöver insatser från både socialtjänsten och hälso- och sjukvården. Socialtjänstlagen (2025:400) 7 kap. 1–2 §§ kräver att kommunen planerar insatser och ingår samverkansöverenskommelser med regionen. Konsekvensutredningsförordningen (SFS 2024:183) 6–7 §§ kräver analys av kostnader och intäkter men inte av exkluderingseffekter eller tillgänglighetskonsekvenser. Statskontoret ansvarar för metodutveckling (15 §).\n\nEuropeiska digitala rättigheter och principer: Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a). Digitala offentliga tjänster ska vara sömlösa, säkra och interoperabla (artikel 7c). Omfattande tillgång till och vidareutnyttjande av information från den offentliga sektorn ska säkerställas (artikel 7b). Marknadsaktörer som drar nytta av den digitala omställningen ska bidra till kostnaderna för kollektiva nyttigheter och offentliga infrastrukturer (artikel 2c).\n\nPolitikområden: Förvaltningspolitik och socialpolitik.","2.1":"När digitala samhällsfunktioner förutsätter köpkraft blir tillgången villkorad av ekonomiska resurser.\n\nDigitala samhällsfunktioner förutsätter ofta att den enskilde har råd med utrustning, abonnemang, datatrafik och underhåll. Det allmänna kompenserar sällan för dessa kostnader. Ekonomisk utsatthet förvandlas till digital utestängning.\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för att motverka ekonomisk och social utsatthet. Socialtjänstlagen (2025:400) 12 kap. reglerar rätten till ekonomiskt bistånd för en skälig levnadsnivå.\n\nEuropeiska digitala rättigheter och principer: Alla i EU ska ha tillgång till konnektivitet till rimligt pris, inklusive personer med låga inkomster (artikel 3). Ingen ska lämnas utanför den digitala omställningen (artikel 2b).\n\nPolitikområden: Socialpolitik, fördelningspolitik.","2.2":"Digitala system som inte utformas för mänsklig mångfald förvandlar funktionsnedsättning till utestängning\n\nKognitiva, sensoriska, motoriska och psykosociala förutsättningar varierar i befolkningen. Det är känt, dokumenterat och rättsligt reglerat. Ändå utformas digitala samhällsfunktioner rutinmässigt utifrån en snäv uppsättning antaganden om hur människor ser, hör, tänker och rör sig. Exkluderingen uppstår inte hos personen utan i systemets designval.\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Diskrimineringslagen (2008:567) 1 kap. 4 § fastställer att bristande tillgänglighet kan utgöra diskriminering. FN:s funktionsrättskonvention kräver universell utformning. Lagen om tillgänglighet till digital offentlig service (2018:1937) ställer krav på att digital offentlig service ska vara möjlig att uppfatta, hantera, begripa och robust. Lagen om vissa produkters och tjänsters tillgänglighet (2023:254) ställer tillgänglighetskrav på ett brett spektrum av digitala produkter och tjänster på marknaden, med sanktionsavgifter vid bristande efterlevnad.\n\nEuropeiska digitala rättigheter och principer: Den digitala omställningen ska i synnerhet innefatta personer med funktionsnedsättning (artikel 2b). Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a).\n\nPolitikområden: Funktionsrättspolitik och socialpolitik.","2.3":"Den som lever i en beroendeposition – gentemot en institution, en vårdgivare eller en partner – är särskilt utsatt för att digital tillgång begränsas eller att digital teknik används som kontrollverktyg.\n\nDet allmänna har ansvar för att digitala system varken underlåter att säkerställa tillgång eller möjliggör kontroll.\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för alla människors frihet och värdighet. LSS (1993:387) 5–6 §§ fastställer rätten till självbestämmande, delaktighet och inflytande över insatsers utformning. Socialtjänstlagen (2025:400) 2 kap. 1 § fastställer att socialtjänsten ska främja jämlika levnadsvillkor och aktivt deltagande. CRPD artiklarna 14 (frihet och säkerhet), 19 (rätten att leva självständigt) och 22 (rätten till privatliv) ger konventionsgrund.\n\nEuropeiska digitala rättigheter och principer: Den digitala omställningen ska i synnerhet innefatta personer med funktionsnedsättning (artikel 2b). Alla har rätt till integritet och skydd av sina personuppgifter (artikel 17). Ingen ska utsättas för olaglig övervakning (artikel 18).\n\nPolitikområden: Funktionsrättspolitik, jämställdhetspolitik, socialpolitik, rättspolitik.","2.4":"Digitala samhällsfunktioner förutsätter stabilitet, kontinuitet och förmåga att agera i rätt tid. Livskriser bryter alla tre.\n\nSjukdom, sorg, separation, våld eller plötslig ekonomisk förändring påverkar förmågan att hantera komplexa system. Det är förutsägbart och väldokumenterat. Ändå saknar digitala samhällsfunktioner rutinmässigt anpassning för tillfälligt förändrade förutsättningar.\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § fastställer myndigheters skyldighet att hjälpa den enskilde att ta till vara sina intressen, 7 § kräver tillgänglighet. Socialtjänstlagen (2025:400) 2 kap. 4 § fastställer att socialtjänsten ska vara lätt tillgänglig.\n\nEuropeiska digitala rättigheter och principer: Ingen ska lämnas utanför den digitala omställningen, i synnerhet marginaliserade och utsatta människor (artikel 2b). Tekniska lösningar ska möjliggöra utövandet av grundläggande rättigheter (artikel 2a).\n\nPolitikområden: Socialpolitik och förvaltningspolitik.","2.5":"Barn och unga under 18 år saknar rättshandlingsförmåga och är beroende av vuxna som ombud i digitala system.\n\nDigitala samhällsfunktioner är utformade för myndiga individer med egen identitet, eget konto och egen beslutsrätt. Barn och unga faller strukturellt utanför detta antagande, inte på grund av bristande förmåga utan på grund av hur systemen är konstruerade. Det allmännas ansvar för barns rättigheter och välbefinnande kvarstår oavsett om fungerande vuxet ombud finns, och kvarstår även när barn befinner sig i situationer där sådant ombud saknas eller är den som utgör hotet.\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för barns uppväxtvillkor. Förvaltningslagen (2017:900) 6 § reglerar parts rättsliga handlingsförmåga. Socialtjänstlagen (2025:400) 18 kap. 1–7 §§ fastställer socialnämndens ansvar för barns uppväxtförhållanden. Patientlagen (2014:821) 3 kap. skapar ett otydligt gränsland för barn 13–18 år. Barnkonventionen (CRC) art. 3 och 12, inkorporerad i svensk rätt genom lag (2018:1197), fastställer barnets bästa och rätt att komma till tals i alla processer som rör dem.\n\nEuropeiska digitala rättigheter och principer: Barn och ungdomar ska kunna göra säkra och välgrundade val i den digitala miljön (punkt 20). Åldersanpassade tjänster ska förbättra barns erfarenheter och välbefinnande (punkt 21). Barn ska skyddas mot olaglig spårning, profilering och riktade åtgärder (punkt 22d).\n\nPolitikområden: Barnsrättspolitik, socialpolitik, förvaltningspolitik samt hälso- och sjukvårdspolitik.\n\nSe även: 2.5.4 (Barn i digitala asylprocesser) och 2.2 (Funktionsrelaterad exkludering). En person kan befinna sig i flera av dessa kategorier samtidigt – ett barn med funktionsnedsättning som är asylsökande möter hinder från samtliga.","2.6":"Det svenska digitala välfärdssystemet är konstruerat kring förutsättningen att den enskilde har en registrerad identitet och ett etablerat administrativt förhållande till det offentliga.\n\nAsylsökande, papperslösa och statslösa faller utanför detta antagande. Deras behov av kontakt med vård, skola och myndigheter kvarstår.\n\nDigital exkludering blir i dessa fall inte enbart ojämlik tillgång till välfärd utan ett hinder mot rättigheter som Sverige är folkrättsligt förpliktat att skydda.\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Socialtjänstlagen (2025:400) 1 kap. 1 § och Hälso- och sjukvårdslagen (2017:30) 3 kap. 1 § gäller som grundläggande värden oberoende av migrationsstatus.\n\nFN:s konvention om ekonomiska, sociala och kulturella rättigheter (ICESCR), artiklarna 12–13, fastslår att rätten till hälsa och utbildning gäller alla på ett lands territorium utan diskriminering – ESK-kommittén har specifikt uppmanat Sverige att säkerställa detta för asylsökande. FN:s konvention om rättigheter för personer med funktionsnedsättning (CRPD), artiklarna 5 och 19, tillämpas utan undantag för migrationsstatus – CRPD-kommittén har uttryckt oro över att migranter med funktionsnedsättning i Sverige systematiskt saknar tillgång till stöd och välfärdstjänster. FN:s barnkonvention (CRC), artiklarna 3, 22 och 37, kräver att barnets bästa beaktas i alla asylprocesser – barnrättskommittén har rekommenderat Sverige att förbjuda förvar av barn på grund av migrationsstatus. 1951 års flyktingkonvention och non-refoulement-principen ger folkrättslig grund åt rädslan för digital spårning (se 2.3.1) – det är inte irrationell oro utan en skyddad position.\n\nEuropeiska digitala rättigheter och principer: Ingen ska lämnas utanför den digitala omställningen, i synnerhet marginaliserade och utsatta grupper (artikel 2b). Tekniska lösningar ska möjliggöra utövandet av grundläggande rättigheter (artikel 2a).\n\nPolitikområden: Migrationspolitik, socialpolitik, funktionsrättspolitik, barnrättspolitik.","2.7":"Digitala plattformar ersätter arbetsgivarfunktioner med algoritmisk styrning och förskjuter ansvaret för arbetsmiljö och social trygghet till den som utför arbetet.\n\nEn app förmedlar, styr och övervakar arbete utan att ta det arbetsgivaransvar som normalt följer med en anställning. Den som utför arbetet klassas som uppdragstagare och bär själv ansvar för arbetsmiljö, sjukfrånvaro, försäkringar och pension. Algoritmer fördelar uppdrag, sätter priser, mäter prestation och kan stänga av den som inte uppfyller systemets kriterier. Modellen sprider sig till offentlig verksamhet när myndigheter och kommuner upphandlar välfärdstjänster från plattformsföretag.\n\nStöd i lag: Socialförsäkringsbalken (2010:110) villkorar rätten till sjukpenning, föräldrapenning och pension mot anställningsförhållanden som plattformsmodellen kringgår. EU:s plattformsdirektiv (2024/2831) introducerar en presumtion om anställningsförhållande i syfte att förbättra arbetsvillkoren för plattformsarbetare.\n\nEuropeiska digitala rättigheter och principer: Alla har rätt till rättvisa, hälsosamma och säkra arbetsvillkor, också i den digitala miljön (punkt 12). Arbetstagare har rätt att inte bli föremål för övervakning eller algoritmisk styrning som undergräver deras värdighet (punkt 13).\n\nPolitikområden: Arbetsmarknadspolitik, arbetsmiljöpolitik, socialpolitik och upphandlingspolitik.\n\nSe även: 2.1 (Ekonomisk utsatthet) och 1.7 (Ansvarsluckor och bristande styrning).","3.2":"Den enskilde behöver förstå samhället för att kunna delta i det. I en digitaliserad välfärdsstat förutsätter det en kombination av medborgerlig kompetens, informationskunnighet och digital kompetens. Det allmänna säkerställer inte att dessa förutsättningar finns – varken genom systemens utformning eller genom systematiskt stöd.\n\nEU:s ramverk för nyckelkompetenser för livslångt lärande (2018/C 189/01) identifierar medborgerlig kompetens och digital kompetens som två av åtta kompetenser av lika vikt. Unescos ramverk för medie- och informationskunnighet kompletterar dessa med den informationskritiska förmåga som krävs i en miljö där information medieras digitalt. I den enskildes vardag är dessa förmågor inte separerade utan utövas tillsammans i konkreta situationer. Att överklaga ett beslut förutsätter att alla tre samverkar: samhällskunskap för att förstå rättigheten, informationskunnighet för att hitta och värdera underlag, digital kompetens för att navigera systemet. Avsaknad av någon av delarna gör att möjligheten att utöva sin rätt fallerar.\n\nEnligt Ellström (1992) uppstår kompetens i mötet mellan individens resurser och de krav och handlingsutrymmen som omgivningen skapar. I digitala samhällsfunktioner är handlingsutrymmet inte öppet utan inskriberat i teknikens utformning (Akrich 1992). Förståelse är därför inte enbart en egenskap hos individen utan också en fråga om huruvida systemen är utformade så att de går att förstå. Rättigheter som inte kommuniceras kan inte utövas oavsett den enskildes kompetens. Administration som inte är utformad för att navigeras förblir obegriplig oavsett utbildningsnivå.\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet, RF 2 kap. 1 § skyddar yttrandefrihet och informationsfrihet. Förvaltningslagen (2017:900) 6 § kräver att kontakterna med enskilda blir smidiga och enkla, 13 § kräver att information är begriplig. Europaparlamentets och rådets förordning (EU) 2022/2065 om digitala tjänster ställer krav på transparens i algoritmiska system.\n\nEuropeiska digitala rättigheter och principer: Alla bör ha möjlighet att förvärva grundläggande digitala färdigheter (artikel 4). Alla bör ha tillgång till tillförlitlig, mångsidig och flerspråkig information online (artikel 6a). Alla bör kunna göra välgrundade val och vara medvetna om hur algoritmer kan påverka dem (artikel 6a).\n\nPolitikområden: Demokratipolitik, utbildningspolitik, beredskapspolitik, socialpolitik och förvaltningspolitik.","3.3":"Det allmänna har ansvar för att den enskilde kan påverka, granska och i efterhand förstå de strukturer och beslut som villkorar rättigheter och skyldigheter.\n\nDigitala system bär inbyggda maktstrukturer. Designval avgör vilka som inkluderas, vilken information som syns och hur beslut fattas. Den enskilde har rätt att förstå dessa val, ifrågasätta dem och delta i att förändra dem. Det förutsätter att beslutsspår bevaras, att offentlig information förblir tillgänglig och att det allmänna skapar förutsättningar för ett aktivt medborgarskap även i digitala miljöer.\n\nStöd i lag: Regeringsformen (RF 1 kap. 1 §) fastställer att all offentlig makt utgår från folket, RF 1 kap. 2 § fastställer det allmännas ansvar för delaktighet och möjlighet till inflytande. Tryckfrihetsförordningen (TF 2 kap.) fastställer offentlighetsprincipen: allmänna handlingar ska vara tillgängliga för var och en. Arkivlagen (1990:782) reglerar bevarande av allmänna handlingar. Förvaltningslagen (2017:900) 6 § kräver begriplig information, 7 § tillgänglighet, 27 § dokumentationsplikt vid handläggning, 32 § motivering av beslut. FN:s konvention om ekonomiska, sociala och kulturella rättigheter (ICESCR) fastslår att rätten till delaktighet gäller alla på ett lands territorium utan diskriminering. FN:s konvention om rättigheter för personer med funktionsnedsättning (CRPD) artikel 4.3 fastställer att konventionsstaterna aktivt ska involvera personer med funktionsnedsättning i beslutsprocesser som rör dem.\n\nEuropeiska digitala rättigheter och principer: Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a). Alla bör kunna göra välgrundade val och vara medvetna om hur algoritmer kan påverka dem (artikel 6a). Omfattande tillgång till och vidareutnyttjande av information från den offentliga sektorn ska säkerställas (artikel 7b).\n\nPolitikområden: Demokratipolitik, förvaltningspolitik och beredskapspolitik.","3.1":"Det allmänna har ansvar för att de professioner som bär det vardagsnära bildningsansvaret har förutsättningar att fullgöra det.\n\nBildningsuppdraget tillhör de institutioner och professioner som alltid burit det: bibliotekarier, pedagoger, folkbildare och gatubyråkrater (med flera). Med gatubyråkrater avses offentliganställda med direktkontakt med invånare. Deras professionella praktik behöver idag integrera förmågan att stödja den enskilde i förändrade informationsmiljöer. Detta bildningsansvar är skilt från den enskilda aktörens ansvar för sin tjänst (se 1.6). Det handlar inte om att kompensera för bristande tjänsteutformning utan om att stärka den enskildes självständiga förståelse av samhället.\n\nSystematiskt arbete förutsätter ett gemensamt språk. Unescos ramverk för medie- och informationskunnighet (MIK) beskriver den professionella kompetens som krävs för att stödja den enskildes förmåga att orientera sig i informationsmiljöer. För att MIK ska kunna fungera som professionell kärna behöver den vara organisatoriskt buren och ingå i ett sammanhållet ekosystem av aktörer.\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Bibliotekslagen (2013:801) 2 § fastställer att biblioteken ska verka för det demokratiska samhällets utveckling genom kunskapsförmedling och fri åsiktsbildning, 4 § kräver särskild uppmärksamhet åt personer med funktionsnedsättning och 7 § fastställer att biblioteken ska öka kunskapen om hur informationsteknik kan användas för kunskapsinhämtning, lärande och delaktighet. Skollagen (2010:800) 1 kap. 4–5 §§ fastställer att utbildningen ska främja barns och elevers allsidiga personliga utveckling och förmedla kunskaper och värden.\n\nEuropeiska digitala rättigheter och principer: Utbildning och fortbildning bör anpassas för att säkerställa att alla kan dra nytta av den digitala omställningen (artikel 4). Insatser bör stödjas som gör det möjligt för alla studerande och lärare att förvärva och förmedla de digitala färdigheter och kompetenser som behövs, inbegripet mediekunnighet och kritiskt tänkande, för ett aktivt deltagande i ekonomin, samhällslivet och de demokratiska processerna (artikel 4b).\n\nPolitikområden: Kulturpolitik, utbildningspolitik och folkbildningspolitik.","1.8":"Digitala samhällsfunktioner förutsätter robusthet och kontinuitet under kris, höjd beredskap och vid antagonistiska angrepp.\n\nNär samhällsviktiga tjänster digitaliseras blir den enskildes möjlighet att utöva sina rättigheter beroende av att digital infrastruktur fungerar. Befintliga regelverk för säkerhetsskydd, informationssäkerhet och krisberedskap har olika räckvidd och implementeringsgrad mellan sektorer. Frågor om leverantörsberoenden och nationell handlingsförmåga aktualiseras i takt med ökad digitalisering och förändrade geopolitiska förhållanden. Robusthet och kontinuitet är inte enbart tekniska kvalitetsfrågor utan förutsättningar för demokratisk delaktighet, rättssäkerhet och totalförsvar.\n\nStöd i lag: Säkerhetsskyddslag (2018:585) ställer krav på säkerhetsskydd för verksamhet som är av betydelse för Sveriges säkerhet eller omfattas av ett internationellt säkerhetsskyddsåtagande. Lag (2018:1174) om informationssäkerhet för samhällsviktiga och digitala tjänster är under revidering till följd av NIS2-direktivet (EU 2022/2555). Förordning (2022:525) med instruktion för Myndigheten för samhällsskydd och beredskap fastställer myndigheternas uppdrag inom beredskap. Lag (2006:544) om kommuners och regioners åtgärder inför och vid extraordinära händelser i fredstid och höjd beredskap reglerar krisberedskap. Europaparlamentets och rådets direktiv (EU) 2022/2557 om kritiska entiteters motståndskraft (CER) ställer krav på skydd av kritisk infrastruktur. Europaparlamentets och rådets förordning (EU) 2022/2554 om digital operativ motståndskraft för finanssektorn (DORA) ställer motsvarande krav på finanssektorn.\n\nEuropeiska digitala rättigheter och principer: Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a). Digitala offentliga tjänster ska vara sömlösa, säkra och interoperabla (artikel 7c). Alla bör ha tillgång till hög konnektivitet, säkerhet och tillgänglig digital teknik (artikel 11).\n\nPolitikområden: Förvaltningspolitik, beredskapspolitik och informationssäkerhetspolitik."};

function attachEvents(){
  var si=document.getElementById('si');
  if(si) si.addEventListener('input',function(){state.search=this.value;render();var el=document.getElementById('si');el.focus();el.setSelectionRange(state.search.length,state.search.length)});
  document.querySelectorAll('.sec-btn').forEach(function(b){b.addEventListener('click',function(){
    var s=this.getAttribute('data-sec');
    if(state.sectionFilter===s){state.sectionFilter=null;state.viewMode='none';state.viewKey=null}
    else{state.sectionFilter=s;state.viewMode='section';state.viewKey=s}
    state.selectedIdx=null;render();
  })});
  document.querySelectorAll('[data-lucka]').forEach(function(b){b.addEventListener('click',function(){
    var v=this.getAttribute('data-lucka');
    state.luckaFilter=state.luckaFilter===v?null:v;state.selectedIdx=null;state.viewMode='none';render();
  })});
  document.querySelectorAll('.sec-divider').forEach(function(b){b.addEventListener('click',function(){
    var sec=this.getAttribute('data-sec-nav');
    state.viewMode='section';state.viewKey=sec;state.selectedIdx=null;state.expandedKat=null;render();
    document.querySelector('.detail').scrollTop=0;
  })});
  document.querySelectorAll('.grp-hdr').forEach(function(b){b.addEventListener('click',function(){
    var kat=this.getAttribute('data-kat');
    if(state.expandedKat===kat){
      state.expandedKat=null;state.viewMode='none';state.viewKey=null;
    } else {
      state.expandedKat=kat;state.viewMode='kategori';state.viewKey=kat;
    }
    state.selectedIdx=null;render();
    document.querySelector('.detail').scrollTop=0;
  })});
  document.querySelectorAll('.cat-item[data-idx]').forEach(function(b){b.addEventListener('click',function(e){
    e.stopPropagation();
    state.viewMode='underkat';state.selectedIdx=parseInt(this.getAttribute('data-idx'));render();
    document.querySelector('.detail').scrollTop=0;
  })});
  document.querySelectorAll('[data-kat-click]').forEach(function(b){b.addEventListener('click',function(){
    var kat=this.getAttribute('data-kat-click');
    state.viewMode='kategori';state.viewKey=kat;state.expandedKat=kat;state.selectedIdx=null;render();
    document.querySelector('.detail').scrollTop=0;
  })});
  document.querySelectorAll('[data-nav-kat]').forEach(function(b){b.addEventListener('click',function(){
    var kat=this.getAttribute('data-nav-kat');
    state.viewMode='kategori';state.viewKey=kat;state.expandedKat=kat;state.selectedIdx=null;render();
    document.querySelector('.detail').scrollTop=0;
  })});
  var homeLink=document.getElementById('homeLink');
  if(homeLink) homeLink.addEventListener('click',function(){
    state.viewMode='home';state.viewKey=null;state.selectedIdx=null;state.sectionFilter=null;state.luckaFilter=null;state.expandedKat=null;state.ovFilter=null;
    render();var d=document.querySelector('.detail');if(d)d.scrollTop=0;
  });
  var aboutBtn=document.getElementById('aboutBtn');
  if(aboutBtn) aboutBtn.addEventListener('click',function(){
    if(state.viewMode==='about'){state.viewMode='none';state.viewKey=null}
    else{state.viewMode='about';state.viewKey=null;state.selectedIdx=null;state.sectionFilter=null;state.luckaFilter=null}
    render();var d=document.querySelector('.detail');if(d)d.scrollTop=0;
  });
  var overviewBtn=document.getElementById('overviewBtn');
  if(overviewBtn) overviewBtn.addEventListener('click',function(){
    if(state.viewMode==='overview'){state.viewMode='about';state.viewKey=null}
    else{state.viewMode='overview';state.viewKey=null;state.selectedIdx=null;state.sectionFilter=null;state.luckaFilter=null;state.expandedKat=null;state.ovFilter=null}
    render();window.scrollTo(0,0);
  });
  var useBtn=document.getElementById('useBtn');
  if(useBtn) useBtn.addEventListener('click',function(){
    if(state.viewMode==='use'){state.viewMode='none';state.viewKey=null}
    else{state.viewMode='use';state.viewKey=null;state.selectedIdx=null}
    render();var d=document.querySelector('.detail');if(d)d.scrollTop=0;
  });
  var sourcesBtn=document.getElementById('sourcesBtn');
  if(sourcesBtn) sourcesBtn.addEventListener('click',function(){
    if(state.viewMode==='sources'){state.viewMode='none';state.viewKey=null}
    else{state.viewMode='sources';state.viewKey=null;state.selectedIdx=null}
    render();var d=document.querySelector('.detail');if(d)d.scrollTop=0;
  });
  var digidelBtn=document.getElementById('digidelBtn');
  if(digidelBtn) digidelBtn.addEventListener('click',function(){
    if(state.viewMode==='digidel'){state.viewMode='none';state.viewKey=null}
    else{state.viewMode='digidel';state.viewKey=null;state.selectedIdx=null}
    render();var d=document.querySelector('.detail');if(d)d.scrollTop=0;
  });
  var digidelHomeLink=document.getElementById('digidelHomeLink');
  if(digidelHomeLink) digidelHomeLink.addEventListener('click',function(e){
    e.preventDefault();
    state.viewMode='digidel';state.viewKey=null;state.selectedIdx=null;
    render();var d=document.querySelector('.detail');if(d)d.scrollTop=0;
  });
  document.querySelectorAll('.digidel-link').forEach(function(b){b.addEventListener('click',function(e){
    e.preventDefault();
    state.viewMode='digidel';state.viewKey=null;state.selectedIdx=null;
    render();var d=document.querySelector('.detail');if(d)d.scrollTop=0;
  })});
  document.querySelectorAll('[data-sec-ov]').forEach(function(b){b.addEventListener('click',function(){
    state.viewMode='section';state.viewKey=this.getAttribute('data-sec-ov');state.selectedIdx=null;state.expandedKat=null;state.ovFilter=null;render();
    var d=document.querySelector('.detail');if(d)d.scrollTop=0;
  })});
  document.querySelectorAll('[data-ov-lucka]').forEach(function(b){b.addEventListener('click',function(){
    var v=this.getAttribute('data-ov-lucka');
    state.ovFilter=state.ovFilter===v?null:v;render();
  })});
  document.querySelectorAll('[data-kat-ov]').forEach(function(b){b.addEventListener('click',function(){
    var kat=this.querySelector('.ov-kat-hdr').textContent;
    state.viewMode='kategori';state.viewKey=kat;state.expandedKat=kat;state.selectedIdx=null;render();
    var d=document.querySelector('.detail');if(d)d.scrollTop=0;
  })});
  document.querySelectorAll('[data-idx-ov]').forEach(function(b){b.addEventListener('click',function(e){
    e.stopPropagation();
    var idx=parseInt(this.getAttribute('data-idx-ov'));
    state.viewMode='underkat';state.selectedIdx=idx;state.expandedKat=DATA[idx].tax_kat;render();
    var d=document.querySelector('.detail');if(d)d.scrollTop=0;
  })});
}

render();
</script>
</body>
</html>
