hållande till det offentliga. Den som saknar dessa förutsättningar -- asylsökande, papperslösa, statslösa -- befinner sig utanför systemets grundläggande antaganden.", "tax_kat_förklaring": "Digitala samhällsfunktioner bygger på antagandet att den enskilde har en registrerad identitet. Asylsökande, papperslösa och andra med osäker rättslig status faller utanför detta antagande. Deras behov av kontakt med vård, skola och myndigheter kvarstår. Varje systembarriär i sektion 1 förstärks. Digital exkludering blir i dessa fall inte enbart ojämlik tillgång till välfärd utan ett hinder mot rättigheter som Sverige är folkrättsligt förpliktat att skydda.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Socialtjänstlagen (2025:400) 1 kap. 1 § och Hälso- och sjukvårdslagen (2017:30) 3 kap. 1 § gäller som grundläggande värden oberoende av migrationsstatus. FN:s konvention om ekonomiska, sociala och kulturella rättigheter (ICESCR), artiklarna 12--13, fastslår att rätten till hälsa och utbildning gäller alla på ett lands territorium utan diskriminering -- ESK-kommittén har specifikt uppmanat Sverige att säkerställa detta för asylsökande. FN:s konvention om rättigheter för personer med funktionsnedsättning (CRPD), artiklarna 5 och 19, tillämpas utan undantag för migrationsstatus -- CRPD-kommittén har uttryckt oro över att migranter med funktionsnedsättning i Sverige systematiskt saknar tillgång till stöd och välfärdstjänster. FN:s barnkonvention (CRC), artiklarna 3, 22 och 37, kräver att barnets bästa beaktas i alla asylprocesser -- barnrättskommittén har rekommenderat Sverige att förbjuda förvar av barn på grund av migrationsstatus. 1951 års flyktingkonvention och non-refoulement-principen ger folkrättslig grund åt rädslan för digital spårning (se 2.3.1) -- det är inte irrationell oro utan en skyddad position.", "tax_kat_eu_digital_rights": "Ingen ska lämnas utanför den digitala omställningen, i synnerhet marginaliserade och utsatta grupper (artikel 2b). Tekniska lösningar ska möjliggöra utövandet av grundläggande rättigheter (artikel 2a).", "tax_kat_politik": "Migrationspolitik, socialpolitik, funktionsrättspolitik, barnrättspolitik.", "tax_underkat": "2.5.4. Barn och unga med migrationsstatus", "tax_underkat_beskrivning": "Ensamkommande barn saknar digital identitet, behörigt ombud och möjlighet att följa sin Barn och unga process digitalt. Barnets bästa som primär princip återspeglas inte i hur digitala migrationsstatus asylprocesser är utformade.", "taxonomi_id": "2.5.4", "kategori": "Barn och unga med migrationsstatus", "barriartyp": "Migration", "situation_exempel": "Jag är 16 och kom ensam till Sverige – jag har ingen digital identitet, min gode man förstår inte mitt ärende och jag kan inte följa min asylprocess digitalt.", "radgivning": "God man; Asylrättscentrum; Rädda Barnen; kommunens socialtjänst", "tvist": "Förvaltningsrätten (asylbeslut); JO", "tillsynsmyndighet": "Migrationsverket (asylprocessen); IVO (boende); överförmyndarnämnden (god man)", "lagstod": "CRC art. 3, 22, 37; utlänningslagen (2005:716); LMA (1994:137); FB 11 kap.", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – barnkonventionen kräver att barnets bästa beaktas men Migrationsverkets digitala processer förutsätter vuxen digital kompetens och ombud med digital behörighet.", "empirisk_kalla": "God man saknar ofta digital fullmakt. CRC-kommittén: rekommendation till Sverige om barns rättigheter i asylprocessen. UNICEF Sverige: ensamkommande barn saknar tillgång till digital information om sin process.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.5. Migrationsstatus och rättsligt skydd", "tax_kat_beskrivning": "Det svenska digitala välfärdssystemet är konstruerat kring förutsättningen att den enskilde är invånare med ett etablerat administrativt förhållande till det offentliga. Den som saknar dessa förutsättningar -- asylsökande, papperslösa, statslösa -- befinner sig utanför systemets grundläggande antaganden.", "tax_kat_förklaring": "Digitala samhällsfunktioner bygger på antagandet att den enskilde har en registrerad identitet. Asylsökande, papperslösa och andra med osäker rättslig status faller utanför detta antagande. Deras behov av kontakt med vård, skola och myndigheter kvarstår. Varje systembarriär i sektion 1 förstärks. Digital exkludering blir i dessa fall inte enbart ojämlik tillgång till välfärd utan ett hinder mot rättigheter som Sverige är folkrättsligt förpliktat att skydda.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Socialtjänstlagen (2025:400) 1 kap. 1 § och Hälso- och sjukvårdslagen (2017:30) 3 kap. 1 § gäller som grundläggande värden oberoende av migrationsstatus. FN:s konvention om ekonomiska, sociala och kulturella rättigheter (ICESCR), artiklarna 12--13, fastslår att rätten till hälsa och utbildning gäller alla på ett lands territorium utan diskriminering -- ESK-kommittén har specifikt uppmanat Sverige att säkerställa detta för asylsökande. FN:s konvention om rättigheter för personer med funktionsnedsättning (CRPD), artiklarna 5 och 19, tillämpas utan undantag för migrationsstatus -- CRPD-kommittén har uttryckt oro över att migranter med funktionsnedsättning i Sverige systematiskt saknar tillgång till stöd och välfärdstjänster. FN:s barnkonvention (CRC), artiklarna 3, 22 och 37, kräver att barnets bästa beaktas i alla asylprocesser -- barnrättskommittén har rekommenderat Sverige att förbjuda förvar av barn på grund av migrationsstatus. 1951 års flyktingkonvention och non-refoulement-principen ger folkrättslig grund åt rädslan för digital spårning (se 2.3.1) -- det är inte irrationell oro utan en skyddad position.", "tax_kat_eu_digital_rights": "Ingen ska lämnas utanför den digitala omställningen, i synnerhet marginaliserade och utsatta grupper (artikel 2b). Tekniska lösningar ska möjliggöra utövandet av grundläggande rättigheter (artikel 2a).", "tax_kat_politik": "Migrationspolitik, socialpolitik, funktionsrättspolitik, barnrättspolitik.", "tax_underkat": "2.5.5. Tidsbegränsad status och systemkontinuitet", "tax_underkat_beskrivning": "Digitala system saknar i regel hantering av statusövergångar. Den som väntar på förlängt Tidsbegränsad tillstånd kan förlora åtkomst till tjänster trots status laglig rätt att vara i landet.", "taxonomi_id": "2.5.5", "kategori": "Tidsbegränsad status och systemkontinuitet", "barriartyp": "Migration", "situation_exempel": "Mitt uppehållstillstånd löpte ut förra veckan – jag har ansökt om förlängning men i väntan har jag förlorat tillgång till 1177, FK och min digitala brevlåda.", "radgivning": "Migrationsverket; Skatteverket (folkbokföring); resp. myndighet", "tvist": "Förvaltningsrätten; JO", "tillsynsmyndighet": "JO; Migrationsverket", "lagstod": "Utlänningslagen (2005:716); FL 6–7 §§", "tillsynstyp": "Vägledning", "tillsynslucka": "Ja – digitala system saknar hantering av statusövergångar.", "empirisk_kalla": "Folkbokföring kan avregistreras vid utgånget tillstånd trots pågående förlängningsansökan. Den enskilde har laglig rätt att vara i landet men förlorar digital tillgång. IOM/DTM (2023): personer med tillfälligt skydd upplever osäkerhet vid statusövergångar. RiR 2023:6: myndigheters digitala tjänster hanterar inte övergångssituationer.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.6. Barn och unga", "tax_kat_beskrivning": "Barn och unga under 18 år saknar rättshandlingsförmåga och är beroende av vuxna som ombud i digitala system.", "tax_kat_förklaring": "Digitala samhällsfunktioner är utformade för myndiga individer med egen identitet, eget konto och egen beslutsrätt. Barn och unga faller strukturellt utanför detta antagande, inte på grund av bristande förmåga utan på grund av hur systemen är konstruerade. Det allmännas ansvar för barns rättigheter och välbefinnande kvarstår oavsett om fungerande vuxet ombud finns, och kvarstår även när barn befinner sig i situationer där sådant ombud saknas eller är den som utgör hotet.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för barns uppväxtvillkor. Förvaltningslagen (2017:900) 6 § reglerar parts rättsliga handlingsförmåga. Socialtjänstlagen (2025:400) 18 kap. 1--7 §§ fastställer socialnämndens ansvar för barns uppväxtförhållanden. Patientlagen (2014:821) 3 kap. skapar ett otydligt gränsland för barn 13--18 år. Barnkonventionen (CRC) art. 3 och 12, inkorporerad i svensk rätt genom lag (2018:1197), fastställer barnets bästa och rätt att komma till tals i alla processer som rör dem.", "tax_kat_eu_digital_rights": "Barn och ungdomar ska kunna göra säkra och välgrundade val i den digitala miljön (punkt 20). Åldersanpassade tjänster ska förbättra barns erfarenheter och välbefinnande (punkt 21). Barn ska skyddas mot olaglig spårning, profilering och riktade åtgärder (punkt 22d).", "tax_kat_politik": "Barnsrättspolitik, socialpolitik, förvaltningspolitik samt hälso- och sjukvårdspolitik.", "tax_underkat": "2.6.1. Barn utan fungerande vuxet ombud i digitala system", "tax_underkat_beskrivning": "Utan digitalt vårdnadshavare med e-legitimation. Ensamkommande ombud barn, barn omhändertagna enligt LVU och barn i familjer utan giltig e-legitimation saknar strukturerade alternativ. Tjänster som kräver dubbel signering av vårdnadshavarna går i många fall inte att genomföra digitalt (RiR 2023:6).", "taxonomi_id": "2.6.1", "kategori": "Barn utan fungerande vuxet ombud i digitala system", "barriartyp": "Barnrätt", "situation_exempel": "Jag och mitt ex har gemensam vårdnad men vi pratar inte med varandra – ansökan om id-kort till vårt barn kräver att vi båda signerar digitalt och det går inte att lösa", "radgivning": "Skatteverket; familjerätten i kommunen", "tvist": "Tingsrätten (ensam vårdnad); familjerätten (samarbetssamtal)", "tillsynsmyndighet": "JO", "lagstod": "FB 6 kap. (vårdnad); FL 6–7 §§", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – tjänster som kräver dubbel signering förutsätter samarbetande vårdnadshavare. Inget alternativ finns när kommunikationen brister.", "empirisk_kalla": "RiR 2023:6 s. 23: exempel på tjänster som rör barn och kräver dubbel signering som inte är möjligt digitalt – ansökan om namn på nyfött barn, id-kort för barn, anmälan av flerbarnstillägg.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.6. Barn och unga", "tax_kat_beskrivning": "Barn och unga under 18 år saknar rättshandlingsförmåga och är beroende av vuxna som ombud i digitala system.", "tax_kat_förklaring": "Digitala samhällsfunktioner är utformade för myndiga individer med egen identitet, eget konto och egen beslutsrätt. Barn och unga faller strukturellt utanför detta antagande, inte på grund av bristande förmåga utan på grund av hur systemen är konstruerade. Det allmännas ansvar för barns rättigheter och välbefinnande kvarstår oavsett om fungerande vuxet ombud finns, och kvarstår även när barn befinner sig i situationer där sådant ombud saknas eller är den som utgör hotet.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för barns uppväxtvillkor. Förvaltningslagen (2017:900) 6 § reglerar parts rättsliga handlingsförmåga. Socialtjänstlagen (2025:400) 18 kap. 1--7 §§ fastställer socialnämndens ansvar för barns uppväxtförhållanden. Patientlagen (2014:821) 3 kap. skapar ett otydligt gränsland för barn 13--18 år. Barnkonventionen (CRC) art. 3 och 12, inkorporerad i svensk rätt genom lag (2018:1197), fastställer barnets bästa och rätt att komma till tals i alla processer som rör dem.", "tax_kat_eu_digital_rights": "Barn och ungdomar ska kunna göra säkra och välgrundade val i den digitala miljön (punkt 20). Åldersanpassade tjänster ska förbättra barns erfarenheter och välbefinnande (punkt 21). Barn ska skyddas mot olaglig spårning, profilering och riktade åtgärder (punkt 22d).", "tax_kat_politik": "Barnsrättspolitik, socialpolitik, förvaltningspolitik samt hälso- och sjukvårdspolitik.", "tax_underkat": "2.6.2. Digitala spår skapade av andra", "tax_underkat_beskrivning": "Digitala spår och vård utan barnets medverkan. Rätten att begära skapade av andra radering finns i GDPR men förutsätter kännedom om var uppgifterna finns. Det är ett villkor som sällan är uppfyllt i praktiken.", "taxonomi_id": "2.6.2", "kategori": "Digitala spår skapade av andra", "barriartyp": "Barnrätt", "situation_exempel": "Min mamma la upp bilder på mig på sin Instagram – nu vill jag ta bort dem men det är hennes konto.", "radgivning": "Bris; Barnombudsmannen; IMY", "tvist": "IMY (klagomål)", "tillsynsmyndighet": "IMY", "lagstod": "GDPR art. 17 (rätt till radering); GDPR art. 8 (barns samtycke); CRC art. 16 (skydd för privatliv)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Delvis – GDPR ger rätt till radering men barnet kan inte agera utan förälderns medverkan på förälderns konto. IMY kan pröva klagomål men har inte agerat i denna typ av fall.", "empirisk_kalla": "IMY: information om barns dataskyddsrättigheter är sällan barnanpassad. Barnombudsmannen (2021): barn saknar i praktiken möjlighet att utöva sina dataskyddsrättigheter. Fenomenet kallas \"sharenting\" – föräldrars delning av barns bilder utan barnets samtycke.", "lucka_status": "Delvis"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.6. Barn och unga", "tax_kat_beskrivning": "Barn och unga under 18 år saknar rättshandlingsförmåga och är beroende av vuxna som ombud i digitala system.", "tax_kat_förklaring": "Digitala samhällsfunktioner är utformade för myndiga individer med egen identitet, eget konto och egen beslutsrätt. Barn och unga faller strukturellt utanför detta antagande, inte på grund av bristande förmåga utan på grund av hur systemen är konstruerade. Det allmännas ansvar för barns rättigheter och välbefinnande kvarstår oavsett om fungerande vuxet ombud finns, och kvarstår även när barn befinner sig i situationer där sådant ombud saknas eller är den som utgör hotet.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för barns uppväxtvillkor. Förvaltningslagen (2017:900) 6 § reglerar parts rättsliga handlingsförmåga. Socialtjänstlagen (2025:400) 18 kap. 1--7 §§ fastställer socialnämndens ansvar för barns uppväxtförhållanden. Patientlagen (2014:821) 3 kap. skapar ett otydligt gränsland för barn 13--18 år. Barnkonventionen (CRC) art. 3 och 12, inkorporerad i svensk rätt genom lag (2018:1197), fastställer barnets bästa och rätt att komma till tals i alla processer som rör dem.", "tax_kat_eu_digital_rights": "Barn och ungdomar ska kunna göra säkra och välgrundade val i den digitala miljön (punkt 20). Åldersanpassade tjänster ska förbättra barns erfarenheter och välbefinnande (punkt 21). Barn ska skyddas mot olaglig spårning, profilering och riktade åtgärder (punkt 22d).", "tax_kat_politik": "Barnsrättspolitik, socialpolitik, förvaltningspolitik samt hälso- och sjukvårdspolitik.", "tax_underkat": "2.6.3. Bristande samtyckesskydd i digitala tjänster", "tax_underkat_beskrivning": "Bristande GDPR kräver åldersanpassad information. IMY har samtyckesskydd konstaterat att informationen sällan är barnanpassad och att mekanismer för att utöva rättigheter ofta saknas eller är svåra att hitta. Reglering utan fungerande implementering ger inte reellt skydd.", "taxonomi_id": "2.6.3", "kategori": "Bristande samtyckesskydd i digitala tjänster", "barriartyp": "Barnrätt", "situation_exempel": "Jag orkade inte läsa alla villkor när jag fyllde 13 och skaffade sociala medier – jag har ingen aning vad som händer med min data.", "radgivning": "Bris; Barnombudsmannen; IMY", "tvist": "IMY (klagomål)", "tillsynsmyndighet": "IMY", "lagstod": "GDPR art. 8 (barns samtycke, 13-årsgräns); GDPR art. 12 (tydlig information); DSA 2022/2065 art. 28 (skydd för minderåriga); CRC art. 16", "tillsynstyp": "Tillsyn", "tillsynslucka": "Delvis – IMY har tillsyn men har konstaterat att informationen sällan är barnanpassad och att mekanismer för att utöva rättigheter ofta saknas eller är svåra att hitta.", "empirisk_kalla": "IMY: barnanpassad information saknas i praktiken. | Forbrukerrådet (2020) Out of Control: appar delar platsdata med annonsnätverk utan meningsfullt samtycke. | Sveriges Konsumenter: anmälde Google för bristande samtyckesinformation riktad till barn. | IMY, Barnombudsmannen & Statens medieråd (2020) Barns och ungas rättigheter på digitala plattformar – En vägledning till aktörer: barn 13–16 år befinner sig i gränsland – kan samtycka till informationssamhällets tjänster men förmågan att förstå konsekvenser varierar. Barn med funktionsnedsättning kan behöva mer stöd. Inga exakta regler för ålderskontroll.", "lucka_status": "Delvis"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.6. Barn och unga", "tax_kat_beskrivning": "Barn och unga under 18 år saknar rättshandlingsförmåga och är beroende av vuxna som ombud i digitala system.", "tax_kat_förklaring": "Digitala samhällsfunktioner är utformade för myndiga individer med egen identitet, eget konto och egen beslutsrätt. Barn och unga faller strukturellt utanför detta antagande, inte på grund av bristande förmåga utan på grund av hur systemen är konstruerade. Det allmännas ansvar för barns rättigheter och välbefinnande kvarstår oavsett om fungerande vuxet ombud finns, och kvarstår även när barn befinner sig i situationer där sådant ombud saknas eller är den som utgör hotet.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för barns uppväxtvillkor. Förvaltningslagen (2017:900) 6 § reglerar parts rättsliga handlingsförmåga. Socialtjänstlagen (2025:400) 18 kap. 1--7 §§ fastställer socialnämndens ansvar för barns uppväxtförhållanden. Patientlagen (2014:821) 3 kap. skapar ett otydligt gränsland för barn 13--18 år. Barnkonventionen (CRC) art. 3 och 12, inkorporerad i svensk rätt genom lag (2018:1197), fastställer barnets bästa och rätt att komma till tals i alla processer som rör dem.", "tax_kat_eu_digital_rights": "Barn och ungdomar ska kunna göra säkra och välgrundade val i den digitala miljön (punkt 20). Åldersanpassade tjänster ska förbättra barns erfarenheter och välbefinnande (punkt 21). Barn ska skyddas mot olaglig spårning, profilering och riktade åtgärder (punkt 22d).", "tax_kat_politik": "Barnsrättspolitik, socialpolitik, förvaltningspolitik samt hälso- och sjukvårdspolitik.", "tax_underkat": "2.6.4. Åldersgränser som skapar digitala vakuum", "tax_underkat_beskrivning": "Åldersgränser agera självständigt utan rättshandlingsförmåga eller skapar digitala stöd. Inom hälso- och sjukvården skapar patientlagens vakuum regler ett gränsland där den unges journalåtkomst inte kombineras med vägledning. Systemet tar bort vuxenstödet utan att tillföra ett annat.", "taxonomi_id": "2.6.4", "kategori": "Åldersgränser som skapar digitala vakuum", "barriartyp": "Barnrätt", "situation_exempel": "Jag är 16 och kan se min journal på 1177 men förstår inte mina provsvar – mina föräldrar har inte längre tillgång och ingen förklarar för mig", "radgivning": "Vårdcentralen; ungdomsmottagningen; 1177", "tvist": "Patientnämnden; IVO", "tillsynsmyndighet": "IVO; IMY (journalåtkomst)", "lagstod": "Patientlagen (2014:821) 3 kap. (information); patientdatalagen (2008:355); GDPR art. 8; CRC art. 3", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – patientlagen ger rätt till information men digitala journalsystem saknar åldersanpassad vägledning.", "empirisk_kalla": "Patientlagen: information ska anpassas efter mottagarens förutsättningar. |  1177/Inera: journalåtkomst för minderåriga hanteras olika i olika regioner – ingen nationell standard. |  ", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.7. Plattformsstyrt arbete", "tax_kat_beskrivning": "Digitala plattformar ersätter arbetsgivarfunktioner med algoritmisk styrning och förskjuter ansvaret för arbetsmiljö och social trygghet till den som utför arbetet.", "tax_kat_förklaring": "En app förmedlar, styr och övervakar arbete utan att ta det arbetsgivaransvar som normalt följer med en anställning. Den som utför arbetet klassas som uppdragstagare och bär själv ansvar för arbetsmiljö, sjukfrånvaro, försäkringar och pension. Algoritmer fördelar uppdrag, sätter priser, mäter prestation och kan stänga av den som inte uppfyller systemets kriterier. Modellen sprider sig till offentlig verksamhet när myndigheter och kommuner upphandlar välfärdstjänster från plattformsföretag.", "tax_kat_stöd_i_lag": "Socialförsäkringsbalken (2010:110) villkorar rätten till sjukpenning, föräldrapenning och pension mot anställningsförhållanden som plattformsmodellen kringgår. EU:s plattformsdirektiv (2024/2831) introducerar en presumtion om anställningsförhållande i syfte att förbättra arbetsvillkoren för plattformsarbetare.", "tax_kat_eu_digital_rights": "Alla har rätt till rättvisa, hälsosamma och säkra arbetsvillkor, också i den digitala miljön (punkt 12). Arbetstagare har rätt att inte bli föremål för övervakning eller algoritmisk styrning som undergräver deras värdighet (punkt 13).", "tax_kat_politik": "Arbetsmarknadspolitik, arbetsmiljöpolitik, socialpolitik och upphandlingspolitik.", "tax_underkat": "2.7.1. Algoritmisk arbetsledning", "tax_underkat_beskrivning": "Algoritmisk algoritmer som fördelar uppdrag, sätter tidsramar arbetsledning och utvärderar prestation utan motsvarande arbetsgivaransvar. Den som utför arbetet saknar insyn i hur beslut fattas och möjlighet att förhandla.", "taxonomi_id": "2.7.1", "kategori": "Algoritmisk arbetsledning", "barriartyp": "Arbetsmarknad", "situation_exempel": "Jag kör mat åt en plattform – appen bestämmer vilka leveranser jag får, hur lång tid jag har och vad jag tjänar. Igår sänktes min ersättning utan förklaring", "radgivning": "Fackförbund (Transportarbetareförbundet); Arbetsmiljöverket", "tvist": "Arbetsdomstolen (frågan om anställningsförhållande); allmän domstol", "tillsynsmyndighet": "Arbetsmiljöverket; Skatteverket (arbetsgivaransvar)", "lagstod": "EU:s plattformsdirektiv (2024/2831) presumtion om anställning; LAS (1982:80); arbetsmiljölagen (1977:1160)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – plattformsdirektivet är antaget men inte genomfört i svensk lag. ", "empirisk_kalla": "Arbetsmiljöverket har tillsyn över arbetsmiljö men plattformen hävdar att föraren är uppdragstagare. Algoritmen som styr arbetet är inte transparent och omfattas inte av tillsyn. EU plattformsdirektiv (2024/2831): introducerar presumtion om anställningsförhållande. Forbrukerrådet (2026) Breaking Free: plattformar förskjuter ansvar till individen. LO (2024): gig-arbetare saknar grundläggande arbetsrättsligt skydd.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.7. Plattformsstyrt arbete", "tax_kat_beskrivning": "Digitala plattformar ersätter arbetsgivarfunktioner med algoritmisk styrning och förskjuter ansvaret för arbetsmiljö och social trygghet till den som utför arbetet.", "tax_kat_förklaring": "En app förmedlar, styr och övervakar arbete utan att ta det arbetsgivaransvar som normalt följer med en anställning. Den som utför arbetet klassas som uppdragstagare och bär själv ansvar för arbetsmiljö, sjukfrånvaro, försäkringar och pension. Algoritmer fördelar uppdrag, sätter priser, mäter prestation och kan stänga av den som inte uppfyller systemets kriterier. Modellen sprider sig till offentlig verksamhet när myndigheter och kommuner upphandlar välfärdstjänster från plattformsföretag.", "tax_kat_stöd_i_lag": "Socialförsäkringsbalken (2010:110) villkorar rätten till sjukpenning, föräldrapenning och pension mot anställningsförhållanden som plattformsmodellen kringgår. EU:s plattformsdirektiv (2024/2831) introducerar en presumtion om anställningsförhållande i syfte att förbättra arbetsvillkoren för plattformsarbetare.", "tax_kat_eu_digital_rights": "Alla har rätt till rättvisa, hälsosamma och säkra arbetsvillkor, också i den digitala miljön (punkt 12). Arbetstagare har rätt att inte bli föremål för övervakning eller algoritmisk styrning som undergräver deras värdighet (punkt 13).", "tax_kat_politik": "Arbetsmarknadspolitik, arbetsmiljöpolitik, socialpolitik och upphandlingspolitik.", "tax_underkat": "2.7.2. Villkorat socialt skyddsnät", "tax_underkat_beskrivning": "Villkorat socialt arbetet som uppdragstagare, inte som anställd. skyddsnät Socialförsäkringssystemets skydd förutsätter anställning.", "taxonomi_id": "2.7.2", "kategori": "Villkorat socialt skyddsnät", "barriartyp": "2.7 Plattformsstyrt arbete", "situation_exempel": "Jag blev sjuk men får ingen sjukpenning – Försäkringskassan säger att jag inte är anställd utan uppdragstagare åt plattformen", "radgivning": "Försäkringskassan; fackförbund; Allmänna ombudet för socialförsäkringen", "tvist": "Förvaltningsrätten (sjukpenning); Arbetsdomstolen (anställningsfrågan)", "tillsynsmyndighet": "ISF; Arbetsmiljöverket", "lagstod": "SFB (2010:110); EU plattformsdirektiv (2024/2831); LAS (1982:80)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – SFB villkorar sjukpenning mot anställning eller egenföretagande med karensdag. Plattformsarbetaren faller mellan kategorierna.", "empirisk_kalla": "Plattformsdirektivets presumtion om anställning är inte genomförd i svensk lag. SFB (2010:110): sjukpenning förutsätter sjukpenninggrundande inkomst baserad på anställning eller F-skatt. Forbrukerrådet (2026) Breaking Free: plattformsmodellen kringgår sociala skyddsnät. EU plattformsdirektiv (2024/2831): syftar till att åtgärda just detta.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.7. Plattformsstyrt arbete", "tax_kat_beskrivning": "Digitala plattformar ersätter arbetsgivarfunktioner med algoritmisk styrning och förskjuter ansvaret för arbetsmiljö och social trygghet till den som utför arbetet.", "tax_kat_förklaring": "En app förmedlar, styr och övervakar arbete utan att ta det arbetsgivaransvar som normalt följer med en anställning. Den som utför arbetet klassas som uppdragstagare och bär själv ansvar för arbetsmiljö, sjukfrånvaro, försäkringar och pension. Algoritmer fördelar uppdrag, sätter priser, mäter prestation och kan stänga av den som inte uppfyller systemets kriterier. Modellen sprider sig till offentlig verksamhet när myndigheter och kommuner upphandlar välfärdstjänster från plattformsföretag.", "tax_kat_stöd_i_lag": "Socialförsäkringsbalken (2010:110) villkorar rätten till sjukpenning, föräldrapenning och pension mot anställningsförhållanden som plattformsmodellen kringgår. EU:s plattformsdirektiv (2024/2831) introducerar en presumtion om anställningsförhållande i syfte att förbättra arbetsvillkoren för plattformsarbetare.", "tax_kat_eu_digital_rights": "Alla har rätt till rättvisa, hälsosamma och säkra arbetsvillkor, också i den digitala miljön (punkt 12). Arbetstagare har rätt att inte bli föremål för övervakning eller algoritmisk styrning som undergräver deras värdighet (punkt 13).", "tax_kat_politik": "Arbetsmarknadspolitik, arbetsmiljöpolitik, socialpolitik och upphandlingspolitik.", "tax_underkat": "2.7.3. Inkomst som inte ryms i systemen", "tax_underkat_beskrivning": "Inkomst som inte stabila, förutsägbara belopp. Oregelbundna ryms i systemen plattformsinkomster passar inte i mallarna. Den som försöker göra rätt riskerar ändå felrapportering, återkrav och sanktioner.", "taxonomi_id": "2.7.3", "kategori": "Inkomst som inte ryms i systemen", "barriartyp": "2.7 Plattformsstyrt arbete", "situation_exempel": "Jag kör för en plattform och söker bostadsbidrag – men min inkomst varierar från vecka till vecka och FK:s system kräver en fast månadsinkomst. Jag vet inte vad jag ska skriva.", "radgivning": "Försäkringskassan; Skatteverket; fackförbund", "tvist": "Förvaltningsrätten (om återkrav); JO", "tillsynsmyndighet": "ISF; JO", "lagstod": "SFB (2010:110); FL 6–7 §§", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – digitala system för inkomstrapportering förutsätter stabila belopp. ", "empirisk_kalla": "Oregelbundna plattformsinkomster passar inte i mallarna. Den som uppskattar fel riskerar återkrav. Ingen vägledning finns för hur plattformsinkomster ska rapporteras i FK:s e-tjänster. Forbrukerrådet (2026) Breaking Free: oregelbundna plattformsinkomster skapar systemkonflikter med sociala stödsystem. RiR 2026:4: ändrade förhållanden hanteras ineffektivt – systemen förutsätter stabila inkomstuppgifter.", "lucka_status": "Ja"}, {"tax_huvusektion": "Kompetens och delaktighet", "tax_huvudsektion_beskrivning": "Det allmännas ansvar att tillhandahålla förutsättningar för digital delaktighet.", "tax_kat": "3.1. DigComp som referensram", "tax_kat_beskrivning": "EU:s ramverk för digital kompetens (DigComp) utgör grunden för hur digital kompetens mäts, utvärderas och utvecklas i Europa.", "tax_kat_förklaring": "DigComp 3.0 definierar digital kompetens som kunskaper, färdigheter och attityder för ett tryggt, kritiskt och ansvarsfullt användande av digital teknik. Ramverket omfattar fem kompetensområden: Under dessa fem områden ryms 21 kompetenser med fyra färdighetsnivåer och över 500 lärandemål. DigComp 3.0 integrerar AI-kompetens genomgående och utgår explicit från EU:s förklaring om digitala rättigheter och principer för det digitala decenniet. DigComp beskriver vad den enskilde behöver kunna och är en nödvändig referens, men inte ensam grund, för digital delaktighet.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Bibliotekslagen (2013:801) 2 § fastställer att biblioteken ska verka för det demokratiska samhällets utveckling genom kunskapsförmedling och fri åsiktsbildning, 4 § kräver särskild uppmärksamhet åt personer med funktionsnedsättning och 7 § fastställer att biblioteken ska öka kunskapen om hur informationsteknik kan användas för kunskapsinhämtning, lärande och delaktighet.", "tax_kat_eu_digital_rights": "Alla bör ha möjlighet att förvärva grundläggande digitala färdigheter (artikel 4). Utbildning och fortbildning bör anpassas för att säkerställa att alla kan dra nytta av den digitala omställningen (artikel 4).", "tax_kat_politik": "Utbildningspolitik, folkbildningspolitik och arbetsmarknadspolitik.", "tax_underkat": "3.1.1. DigComp i en svensk kontext", "tax_underkat_beskrivning": "DigComp saknar svensk översättning och anpassning. Utan gemensam terminologi och referensram DigComp i en fragmenteras insatser inom utbildning, svensk kontext folkbildning, omsorg och arbetsmarknad. Varje aktör utgår från sin egen definition av vad digital kompetens innebär.", "taxonomi_id": "3.1.1", "kategori": "DigComp i en svensk kontext", "barriartyp": "Kompetens", "situation_exempel": "Jag har lärt mig mycket på egen hand och i folkbildande insatser – men när jag söker jobb vill arbetsgivaren veta vad jag kan, och jag har inget sätt att visa det. Alla pratar om \"digital kompetens\" men menar olika saker. ", "radgivning": "Saknas i egentlig mening. Biblioteket (lokal vägledning, ej standardiserad); Arbetsförmedlingen (kompetenskartläggning, ej baserad på DigComp); kommunal vuxenutbildning (formell validering men ej för icke-formell digital kompetens).", "tvist": "JO (om myndighet inte kan hänvisa till likvärdigt kompetensstöd)", "tillsynsmyndighet": "Ingen tydlig – Digg samordnar digitaliseringspolitik men har inte tillsyn över kompetensinsatsers samstämmighet eller kvalitet. Skolverket ansvarar för formell utbildning. Ingen myndighet ansvarar för validering av vuxnas icke-formella digitala kompetens.", "lagstod": "RF 1 kap. 2 § (det allmännas ansvar för delaktighet); Bibliotekslagen (2013:801) 7 § (informationsteknik för lärande och delaktighet)", "tillsynstyp": "Vägledning", "tillsynslucka": "Ja – det saknas nationell instans som ansvarar för gemensam definition, nivåbeskrivning och validering av digital kompetens utanför det formella utbildningssystemet.", "empirisk_kalla": "Cosgrove & Cachia (2025) DigComp 3.0, JRC: ramverket definierar 21 kompetenser i fyra färdighetsnivåer med 500+ lärandemål – används i hela EU som referens för mätning, kursdesign och validering. Österrike har nationell anpassning (DigComp 2.3 AT) med tillägg av Area 0 för baskompetens. Sverige har ingen motsvarande anpassning, översättning eller implementering. | Digg/PTS (2026) Uppföljning av digitaliseringsstrategin, s. 12: digitaliseringsstrategin definierar bas-, bredd- och spetskompetens men konstaterar att indikatorutbudet är begränsat för möjligheten att skaffa sig grundläggande digitala färdigheter.", "lucka_status": "Ja"}, {"tax_huvusektion": "Kompetens och delaktighet", "tax_huvudsektion_beskrivning": "Det allmännas ansvar att tillhandahålla förutsättningar för digital delaktighet.", "tax_kat": "3.1. DigComp som referensram", "tax_kat_beskrivning": "EU:s ramverk för digital kompetens (DigComp) utgör grunden för hur digital kompetens mäts, utvärderas och utvecklas i Europa.", "tax_kat_förklaring": "DigComp 3.0 definierar digital kompetens som kunskaper, färdigheter och attityder för ett tryggt, kritiskt och ansvarsfullt användande av digital teknik. Ramverket omfattar fem kompetensområden: Under dessa fem områden ryms 21 kompetenser med fyra färdighetsnivåer och över 500 lärandemål. DigComp 3.0 integrerar AI-kompetens genomgående och utgår explicit från EU:s förklaring om digitala rättigheter och principer för det digitala decenniet. DigComp beskriver vad den enskilde behöver kunna och är en nödvändig referens, men inte ensam grund, för digital delaktighet.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Bibliotekslagen (2013:801) 2 § fastställer att biblioteken ska verka för det demokratiska samhällets utveckling genom kunskapsförmedling och fri åsiktsbildning, 4 § kräver särskild uppmärksamhet åt personer med funktionsnedsättning och 7 § fastställer att biblioteken ska öka kunskapen om hur informationsteknik kan användas för kunskapsinhämtning, lärande och delaktighet.", "tax_kat_eu_digital_rights": "Alla bör ha möjlighet att förvärva grundläggande digitala färdigheter (artikel 4). Utbildning och fortbildning bör anpassas för att säkerställa att alla kan dra nytta av den digitala omställningen (artikel 4).", "tax_kat_politik": "Utbildningspolitik, folkbildningspolitik och arbetsmarknadspolitik.", "tax_underkat": "3.1.2. AI-kompetens som rättighetsfråga", "tax_underkat_beskrivning": "DigComp 3.0 integrerar AI-kompetens genomgående. Den som inte förstår hur algoritmiska system AI-kompetens påverkar beslut, information och rättigheter kan inte granska, ifrågasätta eller tillvarata sina intressen. ättighetsfråga", "taxonomi_id": "3.1.2", "kategori": "AI-kompetens som rättighetsfråga", "barriartyp": "Kompetens", "situation_exempel": "Barnet åt bär i trädgården. AI-söktjänsten sa att de var giftiga – vi åkte till akuten i onödan. Jag visste inte att AI kan ge felaktiga svar med samma självsäkerhet som korrekta. Ingen har hjälpt mig förstå hur de här systemen fungerar.", "radgivning": "Biblioteket (enstaka insatser, ej systematiskt); i praktiken saknas strukturerat kompetensstöd om AI för allmänheten.", "tvist": "JO (bristande transparens vid myndighets AI-användning); IMY (profilering/dataskydd)", "tillsynsmyndighet": "Ingen tydlig för kompetensfrågan. IMY har GDPR-tillsyn. Nationell AI Act-tillsynsmyndighet ännu ej beslutad (SOU 2025:101). Ingen ansvarar för att befolkningen erbjuds grundläggande AI-förståelse.", "lagstod": "RF 1 kap. 2 §; GDPR art. 22; EU AI Act 2024/1689 art. 4 (AI-kunskap), art. 13–14 (transparens); Bibliotekslagen 7 §", "tillsynstyp": "Vägledning", "tillsynslucka": "Ja – AI Act art. 4 kräver AI-kunskap hos användare och leverantörer men inte hos medborgare som berörs.", "empirisk_kalla": "AI-kommissionen föreslår bibliotek som hubbar men utan formellt uppdrag eller långsiktig finansiering. SvD (2026-02-13): Giftinformationscentralen – felaktig AI-info leder till onödiga sjukhusbesök; \"folk litar mer på AI än våra råd\". | Nilsson (2026) Från eldsjälar till systematik: bibliotek förväntas bära AI-kompetensuppdraget men saknar resurser; hälften osäkra på kommunens AI-riktlinjer; 100 mkr kritiseras som otillräckligt med risk för \"eventifiering\". | Digg/PTS (2026) s. 15: 25 % saknar förtroende för AI:s hantering av personlig info; främsta oron att avgöra sant från falskt. | Sveriges AI-strategi (2025) s. 15: stöd ska vara tillgängligt för alla – men ingen aktör pekas ut.", "lucka_status": "Ja"}, {"tax_huvusektion": "Kompetens och delaktighet", "tax_huvudsektion_beskrivning": "Det allmännas ansvar att tillhandahålla förutsättningar för digital delaktighet.", "tax_kat": "3.2. Medie- och informationskunnighet (MIK)", "tax_kat_beskrivning": "Demokratisk delaktighet i digitala miljöer förutsätter förmåga att tolka, värdera och förstå hur information skapas, filtreras och sprids.", "tax_kat_förklaring": "Medie- och informationskunnighet (MIK) är ett ramverk med ursprung i Unesco som omfattar kunskaper, förmågor och förhållningssätt för att ta till sig tillförlitlig information, bilda åsikter och göra sin röst hörd. MIK handlar om att förstå mediernas roll i samhället, finna, analysera och kritiskt värdera information samt uttrycka sig och skapa innehåll i olika medier och sammanhang. I Sverige har Mediemyndigheten i uppgift att samordna det nationella MIK-arbetet. Nätverket MIK Sverige samlar 25 myndigheter och nationella organisationer. I praktiken är det dock ofta biblioteken som bär det vardagsnära MIK-arbetet -- och det arbetet handlar lika mycket om att navigera i samhällsinformation och myndighetskontakter som om att granska medier. MIK och DigComp överlappar delvis men har olika utgångspunkter: DigComp beskriver den enskildes färdigheter i relation till digital teknik, medan MIK betonar den demokratiska och samhälleliga dimensionen av informationsmiljöer. Båda är nödvändiga referensramar för detta ramverk.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet, RF 2 kap. 1 § skyddar yttrandefrihet och informationsfrihet. Bibliotekslagen (2013:801) 2 § fastställer att biblioteken ska verka för det demokratiska samhällets utveckling genom kunskapsförmedling och fri åsiktsbildning, 4 § kräver särskild uppmärksamhet åt personer med funktionsnedsättning och 7 § fastställer att biblioteken ska öka kunskapen om hur informationsteknik kan användas för kunskapsinhämtning, lärande och delaktighet.", "tax_kat_eu_digital_rights": "Alla bör ha möjlighet att förvärva grundläggande digitala färdigheter (artikel 4). Alla bör ha tillgång till tillförlitlig, mångsidig och flerspråkig information online (artikel 6a). Alla bör kunna göra välgrundade val och vara medvetna om hur algoritmer kan påverka dem (artikel 6a).", "tax_kat_politik": "Kulturpolitik, utbildningspolitik, demokratipolitik.", "tax_underkat": "3.2.1. Demokratisk informationskompetens", "tax_underkat_beskrivning": "MIK som stärka förmågan att söka, tolka och värdera vardagskompetens information i digitala miljöer.", "taxonomi_id": "3.2.1", "kategori": "Demokratisk informationskompetens", "barriartyp": "Kompetens", "situation_exempel": "Jag borde kanske vara bättre på att bedöma information på nätet – men jag tänker inte anmäla mig till en kurs om det. Det jag behöver är att någon visar mig i stunden, när jag faktiskt sitter med ett problem. Det finns ingen sådan hjälp inbyggd i tjänsterna jag använder.", "radgivning": "Biblioteket (vardagsnära stöd vid besök, ej systematiserat); resp. myndighet (FL 6 §). I praktiken saknas inbäddat lärande i digitala samhällsfunktioner.", "tvist": "JO (om myndighet brister i serviceskyldighet)", "tillsynsmyndighet": "Mediemyndigheten (samordnar MIK Sverige, 25 myndigheter/organisationer – men saknar verktyg att granska om insatserna når befolkningen). Ingen myndighet ansvarar för att lärande byggs in i digitala samhällstjänsters design.", "lagstod": "RF 1 kap. 2 §; RF 2 kap. 1 § (informationsfrihet); Bibliotekslagen 2 §, 7 §; FL 6 §", "tillsynstyp": "Vägledning", "tillsynslucka": "Ja – MIK-insatser bygger på kursformat som når de redan motiverade. Det allmännas digitala tjänster designas för ärendegenomströmning, inte för att medborgaren ska förstå vad som sker och lära sig av det.", "empirisk_kalla": "Inbäddat lärande – där tjänsten själv gör informationskompetens till en bieffekt av användningen, t.ex. genom att visa varifrån uppgifter hämtas, vad ett beslut grundas på eller hur man kontrollerar information – saknas som designprincip. Estlands X-Road visar att det är möjligt: medborgaren ser och godkänner hur data används och lär sig datadelning genom att faktiskt bestämma över den. Nilsson (2026) Från eldsjälar till systematik: Stor kommun – MIK sker \"i den dagliga verksamheten genom bemötandet\" men det är undantaget; risk för \"eventifiering\" snarare än vardagspedagogik. | Forbrukerrådet (2026) Breaking free: transparenskrav implementeras formellt men designas bort i praktiken – medborgaren kan inte förstå eller agera. | Hedström (2004) Spår av datoriseringens värden: digitala system designas för organisationens behov, inte för brukarens förståelse.", "lucka_status": "Ja"}, {"tax_huvusektion": "Kompetens och delaktighet", "tax_huvudsektion_beskrivning": "Det allmännas ansvar att tillhandahålla förutsättningar för digital delaktighet.", "tax_kat": "3.2. Medie- och informationskunnighet (MIK)", "tax_kat_beskrivning": "Demokratisk delaktighet i digitala miljöer förutsätter förmåga att tolka, värdera och förstå hur information skapas, filtreras och sprids.", "tax_kat_förklaring": "Medie- och informationskunnighet (MIK) är ett ramverk med ursprung i Unesco som omfattar kunskaper, förmågor och förhållningssätt för att ta till sig tillförlitlig information, bilda åsikter och göra sin röst hörd. MIK handlar om att förstå mediernas roll i samhället, finna, analysera och kritiskt värdera information samt uttrycka sig och skapa innehåll i olika medier och sammanhang. I Sverige har Mediemyndigheten i uppgift att samordna det nationella MIK-arbetet. Nätverket MIK Sverige samlar 25 myndigheter och nationella organisationer. I praktiken är det dock ofta biblioteken som bär det vardagsnära MIK-arbetet -- och det arbetet handlar lika mycket om att navigera i samhällsinformation och myndighetskontakter som om att granska medier. MIK och DigComp överlappar delvis men har olika utgångspunkter: DigComp beskriver den enskildes färdigheter i relation till digital teknik, medan MIK betonar den demokratiska och samhälleliga dimensionen av informationsmiljöer. Båda är nödvändiga referensramar för detta ramverk.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet, RF 2 kap. 1 § skyddar yttrandefrihet och informationsfrihet. Bibliotekslagen (2013:801) 2 § fastställer att biblioteken ska verka för det demokratiska samhällets utveckling genom kunskapsförmedling och fri åsiktsbildning, 4 § kräver särskild uppmärksamhet åt personer med funktionsnedsättning och 7 § fastställer att biblioteken ska öka kunskapen om hur informationsteknik kan användas för kunskapsinhämtning, lärande och delaktighet.", "tax_kat_eu_digital_rights": "Alla bör ha möjlighet att förvärva grundläggande digitala färdigheter (artikel 4). Alla bör ha tillgång till tillförlitlig, mångsidig och flerspråkig information online (artikel 6a). Alla bör kunna göra välgrundade val och vara medvetna om hur algoritmer kan påverka dem (artikel 6a).", "tax_kat_politik": "Kulturpolitik, utbildningspolitik, demokratipolitik.", "tax_underkat": "3.2.2. Motståndskraft mot desinformation", "tax_underkat_beskrivning": "Motståndskraft mot underminerar demokratisk delaktighet. Det allmänna desinformation saknar samordnade insatser för att stärka befolkningens förmåga att identifiera, förstå och hantera falsk och vilseledande information.", "taxonomi_id": "3.2.2", "kategori": "Motståndskraft mot desinformation", "barriartyp": "Kompetens", "situation_exempel": "Min pappa delar nyheter på Facebook som ser äkta ut men som inte stämmer. Algoritmerna ger honom mer av samma. Ingen har gjort det lätt för honom att kontrollera – och ingenting i flödet signalerar att han borde.", "radgivning": "Biblioteket (enstaka insatser); Mediemyndigheten (samordnar men ej invånarriktat).", "tvist": "Mediemyndigheten (DSA-tillsyn vid plattformars systemrisker); IMY (vid dataskyddsrelaterad manipulation)", "tillsynsmyndighet": "Mediemyndigheten (DSA-tillsyn för plattformars hantering av systemrisker inkl. desinformation; samordnar MIK Sverige). MSB/Myndigheten för psykologiskt försvar (statlig informationspåverkan). Ingen myndighet ansvarar för den samlade kedjan: plattformsdesign + offentlig närvaro + medborgarens förmåga + sociala sammanhang.", "lagstod": "RF 2 kap. 1 § (yttrandefrihet, informationsfrihet); DSA (EU) 2022/2065 (plattformars ansvar för systemrisker); Bibliotekslagen 2 §, 7 §", "tillsynstyp": "Tillsyn (DSA) / Vägledning (MIK-insatser)", "tillsynslucka": "Delvis – DSA ger plattformstillsyn men inget skydd för medborgaren på mottagarsidan.", "empirisk_kalla": "SOU 2020:56 föreslog 2020 en nationell strategi mot desinformation – den har inte realiserats. Mediemyndighetens MIK-uppdrag i en tid av AI och desinformation finansieras med 2 mkr/år 2025–2028. Motståndskraft kräver en genomgripande plan som kopplar plattformsreglering, offentlig informationsnärvaro, sociala sammanhang och inbyggd källkritik – ingen aktör har det samlade uppdraget. | Forbrukerrådet (2026) Breaking free: plattformarnas affärsmodell bygger på engagemang, inte tillförlitlighet – algoritmerna belönar sensationellt innehåll. |", "lucka_status": "Delvis"}, {"tax_huvusektion": "Kompetens och delaktighet", "tax_huvudsektion_beskrivning": "Det allmännas ansvar att tillhandahålla förutsättningar för digital delaktighet.", "tax_kat": "3.3. Orientering och vardagskompetens", "tax_kat_beskrivning": "Digitala samhällsfunktioner kräver mer än digital kompetens i snäv mening. Den enskilde möter system som förutsätter orientering, byråkratisk förståelse och kontinuerlig anpassning.", "tax_kat_förklaring": "Det främjande stöd som avses här ersätter inte systemägarens ansvar (se 1.2.7). Det handlar om något annat: den enskildes rätt att förstå, orientera sig och agera självständigt i ett digitalt samhälle. Det digitala samhället förutsätter att den enskilde kan överblicka ett landskap av aktörer, system och kontaktvägar som ingen har ansvar för att göra begripligt. När det allmänna digitaliserar samhällsfunktioner uppstår ett ansvar att också tillhandahålla de sammanhang där den enskilde kan bygga förståelse, ställa frågor och få stöd utan att förlora sin självständighet.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § fastställer myndigheters skyldighet att hjälpa den enskilde att ta till vara sina intressen, 7 § kräver tillgänglighet. Socialtjänstlagen (2025:400) 2 kap. 1 § fastställer målet om jämlika levnadsvillkor, 2 kap. 4 § att socialtjänsten ska vara lätt tillgänglig. Bibliotekslagen (2013:801) 4 § kräver särskild uppmärksamhet åt personer med funktionsnedsättning, 7 § att biblioteken ska öka kunskapen om informationsteknik.", "tax_kat_eu_digital_rights": "Alla bör ha möjlighet att förvärva grundläggande digitala färdigheter (artikel 4). Ingen ska lämnas utanför den digitala omställningen, i synnerhet äldre, personer med funktionsnedsättning och marginaliserade grupper (artikel 2b). Alla bör ha tillgång online till viktiga offentliga samhällsfunktioner (artikel 7).", "tax_kat_politik": "Socialpolitik, folkbildningspolitik och förvaltningspolitik.", "tax_underkat": "3.3.1. Osynliga rättigheter", "tax_underkat_beskrivning": "Det allmänna informerar inte systematiskt om Osynliga vilka rättigheter till stöd, vägledning och rättigheter alternativa kontaktvägar som finns. Rättigheter som inte är kända kan inte utövas.", "taxonomi_id": "3.3.1", "kategori": "Osynliga rättigheter", "barriartyp": "Stöd", "situation_exempel": "Jag visste inte att jag hade rätt till hjälp eller analogt alternativ – ingen informerade mig", "radgivning": "Resp. myndighet; Servicekontor (Statens servicecenter); kommunal vägledning i digital vardag (informell vägledning)", "tvist": "JO (om myndighet brister i att informera om alternativa kontaktvägar)", "tillsynsmyndighet": "JO kan granska enskilda fall. Ingen myndighet har systemtillsyn över att det allmänna aktivt informerar om rättigheter till stöd och alternativa kontaktvägar.", "lagstod": "RF 1 kap. 2 §; FL 6 § (serviceskyldighet, hjälp att ta till vara intressen), 7 § (tillgänglighet)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – FL 6 § ger rätten men ingen systemtillsyn säkerställer att myndigheter aktivt informerar om den. Rättigheter som inte är kända kan inte utövas.", "empirisk_kalla": "RiR 2021:8 s. 32–33: få myndigheter har en tydlig bild av behoven av alternativ till digital service; 20 % av servicekontorsbesökarna hade ärenden som krävde fysiskt besök – resten visste inte att de kunde lösa det digitalt eller via telefon. | Länsstyrelserna (2025) När betaltjänster är otillgängliga – Berättelser från verkligheten: persona Siw (81) visste inte att det är olagligt att låta dottern använda hennes BankID; persona Rune (87): \"har alltid räknat med att få stöd från samhället – nu märker han att det krävs större egenansvar\".", "lucka_status": "Ja"}, {"tax_huvusektion": "Kompetens och delaktighet", "tax_huvudsektion_beskrivning": "Det allmännas ansvar att tillhandahålla förutsättningar för digital delaktighet.", "tax_kat": "3.3. Orientering och vardagskompetens", "tax_kat_beskrivning": "Digitala samhällsfunktioner kräver mer än digital kompetens i snäv mening. Den enskilde möter system som förutsätter orientering, byråkratisk förståelse och kontinuerlig anpassning.", "tax_kat_förklaring": "Det främjande stöd som avses här ersätter inte systemägarens ansvar (se 1.2.7). Det handlar om något annat: den enskildes rätt att förstå, orientera sig och agera självständigt i ett digitalt samhälle. Det digitala samhället förutsätter att den enskilde kan överblicka ett landskap av aktörer, system och kontaktvägar som ingen har ansvar för att göra begripligt. När det allmänna digitaliserar samhällsfunktioner uppstår ett ansvar att också tillhandahålla de sammanhang där den enskilde kan bygga förståelse, ställa frågor och få stöd utan att förlora sin självständighet.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § fastställer myndigheters skyldighet att hjälpa den enskilde att ta till vara sina intressen, 7 § kräver tillgänglighet. Socialtjänstlagen (2025:400) 2 kap. 1 § fastställer målet om jämlika levnadsvillkor, 2 kap. 4 § att socialtjänsten ska vara lätt tillgänglig. Bibliotekslagen (2013:801) 4 § kräver särskild uppmärksamhet åt personer med funktionsnedsättning, 7 § att biblioteken ska öka kunskapen om informationsteknik.", "tax_kat_eu_digital_rights": "Alla bör ha möjlighet att förvärva grundläggande digitala färdigheter (artikel 4). Ingen ska lämnas utanför den digitala omställningen, i synnerhet äldre, personer med funktionsnedsättning och marginaliserade grupper (artikel 2b). Alla bör ha tillgång online till viktiga offentliga samhällsfunktioner (artikel 7).", "tax_kat_politik": "Socialpolitik, folkbildningspolitik och förvaltningspolitik.", "tax_underkat": "3.3.2. Förändringsexkludering", "tax_underkat_beskrivning": "Medborgaren behärskar en digital tjänst men tjänsten uppdateras och personen kan inte Förä längre navigera den. Inte kognitiv exkludering ndringsexkludering i traditionell mening: förmågan finns men gränssnittet ändras snabbare än anpassningsförmågan.", "taxonomi_id": "3.3.2", "kategori": "Förändringsexkludering", "barriartyp": "Kompetens", "situation_exempel": "Appen uppdaterades – jag som kunde förut hittar inte längre", "radgivning": "Resp. myndighet (FL 6 §, om offentlig tjänst); kundtjänst (om privat tjänst); kommunal vägledning i digital vardag (om det finns)", "tvist": "JO (offentlig tjänst – om ändring genomförs utan information); ARN (privat tjänst, ej bindande). I praktiken svag ställning oavsett – ingen reglering kräver förvarning, övergångsperiod eller stöd vid omdesign.", "tillsynsmyndighet": "Digg (DOS-lagen – men den reglerar tillgänglighet, inte förändringshantering). Konsumentverket (privata tjänster – men produktsäkerhet, inte designkontinuitet). Ingen myndighet har tillsyn över att gränssnittsändringar genomförs med hänsyn till befintliga användares inlärning, vare sig i offentliga eller privata tjänster.", "lagstod": "FL 6–7 §§ (offentliga tjänster); DOS-lagen SFS 2018:1937 (tillgänglighet); konsumentlagstiftning saknar skydd mot förändringsexkludering", "tillsynstyp": "Vägledning", "tillsynslucka": "Ja – det finns krav på tillgänglighet men inte på förändringshantering.", "empirisk_kalla": "Problemet gäller offentliga och privata tjänster lika: banker, vårdappar, betalningslösningar och myndigheter designar om utan förvarning, övergångsperiod eller utbildning. Ingen rätt att bli förberedd. PRO/Begripsam (2024) Så använder PRO:s (digitala) medlemmar internet: förändringsexkludering som tema – användare som behärskat tjänster förlorar förmågan vid omdesign. | RiR 2025:8 s. 26–50: 1 094 digitaliseringsprojekt – medborgarna har inget inflytande", "lucka_status": "Ja"}, {"tax_huvusektion": "Kompetens och delaktighet", "tax_huvudsektion_beskrivning": "Det allmännas ansvar att tillhandahålla förutsättningar för digital delaktighet.", "tax_kat": "3.3. Orientering och vardagskompetens", "tax_kat_beskrivning": "Digitala samhällsfunktioner kräver mer än digital kompetens i snäv mening. Den enskilde möter system som förutsätter orientering, byråkratisk förståelse och kontinuerlig anpassning.", "tax_kat_förklaring": "Det främjande stöd som avses här ersätter inte systemägarens ansvar (se 1.2.7). Det handlar om något annat: den enskildes rätt att förstå, orientera sig och agera självständigt i ett digitalt samhälle. Det digitala samhället förutsätter att den enskilde kan överblicka ett landskap av aktörer, system och kontaktvägar som ingen har ansvar för att göra begripligt. När det allmänna digitaliserar samhällsfunktioner uppstår ett ansvar att också tillhandahålla de sammanhang där den enskilde kan bygga förståelse, ställa frågor och få stöd utan att förlora sin självständighet.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § fastställer myndigheters skyldighet att hjälpa den enskilde att ta till vara sina intressen, 7 § kräver tillgänglighet. Socialtjänstlagen (2025:400) 2 kap. 1 § fastställer målet om jämlika levnadsvillkor, 2 kap. 4 § att socialtjänsten ska vara lätt tillgänglig. Bibliotekslagen (2013:801) 4 § kräver särskild uppmärksamhet åt personer med funktionsnedsättning, 7 § att biblioteken ska öka kunskapen om informationsteknik.", "tax_kat_eu_digital_rights": "Alla bör ha möjlighet att förvärva grundläggande digitala färdigheter (artikel 4). Ingen ska lämnas utanför den digitala omställningen, i synnerhet äldre, personer med funktionsnedsättning och marginaliserade grupper (artikel 2b). Alla bör ha tillgång online till viktiga offentliga samhällsfunktioner (artikel 7).", "tax_kat_politik": "Socialpolitik, folkbildningspolitik och förvaltningspolitik.", "tax_underkat": "3.3.3. Byråkratisk kunnighet", "tax_underkat_beskrivning": "Förmågan att navigera offentliga system och administrativa processer digitalt. Skild från Byråkratisk digital kompetens i snäv mening: en person kan kunnighet vara tekniskt kunnig men ändå inte förstå hur man bifogar rätt underlag till rätt myndighet i rätt format.", "taxonomi_id": "3.3.3", "kategori": "Byråkratisk kunnighet", "barriartyp": "Kompetens", "situation_exempel": "Jag kan använda datorn men vet inte vilken bilaga som ska till vilken myndighet", "radgivning": "Resp. myndighet; Servicekontor (Statens servicecenter); kommunal vägledning i digital vardag (informell vägledning)", "tvist": "JO (om myndighet inte ger tillräcklig vägledning)", "tillsynsmyndighet": "JO (enskilda fall). Ingen myndighet har systemtillsyn över att administrativa processer är begripliga för den som ska genomföra dem.", "lagstod": "RF 1 kap. 2 §; FL 6 § (serviceskyldighet), 7 § (tillgänglighet);", "tillsynstyp": "Vägledning", "tillsynslucka": "Ja – FL 6 § kräver att myndigheten hjälper den enskilde men ställer inga krav på att processerna i sig ska vara begripliga. Ansvaret läggs på individen att fråga, inte på systemet att förklara.", "empirisk_kalla": "Nilsson (2026) Från eldsjälar till systematik: 42 % av huvudbiblioteken hjälper dagligen med bilagor och myndighetskontakter. | Digg/PTS (2026) s. 8, 13–14: var tredje folkbibliotekarie lägger mer än 50 % av arbetstiden på samhällsservice. | RiR 2023:6 s. 26–35: Begripsam-utvärderingar visar att myndighetsjargong och otydlig struktur är genomgående problem; Polisens brottsanmälan: nästan hälften anmälde fel brottstyp på grund av ologisk struktur.", "lucka_status": "Ja"}, {"tax_huvusektion": "Kompetens och delaktighet", "tax_huvudsektion_beskrivning": "Det allmännas ansvar att tillhandahålla förutsättningar för digital delaktighet.", "tax_kat": "3.3. Orientering och vardagskompetens", "tax_kat_beskrivning": "Digitala samhällsfunktioner kräver mer än digital kompetens i snäv mening. Den enskilde möter system som förutsätter orientering, byråkratisk förståelse och kontinuerlig anpassning.", "tax_kat_förklaring": "Det främjande stöd som avses här ersätter inte systemägarens ansvar (se 1.2.7). Det handlar om något annat: den enskildes rätt att förstå, orientera sig och agera självständigt i ett digitalt samhälle. Det digitala samhället förutsätter att den enskilde kan överblicka ett landskap av aktörer, system och kontaktvägar som ingen har ansvar för att göra begripligt. När det allmänna digitaliserar samhällsfunktioner uppstår ett ansvar att också tillhandahålla de sammanhang där den enskilde kan bygga förståelse, ställa frågor och få stöd utan att förlora sin självständighet.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § fastställer myndigheters skyldighet att hjälpa den enskilde att ta till vara sina intressen, 7 § kräver tillgänglighet. Socialtjänstlagen (2025:400) 2 kap. 1 § fastställer målet om jämlika levnadsvillkor, 2 kap. 4 § att socialtjänsten ska vara lätt tillgänglig. Bibliotekslagen (2013:801) 4 § kräver särskild uppmärksamhet åt personer med funktionsnedsättning, 7 § att biblioteken ska öka kunskapen om informationsteknik.", "tax_kat_eu_digital_rights": "Alla bör ha möjlighet att förvärva grundläggande digitala färdigheter (artikel 4). Ingen ska lämnas utanför den digitala omställningen, i synnerhet äldre, personer med funktionsnedsättning och marginaliserade grupper (artikel 2b). Alla bör ha tillgång online till viktiga offentliga samhällsfunktioner (artikel 7).", "tax_kat_politik": "Socialpolitik, folkbildningspolitik och förvaltningspolitik.", "tax_underkat": "3.3.4. Samhället som inte går att överblicka", "tax_underkat_beskrivning": "Digitala samhällsfunktioner är fördelade mellan Samhället som inte myndigheter, kommuner, regioner och privata går att överblicka aktörer utan gemensam ingång. Den enskilde förväntas navigera ett landskap som inte är utformat för att navigeras.", "taxonomi_id": "3.3.4", "kategori": "Samhället som inte går att överblicka", "barriartyp": "Stöd", "situation_exempel": "Jag blev sjukskriven och behövde kontakta FK, AF, kommunen och min vårdcentral – alla med olika inloggningar, olika handläggare och olika regler. Ingen kunde ge mig en överblick. Jag vet fortfarande inte om jag missat något jag hade rätt till.", "radgivning": "Finsam (Finansiell samordning av rehabiliteringsinsatser) är en lagstadgad samverkan mellan Arbetsförmedlingen, Försäkringskassan, kommuner och regioner. ", "tvist": "JO (om myndighet brister i samverkansskyldighet, FL 8 §)", "tillsynsmyndighet": "Digg (samordnar digital förvaltning men har inte tillsyn över att medborgaren har en samlad ingång). JO (enskilda fall). Ingen myndighet ansvarar för att den enskilde kan överblicka det digitala landskapet.", "lagstod": "RF 1 kap. 2 §; FL 8 § (samverkan mellan myndigheter); FL 6 § (serviceskyldighet)", "tillsynstyp": "Vägledning", "tillsynslucka": "Ja – FL 8 § kräver samverkan men ingen myndighet ansvarar för att medborgaren har en samlad bild. ", "empirisk_kalla": "Livshändelser (sjukdom, separation, dödsfall) kräver kontakt med flera myndigheter men ingen äger helheten ur medborgarens perspektiv. RiR 2023:6 s. 23: livshändelsebaserad samordning saknas systematiskt.  |  Raymond, T. (2025) Gotland i en digital tid: Komplexa informationsmiljöer. ", "lucka_status": "Ja"}, {"tax_huvusektion": "Kompetens och delaktighet", "tax_huvudsektion_beskrivning": "Det allmännas ansvar att tillhandahålla förutsättningar för digital delaktighet.", "tax_kat": "3.4. Stödstrukturernas brister", "tax_kat_beskrivning": "Det allmänna saknar sammanhållen organisering för det digitala stöd som den enskilde behöver.", "tax_kat_förklaring": "När samhällsfunktioner digitaliseras uppstår ett behov av stöd som sträcker sig bortom den enskilda myndighetens ansvar. Det handlar om vägledning, orientering och demokratisk förståelse --- inte bara teknikhjälp. I dagsläget saknas ett gemensamt uppdrag för detta stöd, och ansvaret faller i praktiken på aktörer som aldrig fått uppdraget.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Socialtjänstlagen (2025:400) 2 kap. 4 § fastställer att socialtjänsten ska vara lätt tillgänglig, 5 kap. 1 § främjande arbete och uppsökande insatser, 6 kap. 3 § uppsökande verksamhet. Bibliotekslagen (2013:801) 2 § fastställer att biblioteken ska verka för det demokratiska samhällets utveckling, 7 § att biblioteken ska öka kunskapen om informationsteknik.", "tax_kat_eu_digital_rights": "Ingen ska lämnas utanför den digitala omställningen, i synnerhet äldre, personer med funktionsnedsättning och marginaliserade grupper (artikel 2b). Alla bör ha möjlighet att förvärva grundläggande digitala färdigheter (artikel 4).", "tax_kat_politik": "Socialpolitik, folkbildningspolitik och förvaltningspolitik.", "tax_underkat": "3.4.2. Informellt stödansvar utan mandat", "tax_underkat_beskrivning": "Aktörer som bibliotek, folkbildning och civilsamhälle bär i praktiken det digitala Informellt stödansvaret utan formellt uppdrag, resurser stödansvar utan eller löpande kompetensutveckling. Detta mandat informella system undergrävs av resursneddragningar.", "taxonomi_id": "3.4.2", "kategori": "Informellt stödansvar utan mandat", "barriartyp": "Stöd", "situation_exempel": "Bibliotekarien,  IT-pedagogen i studieförbundet, den digitala stödjaren i äldreomsorgen och vägledaren på medborgarkontoret – alla hjälper mig förstå det digitala samhället. Men samtliga dessa stödjande funktioner kan drabbas av nedskärningar.", "radgivning": "Dessa aktörer är rådgivningen – bred, lokal och icke-stigmatiserande. Myndigheternas egna kanaler finns men är ärendebaserade och smala.", "tvist": "JO (om kommunen drar ner på service utan alternativ)", "tillsynsmyndighet": "Ingen. Kommunen är huvudman. KB har nationellt samordningsansvar för bibliotek men inte tillsyn. Ingen extern myndighet kan granska om stödfunktionerna har tillräckliga resurser.", "lagstod": "Bibliotekslagen 2 §, 7 §; RF 1 kap. 2 §; SoL (2025:400) 6 kap. 3 §", "tillsynstyp": "Vägledning", "tillsynslucka": "Ja – det bredaste, mest lokala och mest tillgängliga stödet för digital delaktighet ges av aktörer utan formellt uppdrag. ", "empirisk_kalla": "Arbetet syns inte i styrning, mäts inte i uppföljning och finansieras inte långsiktigt. Digg/PTS (2026) s. 8, 13–14: var tredje folkbibliotekarie lägger mer än 50 % av arbetstiden på samhällsservice. DIK (2025) Samhällets sista utpost. | Nilsson (2026) Från eldsjälar till systematik: MIK-arbetet beror på enskilda eldsjälar; \"det är allas ansvar\" – i praktiken ingens. | Raymond (2024) s. 52–65: resurser går åt till work-arounds runt hinder, inte till att riva dem. ", "lucka_status": "Ja"}, {"tax_huvusektion": "Kompetens och delaktighet", "tax_huvudsektion_beskrivning": "Det allmännas ansvar att tillhandahålla förutsättningar för digital delaktighet.", "tax_kat": "3.5. Digital makt och handlingsutrymme", "tax_kat_beskrivning": "Det allmänna har ansvar för att den enskilde kan förstå och påverka de digitala strukturer som villkorar rättigheter och skyldigheter.", "tax_kat_förklaring": "Digitala system bär inbyggda maktstrukturer. Designval avgör vilka som inkluderas, vilken information som syns och hur beslut fattas. Den enskilde har rätt att förstå dessa val, ifrågasätta dem och delta i att förändra dem. Det förutsätter att det allmänna skapar förutsättningar för ett aktivt medborgarskap även i digitala miljöer.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 1 §) fastställer att all offentlig makt utgår från folket, RF 1 kap. 2 § fastställer det allmännas ansvar för delaktighet och möjlighet till inflytande. Förvaltningslagen (2017:900) 6 § kräver begriplig information, 7 § tillgänglighet. FN:s konvention om ekonomiska, sociala och kulturella rättigheter (ICESCR) fastslår att rätten till delaktighet gäller alla på ett lands territorium utan diskriminering. FN:s konvention om rättigheter för personer med funktionsnedsättning (CRPD) artikel 4.3 fastställer att konventionsstaterna aktivt ska involvera personer med funktionsnedsättning i beslutsprocesser som rör dem.", "tax_kat_eu_digital_rights": "Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a). Alla bör kunna göra välgrundade val och vara medvetna om hur algoritmer kan påverka dem (artikel 6a). Omfattande tillgång till och vidareutnyttjande av information från den offentliga sektorn ska säkerställas (artikel 7b).", "tax_kat_politik": "Demokratipolitik, förvaltningspolitik.", "tax_underkat": "3.5.1. Bristande inflytande över digitala samhällsfunktioner", "tax_underkat_beskrivning": "Bristande inflytande möjligheter att påverka hur digitala över digitala samhällsfunktioner utformas. Offentlig samhällsfunktioner digitalisering sker utan strukturer för delaktighet i design och utveckling. Aktiv involvering i utformningen av digitala samhällsfunktioner är en konventionsförpliktelse, inte en kvalitetsambition.", "taxonomi_id": "3.5.1", "kategori": "Bristande inflytande över digitala samhällsfunktioner", "barriartyp": "Makt", "situation_exempel": "Nytt kommunalt system driftsattes utan att medborgare fick tycka till", "radgivning": "Kommunen (synpunktshantering); JO (om beslutet påverkar rättigheter)", "tvist": "JO (bristande delaktighet vid myndighetsutövning); förvaltningsrätten (om beslutet kan överklagas)", "tillsynsmyndighet": "JO (enskilda fall). Ingen myndighet har systemtillsyn över att medborgare involveras i utformningen av digitala samhällsfunktioner. CRPD art. 4.3 kräver aktiv involvering av personer med funktionsnedsättning – men ingen svensk myndighet ansvarar för att det sker vid digitalisering.", "lagstod": "RF 1 kap. 1 § (all offentlig makt utgår från folket); RF 1 kap. 2 § (delaktighet och inflytande); Kommunallagen 5 kap.; CRPD art. 4.3; FL 6–7 §§", "tillsynstyp": "Vägledning", "tillsynslucka": "Ja", "empirisk_kalla": "RiR 2025:8 s. 26–50: 1 094 strategiska digitaliseringsprojekt – medborgarna har inget inflytande; nyttorealisering saknas systematiskt; kostnadsnyttoanalyser inkluderar sällan medborgarnyttor; 2/3 av myndigheter arbetar inte systematiskt med nyttorealisering. | Digg/PTS (2026) uppföljningsbilaga tabell 16: 50 % av kommuner samlar in behov (jmf 94 % statliga myndigheter); 14 % av kommuner saknar helt rutiner för återkoppling. | Feenberg (1992): teknikens utformning kan demokratiseras men bara om berörda har inflytande. | Raymond (2024) s. 52–65: samhällets feedbackloop innehåller viktiga indikatorer på digitala samhällshinder som är upphov till fördyrande dubbelarbete.", "lucka_status": "Ja"}, {"tax_huvusektion": "Kompetens och delaktighet", "tax_huvudsektion_beskrivning": "Det allmännas ansvar att tillhandahålla förutsättningar för digital delaktighet.", "tax_kat": "3.5. Digital makt och handlingsutrymme", "tax_kat_beskrivning": "Det allmänna har ansvar för att den enskilde kan förstå och påverka de digitala strukturer som villkorar rättigheter och skyldigheter.", "tax_kat_förklaring": "Digitala system bär inbyggda maktstrukturer. Designval avgör vilka som inkluderas, vilken information som syns och hur beslut fattas. Den enskilde har rätt att förstå dessa val, ifrågasätta dem och delta i att förändra dem. Det förutsätter att det allmänna skapar förutsättningar för ett aktivt medborgarskap även i digitala miljöer.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 1 §) fastställer att all offentlig makt utgår från folket, RF 1 kap. 2 § fastställer det allmännas ansvar för delaktighet och möjlighet till inflytande. Förvaltningslagen (2017:900) 6 § kräver begriplig information, 7 § tillgänglighet. FN:s konvention om ekonomiska, sociala och kulturella rättigheter (ICESCR) fastslår att rätten till delaktighet gäller alla på ett lands territorium utan diskriminering. FN:s konvention om rättigheter för personer med funktionsnedsättning (CRPD) artikel 4.3 fastställer att konventionsstaterna aktivt ska involvera personer med funktionsnedsättning i beslutsprocesser som rör dem.", "tax_kat_eu_digital_rights": "Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a). Alla bör kunna göra välgrundade val och vara medvetna om hur algoritmer kan påverka dem (artikel 6a). Omfattande tillgång till och vidareutnyttjande av information från den offentliga sektorn ska säkerställas (artikel 7b).", "tax_kat_politik": "Demokratipolitik, förvaltningspolitik.", "tax_underkat": "3.5.2. Öppen kunskap och demokratisk insyn", "tax_underkat_beskrivning": "Öppen kunskap och betalväggar eller komplexa system begränsar demokratisk insyn demokratisk insyn och jämlik kunskapsdelning. Avsaknad av öppna licenser och tillgängliga format hindrar den enskilde från att granska och använda information som borde vara allmänt tillgänglig.", "taxonomi_id": "3.5.2", "kategori": "Öppen kunskap och demokratisk insyn", "barriartyp": "Makt", "situation_exempel": "Kommunens digitaliseringsprojekt kostade miljoner men det finns ingen slutrapport, ingen öppen källkod och ingen dokumentation av hur systemen fungerar. Jag som invånare kan inte granska vad jag betalat för.", "radgivning": "Resp. myndighet (begära allmän handling, TF 2 kap.); kommunens revisorer; JO (om insyn nekas)", "tvist": "Kammarrätten (överklagande av sekretessbeslut); JO", "tillsynsmyndighet": "Ingen samlad. JO (offentlighetsprincipen, enskilda fall). Digg (öppna data – men vägledning, inte tillsyn). Ingen myndighet har tillsyn över att offentlig digitalisering dokumenteras, delas öppet eller görs granskningsbar.", "lagstod": "TF 2 kap. (offentlighetsprincipen); RF 1 kap. 1 § (all offentlig makt utgår från folket); EU AI Act kap. IV (transparens för högrisk-AI)", "tillsynstyp": "Tillsyn (TF) / Vägledning (öppna data)", "tillsynslucka": "Ja – offentlighetsprincipen gäller handlingar men inte kod, designval eller systemdokumentation.", "empirisk_kalla": "Bara 32 % av statliga myndigheter har antagit principen \"öppet som standard\". Utan slutrapporter, öppen källkod och tillgänglig dokumentation kan varken invånare, forskare eller andra myndigheter granska eller lära av digitaliseringsprojekt. RiR 2025:8 s. 38–42: styrdokument upprättas inte systematiskt; utan slutrapporter sprids lärdomar ej; samverkan och erfarenhetsutbyte sker sällan. | Digg/PTS (2026) uppföljningsbilaga tabell 20: 23 400 datamängder på Sveriges dataportal varav 17 156 öppna – men bara 854 publicerade av kommuner. 32 % av myndigheter har antagit \"öppet som standard\". | Riksrevisionen (2025) Statliga strategiska digitaliseringsprojekt – stora gemensamma utmaningar. RiR 2025:8. s. 38–42: Samverkan och erfarenhetsutbyte sker sällan. Styrdokument (projektplaner, slutrapporter) upprättas inte systematiskt. Utan slutrapport: lärdomar sprids ej. Agila arbetssätt riskerar minskat helhetsperspektiv och att insikter stannar inom projektet. | Forbrukerrådet (2026) Breaking free: plattformar stänger API:er som forskare och journalister behöver för insyn.", "lucka_status": "Ja"}]


var SECTION_TEXTS={"Systembarriärer": {"ingress": "Strukturella hinder i teknikens utformning och infrastruktur som skapar ojämlika villkor för delaktighet.", "text": "Systembarriärer uppstår när digitala lösningar och infrastrukturer är utformade på sätt som inte tar hänsyn till alla människors behov, förutsättningar eller rättigheter. Dessa hinder är inbyggda i själva systemen genom exempelvis otillräcklig teknisk interoperabilitet eller ensidigt fokus på effektivisering. Resultatet blir att vissa utestängs redan i design- och implementeringsfasen."}, "Sårbarheter": {"ingress": "Livsomständigheter som systemen inte är utformade att hantera.", "text": "Systembarriärer drabbar inte alla lika. Vissa livsomständigheter, till exempel ekonomisk utsatthet, funktionsnedsättning, skyddsbehov, livskris, migrationsstatus eller att vara barn eller ung, gör att systemens brister får allvarligare konsekvenser. Dessa omständigheter uppträder sällan ensamma och förstärker varandra: en person med funktionsnedsättning som samtidigt lever i ekonomisk utsatthet möter fler och högre barriärer än vad varje omständighet hade skapat för sig. Det är inte omständigheterna i sig som skapar exkludering, utan att systemen inte är utformade för den variation som finns i befolkningen.\n\nDenna sektion kartlägger vilka livsomständigheter som faller utanför systemens designantaganden. Syftet är inte att kategorisera människor utan att synliggöra var det allmänna brister i att utforma system som fungerar för alla."}, "Kompetens och delaktighet": {"ingress": "Det allmännas ansvar att organisera bildning, stöd och inflytande för digital delaktighet.", "text": "Kompetens är inte en statisk egenskap hos individen. Enligt Ellström (1992) kan den förstås som den potentiella handlingsförmågan i relation till en specifik situation, uppgift eller kontext. Förmågan uppstår i mötet mellan individens resurser och de krav och handlingsutrymmen som omgivningen skapar.\n\nDigitala samhällsfunktioner utgör uppgifter som den enskilde förväntas klara av. Uppgifterna är inte neutrala utan definieras av systemens design, juridiska krav och organisatoriska prioriteringar. De speglar därmed vilka behov och beteenden som tas för givna. När digitala processer är hårt standardiserade och saknar alternativ begränsas handlingsutrymmet. Ökad individuell kompetens kan då inte kompensera för strukturella hinder. I en digital välfärdsstat innebär detta att det offentliga inte bara definierar uppgifterna utan också ansvarar för att de är möjliga att förstå och genomföra.\n\nSektionen är uppdelad i fem kategorier som belyser olika aspekter av detta ansvar. De två första (3.1–3.2) beskriver vad den enskilde behöver kunna — med DigComp och MIK som referensramar. Den tredje (3.3) beskriver vad den enskilde möter när kompetensen inte räcker — orientering, byråkratisk komplexitet och system som inte går att överblicka. Den fjärde (3.4) beskriver vad det allmänna saknar i form av stödstrukturer. Den femte (3.5) beskriver den enskildes rätt att förstå och påverka de digitala strukturer som villkorar rättigheter och skyldigheter."}};
var ABOUT_SECTIONS=[{"title": "Om ramverket för rättighetsefterlevnad", "text": "Digitalisering av samhällsfunktioner förändrar villkoren för hur rättigheter utövas och skyldigheter fullgörs. Ramverket kartlägger var det allmänna brister i att säkerställa att detta kan ske på jämlika villkor. Här granskas systembarriärer i teknikens utformning, livsomständigheter som systemen inte är utformade att hantera och det allmännas ansvar för digital delaktighet. Ramverket utgår från gällande lagstiftning och riktar sig till beslutsfattare och styrgrupper med ansvar för digitalisering i offentlig sektor."}, {"title": "Bakgrund", "text": "Ett legitimt välfärdssystem förutsätter att rättigheter och skyldigheter inte bara finns formellt utan kan utövas och fullgöras på jämlika villkor. Digitalisering av samhällsfunktioner sätter den förutsättningen på prov.\n\nI svensk digitaliseringspolicy behandlas digital exkludering huvudsakligen som en kompetensfråga. Begrepp som digitalt utanförskap klumpar ihop vitt skilda situationer – otillgänglig teknik, livskriser, funktionsnedsättningar, bristande infrastruktur – och sorterar dem som ett gemensamt avstånd till en digital norm. Insatser för att öka digital inkludering riktas i huvudsak mot individens förmåga i form av utbildning, stödfunktioner och informationskampanjer. Dessa insatser fyller en funktion, men de förbigår ansvaret: när systemen själva skapar barriärerna kan svaret inte vara att anpassa människor till systemen.\n\nNär socialpolitiska, utbildningspolitiska och arbetsmarknadspolitiska frågor omformuleras till digitaliseringsfrågor förskjuts ansvaret. Bredare välfärdspolitiska brister behandlas som tekniska problem. Resultatet blir att insatser riktas mot symptom och inte mot de strukturella orsaker som avgör om digitalt förmedlade samhällsfunktioner faktiskt fungerar för alla.\n\nDetta ramverk utgår från det allmännas ansvar och granskar hur system, ansvarsfördelning och styrning villkorar möjligheten att utöva sociala r
