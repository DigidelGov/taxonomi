<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigidelGov – Taxonomi-utforskare</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&family=Inter:wght@300;400;500;600&display=swap');
:root {
  --bg:#faf9f7;--surface:#fff;--surface2:#f5f3f0;--surface3:#eceae6;
  --border:#ddd9d3;--border-light:#e8e5e0;--text:#1a1a1a;--text-dim:#5c5750;--text-muted:#8c877e;
  --accent:#2c5f8a;--accent-light:#e8f0f7;--accent-hover:#1e4a6e;
  --ja:#c0392b;--ja-bg:#fdf0ef;--delvis:#d4880f;--delvis-bg:#fdf6ec;--nej:#27834a;--nej-bg:#eef7f1;
  --law-bg:#f7f5f0;--eu-bg:#f0f5f7;--tag-bg:#f0ede8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;font-size:14px}
.app{max-width:1400px;margin:0 auto;padding:28px 24px}
header{margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid var(--border)}
header h1{font-family:'Source Serif 4',Georgia,serif;font-size:24px;font-weight:600;letter-spacing:-0.01em}
header p{color:var(--text-dim);font-size:13px;margin-top:3px}
.stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border-light);border-radius:6px;padding:10px 16px;min-width:110px}
.stat-val{font-family:'Source Serif 4',serif;font-size:22px;line-height:1}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:2px}
.stat.ja .stat-val{color:var(--ja)}.stat.delvis .stat-val{color:var(--delvis)}.stat.nej .stat-val{color:var(--nej)}.stat.total .stat-val{color:var(--accent)}
.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:240px;position:relative}
.search-box input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:9px 12px 9px 34px;font-family:inherit;font-size:13px;color:var(--text);outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text-muted)}
.search-box::before{content:'\2315';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px}
.fbtn{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:7px 13px;color:var(--text-dim);font-family:inherit;font-size:12px;cursor:pointer;transition:all .12s;white-space:nowrap}
.fbtn:hover{border-color:var(--accent);color:var(--text)}.fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.fg{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.fg-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-right:3px}
.main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:70vh}
@media(max-width:900px){.main{grid-template-columns:1fr}}
.catlist{background:var(--surface);border:1px solid var(--border-light);border-radius:8px;overflow-y:auto;max-height:78vh}
.catlist::-webkit-scrollbar{width:4px}.catlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.grp-hdr{padding:8px 14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);background:var(--surface2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;cursor:pointer;transition:color .12s}
.grp-hdr:hover{color:var(--accent)}
.grp-hdr.selected{color:var(--accent);background:var(--accent-light)}
.cat-item{padding:10px 14px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:background .1s;display:flex;align-items:flex-start;gap:9px}
.cat-item:hover{background:var(--surface2)}
.cat-item.selected{background:var(--accent-light);border-left:3px solid var(--accent)}
.cat-item .ci-id{font-size:11px;font-weight:600;color:var(--text-muted);min-width:32px;padding-top:1px}
.cat-item .ci-name{font-size:12.5px;color:var(--text);flex:1}
.ci-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.ci-dot.ja{background:var(--ja)}.ci-dot.delvis{background:var(--delvis)}.ci-dot.nej{background:var(--nej)}
.detail{background:var(--surface);border:1px solid var(--border-light);border-radius:8px;padding:24px;overflow-y:auto;max-height:78vh}
.detail::-webkit-scrollbar{width:4px}.detail::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.d-empty{display:flex;align-items:center;justify-content:center;height:300px;color:var(--text-muted);font-size:13px;text-align:center}
.d-hdr{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border-light)}
.d-id{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
.d-title{font-family:'Source Serif 4',serif;font-size:20px;font-weight:600;line-height:1.3;margin-bottom:8px}
.d-desc{font-size:13.5px;color:var(--text-dim);line-height:1.6}
.d-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.mtag{font-size:10px;padding:3px 10px;border-radius:16px;border:1px solid var(--border);color:var(--text-dim)}
.mtag.ja{border-color:var(--ja);color:var(--ja);background:var(--ja-bg)}
.mtag.delvis{border-color:var(--delvis);color:var(--delvis);background:var(--delvis-bg)}
.mtag.nej{border-color:var(--nej);color:var(--nej);background:var(--nej-bg)}
.sit-quote{background:var(--surface2);border-left:3px solid var(--accent);padding:12px 16px;border-radius:0 6px 6px 0;font-style:italic;font-size:13px;line-height:1.55;margin-bottom:16px;color:var(--text)}
.iblock{margin-bottom:16px}
.iblock-t{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.iblock-c{font-size:13px;line-height:1.65;color:var(--text)}
.law-box{background:var(--law-bg);border-radius:7px;padding:14px 18px;margin-bottom:14px}
.eu-box{background:var(--eu-bg);border-radius:7px;padding:14px 18px;margin-bottom:14px}
.lucka-box{border-radius:7px;padding:14px 18px;margin-bottom:14px}
.lucka-box.ja{background:var(--ja-bg);border:1px solid rgba(192,57,43,.15)}
.lucka-box.delvis{background:var(--delvis-bg);border:1px solid rgba(212,136,15,.15)}
.lucka-box.nej{background:var(--nej-bg);border:1px solid rgba(39,131,74,.15)}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:1100px){.dgrid{grid-template-columns:1fr}}
.dcard{background:var(--surface2);border-radius:6px;padding:12px}
.dcard .iblock-c{font-size:12px;color:var(--text-dim)}
.emp-scroll{font-size:12px;color:var(--text-dim);line-height:1.65;max-height:160px;overflow-y:auto;padding-right:6px}
.emp-scroll::-webkit-scrollbar{width:3px}.emp-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ptag{display:inline-block;background:var(--tag-bg);border:1px solid var(--border);border-radius:16px;padding:3px 12px;font-size:11px;color:var(--text-dim);margin-right:4px;margin-bottom:4px}
.collapse-btn{font-size:11px;color:var(--accent);cursor:pointer;border:none;background:none;font-family:inherit;padding:4px 0;margin-top:4px}
.collapse-btn:hover{color:var(--accent-hover)}
.collapsed{display:none}
.uk-list-compact{margin-top:16px}
.uk-list-compact .cat-item{padding:8px 12px}
.uk-list-compact .ci-id{font-size:10px;min-width:28px}
.uk-list-compact .ci-name{font-size:11.5px}
footer{margin-top:32px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted)}
</style>
</head>

nteretableringar konkurrerar om elkapacitet och IKT-sektorn beräknas stå för 2--4 procent av globala växthusgasutsläpp. Trots detta saknar det allmänna systematiska krav på att pröva energi- och resursdimensionen vid etablering av digital infrastruktur i offentlig verksamhet. Digg och PTS bedömer att det inom en snar framtid blir aktuellt att räkna på klimat- och miljöeffekter i alla nyetableringar och nya digitala projekt (Digg, PTS 2026).", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för att främja jämlikhet, vilket förutsätter digital infrastruktur som omfattar alla. Förvaltningslagen (2017:900) 7 § kräver att myndigheter ska vara tillgängliga. Konsumentköplagen (2022:260) 1 kap. 7 § omfattar digitala tjänster, även när konsumenten betalar med sina personuppgifter.", "tax_kat_eu_digital_rights": "EU-förklaringen om digitala rättigheter och principer för det digitala decenniet (2023) fastställer att alla i EU ska ha tillgång till konnektivitet med hög hastighet och till rimligt pris, inklusive personer med låga inkomster (artikel 3). Den digitala omställningen ska gagna alla och i synnerhet innefatta människor i landsbygdsområden, personer med funktionsnedsättning och marginaliserade grupper (artikel 2c). Marknadsaktörer som drar nytta av den digitala omställningen ska bidra till kostnaderna för kollektiva nyttigheter och offentliga infrastrukturer (artikel 2c). Digitala produkter och tjänster ska utformas med hänsyn till miljöpåverkan och hållbarhet (artikel 23).", "tax_kat_politik": "Infrastrukturpolitik, regionalpolitik och konsumentpolitik.", "tax_underkat": "1.1.7. Tekniknedläggning", "tax_underkat_beskrivning": "Situationer där avveckling av befintlig infrastruktur (2G/3G, koppar, kontanttjänster) skapar nya barriärer utan att fullgoda ersättningar finns på plats", "taxonomi_id": "1.1.7", "kategori": "Tekniknedläggning", "barriartyp": "Infrastruktur", "situation_exempel": "2G/3G stängs av och jag kan inte ringa 112 längre", "radgivning": "PTS", "tvist": "PTS (vid brister i övergångsplan)", "tillsynsmyndighet": "PTS", "lagstod": "SFS 2003:389 (LEK); EU 2018/1972 (EECC)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Delvis", "empirisk_kalla": "Digg/PTS (2026) Uppföljning digitaliseringsstrategin, s. 48–49: 67 000 telefoner blockerade vid 2G/3G-nedstängning dec 2025. Expressen (2026) Familj Tandlund.", "lucka_status": "Delvis"}, {"tax_huvusektion": "Systembarriärer", "tax_huvudsektion_beskrivning": "Strukturella hinder i teknikens utformning och infrastruktur som skapar ojämlika villkor för delaktighet", "tax_kat": "1.2. Villkorad digital åtkomst", "tax_kat_beskrivning": "När digitala samhällsfunktioner kräver särskilda tekniska resurser riskerar tillgången att bli ojämlik.", "tax_kat_förklaring": "Rättsliga, tekniska och administrativa barriärer -- som krav på e-legitimation, kontokoppling eller teknisk utrustning -- kan begränsa möjligheten att utöva rättigheter och fullgöra skyldigheter. Resultatet hindrar det allmänna från att uppfylla sitt ansvar för delaktighet och jämlikhet.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § kräver begriplig information, 7 § tillgänglighet och 8 § samverkan mellan myndigheter. Hälso- och sjukvårdslagen (2017:30) 13a kap. 1 § kräver att primärvården ska vara lätt tillgänglig. Diskrimineringslagen (2008:567) 1 kap. 4 § förbjuder indirekt diskriminering, vilket kan uppstå när teknikvillkor missgynnar vissa grupper. Lagen om tillgänglighet till digital offentlig service (2018:1937) ställer krav på att digital offentlig service ska vara möjlig att uppfatta, hantera, begripa och robust. Europaparlamentets och rådets förordning (EU) 2022/2065 om digitala tjänster ställer krav på transparens, ansvarsskyldighet och insyn i algoritmiska system för plattformar som förmedlar samhällsinformation.", "tax_kat_eu_digital_rights": "Alla bör erbjudas möjlighet att använda en tillgänglig, frivillig, säker och tillförlitlig digital identitet som ger tillgång till ett brett utbud av onlinetjänster (artikel 7a). Utformning, utveckling och användning av tekniska lösningar ska respektera de grundläggande rättigheterna och göra det möjligt att utöva dessa (artikel 2a). Den digitala omställningen ska i synnerhet innefatta äldre, personer med funktionsnedsättning och marginaliserade grupper, ingen ska lämnas utanför (artikel 2b). Digitala offentliga tjänster ska vara sömlösa, säkra och interoperabla, i synnerhet digitala hälso- och sjukvårdstjänster (artikel 7c).", "tax_kat_politik": "Förvaltningspolitik och socialpolitik.", "tax_underkat": "1.2.1. E-legitimations-exkludering", "tax_underkat_beskrivning": "Utan e-legitimation går stora delar av det digitala samhället inte att nå. Enligt Betalningsutredningens beräkningar saknar ungefär en tiondel av den vuxna befolkningen tillgång till BankID", "taxonomi_id": "1.2.1", "kategori": "E-legitimationsexkludering", "barriartyp": "Åtkomst", "situation_exempel": "BankID krävs – jag har inget och kan inte skaffa det", "radgivning": "Digg; Banken; Statens servicecenter", "tvist": "JO (om myndighet saknar alternativ)", "tillsynsmyndighet": "Digg / resp. myndighet", "lagstod": "SFS 2018:1937 (DOS-lagen); FL 7 §", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja", "empirisk_kalla": "PRO/Begripsam (2024) Så använder PRO:s (digitala) medlemmar internet, s. 12–14. | Raymond, T. (2025) Gotland i en digital tid, s. 51–52. | Länsstyrelserna (2025) När betaltjänster är otillgängliga – Berättelser från verkligheten. Persona Siw (81 år, Örebro): vågar inte använda BankID självständigt efter bedrägeriförsök; banken hänvisade till anhöriga. Persona Saga (21 år, LSS-boende): saknar BankID, kan inte beställa möbler online – fick betala 8 000 kr mer i butik. | IOM/DTM (2023) Ukrainians and Third-Country Nationals under Temporary Protection in Sweden – Needs, Intentions and Challenges. June 2023. s. 6, 8: 00) 6 § kräver begriplig information, 7 § tillgänglighet och 8 § rätt till biträde när det behövs. Hälso- och sjukvårdslagen (2017:30) 3 kap. 1 § fastställer vård på lika villkor och behovsbaserad prioritering, 13a kap. 1 § kräver att primärvården ska vara lätt tillgänglig. Socialtjänstlagen (2025:400) 8 kap. 10 § fastställer att personer med funktionsnedsättning ska ges möjlighet att delta i samhällets gemenskap. Lagen om tillgänglighet till digital offentlig service (2018:1937) ställer krav på att digital offentlig service ska vara möjlig att uppfatta, hantera, begripa och robust.", "tax_kat_eu_digital_rights": "Den digitala omställningen bör inte innebära en tillbakagång vad gäller rättigheter, och förklaringen påverkar inte rätten till tillgång till viktiga offentliga samhällsfunktioner offline (ingressen, punkt 3). Alla bör ha tillgång online till viktiga offentliga tjänster i hela EU (artikel 7).", "tax_kat_politik": "Förvaltningspolitik och socialpolitik.", "tax_underkat": "1.3.1. Ansvarsförskjutning via digital självservice  (exempel 1 av 2)", "tax_underkat_beskrivning": "Ärenden som rör ekonomisk utsatthet, sjukdom, våld via digital självservice eller rättslig osäkerhet hanteras digitalt utan alternativ. Systemet förutsätter att den enskilde klarar självbetjäning i situationer där det sällan är rimligt.", "taxonomi_id": "1.3.1", "kategori": "Ansvarsförskjutning via digital självservice  (exempel 1 av 2)", "barriartyp": "Alternativ", "situation_exempel": "Hemtjänsten kräver att jag beställer mat på nätet – jag är 85 och synskadad och klarar inte det", "radgivning": "Kommunens socialtjänst; patientnämnden", "tvist": "IVO (om insatsen inte möter behovet); JO", "tillsynsmyndighet": "IVO / kommunen", "lagstod": "SFS 2025:400 (SoL) 2 kap. 4 § (lätt tillgänglig); 8 kap. 2–3 §§ (äldres självständighet); FL 7–8 §§", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja", "empirisk_kalla": "Sveriges radio (2026-02-12) Äldre tvingas handla mat digitalt – Johan: ”Blev omöjlig et. Förvaltningslagen (2017:900) 6 § kräver begriplig information, 7 § tillgänglighet och 8 § rätt till biträde när det behövs. Hälso- och sjukvårdslagen (2017:30) 3 kap. 1 § fastställer vård på lika villkor och behovsbaserad prioritering, 13a kap. 1 § kräver att primärvården ska vara lätt tillgänglig. Socialtjänstlagen (2025:400) 8 kap. 10 § fastställer att personer med funktionsnedsättning ska ges möjlighet att delta i samhällets gemenskap. Lagen om tillgänglighet till digital offentlig service (2018:1937) ställer krav på att digital offentlig service ska vara möjlig att uppfatta, hantera, begripa och robust.", "tax_kat_eu_digital_rights": "Den digitala omställningen bör inte innebära en tillbakagång vad gäller rättigheter, och förklaringen påverkar inte rätten till tillgång till viktiga offentliga samhällsfunktioner offline (ingressen, punkt 3). Alla bör ha tillgång online till viktiga offentliga tjänster i hela EU (artikel 7).", "tax_kat_politik": "Förvaltningspolitik och socialpolitik.", "tax_underkat": "1.3.4. Temporära systemavbrott", "tax_underkat_beskrivning": "Temporära systemavbrott driftstörningar lägger konsekvenserna av systemfel på den enskilde.", "taxonomi_id": "1.3.4", "kategori": "Temporära systemavbrott", "barriartyp": "Alternativ", "situation_exempel": "Jag ska lämna aktivitetsrapport till Arbetsförmedlingen men systemet ligger nere – missar jag deadline riskerar jag varning och indragen ersättning", "radgivning": "Arbetsförmedlingen (telefon); a-kassan", "tvist": "JO; a-kassan (omprövning av sanktionsbeslut)", "tillsynsmyndighet": "IAF (Inspektionen för arbetslöshetsförsäkringen); JO", "lagstod": "FL 6–7 §§; SFS 2018:1937 (DOS-lagen); 43 § ALF (1997:238)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – IAF har konstaterat systembrister men ingen kräver att reservrutiner skyddar den enskilde från rättsförlust vid driftstopp", "empirisk_kalla": "Dagens Arena (2013) Efter Arbetsförmedlingens misstag: 6 000 arbetslösa riskerar varning", "lucka_status": "Ja"}, {"tax_huvusektion": "Systembarriärer", "tax_huvudsektion_beskrivning": "Strukturella hinder i teknikens utformning och infrastruktur som skapar ojämlika villkor för delaktighet", "tax_kat": "1.4. Digital otrygghet och otydlighet", "tax_kat_beskrivning": "Otransparenta tekniska miljöer underminerar den enskildes rätt till förståelse och självbestämmande.", "tax_kat_förklaring": "När digitala system inte tydligt visar vad som händer med information, vem som har tillgång till uppgifter eller vilka konsekvenser ett val kan få, skapas en osäkerhet som det allmänna inte kan lämna åt individen att hantera ensam. Otrygghet är inte bara ett upplevt problem. Det är en systembrist när förutsättningarna för informerat handlande saknas. Bristerna tar sig olika uttryck beroende på arena -- från välfärdsteknik och uppkopplade enheter i hemmet till appar som spårar rörelse -- men grundproblemet är detsamma: den enskilde saknar insyn i vad som sker med deras uppgifter.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Regeringsformen (RF 2 kap. 6 §) skyddar mot betydande intrång i den personliga integriteten, om det sker utan samtycke och innebär övervakning eller kartläggning av den enskildes personliga förhållanden. Förvaltningslagen (2017:900) 6 § kräver begriplig information, 7 § tillgänglighet och 10 § fastställer rätten att ta del av uppgifter. Hälso- och sjukvårdslagen (2017:30) 3 kap. 1 § fastställer vård på lika villkor. Diskrimineringslagen (2008:567) 1 kap. 4 § förbjuder diskriminering genom bristande tillgänglighet. Europaparlamentets och rådets förordning (EU) 2022/2065 om digitala tjänster ställer krav på transparens, ansvarsskyldighet och insyn i algoritmiska system för plattformar som förmedlar samhällsinformation.", "tax_kat_eu_digital_rights": "Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a). Alla ska ha kontroll över sina egna data (artikel 5). AI bör fungera som verktyg för människor med det slutliga målet att öka välbefinnande (artikel 8). Alla bör skyddas mot risker och negativa konsekvenser för hälsa, säkerhet och grundläggande rättigheter från algoritmiska system (artikel 9). Digitala offentliga tjänster, i synnerhet hälso- och sjukvårdstjänster, ska vara sömlösa, säkra och begripliga (artikel 7c). Alla har rätt till integritet och skydd av sina personuppgifter (artikel 17). Ingen ska utsättas för olaglig övervakning eller spårning online (artikel 18).", "tax_kat_politik": "Förvaltningspolitik, rättspolitik, hälso- och sjukvårdspolitik.", "tax_underkat": "1.4.1. Integritetskränkningar", "tax_underkat_beskrivning": "Bristande insyn i hur personuppgifter hanteras i Integri digitala samhällsfunktioner skapar en strukturell tets-kränkningar maktasymmetri. Den enskilde förväntas ge samtycke till villkor som inte är begripliga och saknar möjlighet att följa vad som faktiskt sker med uppgifterna.", "taxonomi_id": "1.4.1", "kategori": "Integritetskränkningar", "barriartyp": "Otrygghet", "situation_exempel": "Jag måste godkänna villkor jag inte förstår för att använda en digital samhällstjänst – säger jag nej förlorar jag tillgången", "radgivning": "IMY; kommunal konsumentvägledning", "tvist": "IMY (klagomål); ARN (om konsumenttjänst, ej bindande)", "tillsynsmyndighet": "IMY", "lagstod": "GDPR 2016/679; SFS 2018:218 (dataskyddslagen)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Delvis – IMY har tillsyn men konstaterar själv att samtycke ofta används felaktigt som rättslig grund av myndigheter och företag", "empirisk_kalla": "IMY: samtycke ogiltigt vid ojämlikt maktförhållande och \"paketering\", https://www.imy.se/verksamhet/dataskydd/det-har-galler-enligt-gdpr/rattslig-grund/samtycke/", "lucka_status": "Delvis"}, {"tax_huvusektion": "Systembarriärer", "tax_huvudsektion_beskrivning": "Strukturella hinder i teknikens utformning och infrastruktur som skapar ojämlika vill gande rättigheter och möjliggör utövandet av dessa (artikel 2a). Den digitala omställningen ska i synnerhet innefatta äldre, personer med funktionsnedsättning och marginaliserade grupper, och bör främja kulturell och språklig mångfald (artikel 2b). Alla bör skyddas mot risker och negativa konsekvenser för hälsa, säkerhet och grundläggande rättigheter från algoritmiska system (artikel 9).", "tax_kat_politik": "Förvaltningspolitik, funktionsrättspolitik, demokratipolitik,", "tax_underkat": "1.5.4. Kognitiv belastning", "tax_underkat_beskrivning": "Kognitiv belastning steg, korta tidsgränser eller komplex information skapar hinder för den som behöver mer tid eller tydligare struktur.", "taxonomi_id": "1.5.4", "kategori": "Kognitiv belastning", "barriartyp": "Design", "situation_exempel": "Ansökan har så många steg och tidsgränser att jag inte hinner tänka – jag ger upp halvvägs", "radgivning": "Resp. myndighet (begära hjälp, FL 6 §); Statens servicecenter", "tvist": "JO (om myndighet brister i tillgänglighet och service)", "tillsynsmyndighet": "Digg (DOS-lagen); JO; DO (om funktionsnedsättning, diskrimineringslagen)", "lagstod": "FL 6–7 §§ (smidiga kontakter, tillgänglighet); SFS 2018:1937 (DOS-lagen); Diskrimineringslagen (2008:567) 1 kap. 4 § (bristande tillgänglighet som diskriminering)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Delvis – WCAG ställer krav på tillräcklig tid (2.2.1) och begriplig information (3.1) men Digg bedriver inte tillsyn i den utsträckning EU kräver (RiR 2023:6). Kognitiv tillgänglighet saknar specifika krav i nuvarande standard.", "empirisk_kalla": "RiR 2023:6: personer med NPF beskriver stress, oro och osäkerhet i digitala tjänster. BankID: tidsgränser vid identifiering kan inte förlängas – bedöms av BankID som nödvändigt för säkerheten.", "lucka_status": "Delvis"}, {"tax_huvusektion": "Systembarriärer", "tax_huvudsektion_beskrivning": "Strukturella hinder i teknikens utformning och infrastruktur som skapar ojämlika villkor för delaktighe el 7b). Marknadsaktörer som drar nytta av den digitala omställningen ska bidra till kostnaderna för kollektiva nyttigheter och offentliga infrastrukturer (artikel 2c).", "tax_kat_politik": "Förvaltningspolitik och socialpolitik.", "tax_underkat": "1.6.5. Effektivitetslogik utan rättvisevägning", "tax_underkat_beskrivning": "Offentlig digitalisering styrs ofta genom snäva Effe nyttokalkyler utan att väga in tillgänglighet, ktivitetslogik rättvisa eller den enskildes inflytande. utan ättvisevägning", "taxonomi_id": "1.6.5", "kategori": "Effektivitetslogik utan rättvisevägning", "barriartyp": "Styrning", "situation_exempel": "Kommunen räknade på vad de sparar genom att skicka post digitalt – men inte på vad jag behöver för att ta emot digital post, att mina anhöriga lägger timmar på att hjälpa mig, eller vad som händer när jag missar ett brev och hamnar hos Kronofogden eller missar en läkartid", "radgivning": "Resp. myndighet (begära fysisk post); Kronofogden (invändning vid krav); kommunal konsumentvägledning", "tvist": "Kronofogden (invändning mot betalningsföreläggande); förvaltningsrätten; JO", "tillsynsmyndighet": "Digg (digital post som infrastruktur); JO; kommunens revisorer", "lagstod": "FL 6–7 §§ (tillgänglighet, service); SFS 2023:704 (lagen om auktoriserade digitala brevlådor); SFS 2024:183 (konsekvensutredningsförordningen); delgivningslagen (2010:1932)", "tillsynstyp": "Vägledning", "tillsynslucka": "Ja – standardmall för nyttokalkyl saknar rutinmässigt poster för invånarens kostnader. Konsekvensutredningsförordningen kräver analys men ingen granskar att den genomförs.", "empirisk_kalla": "Raymond, T. (2025) Gotland i en digital tid: genomgång av Ineras nyttokalkylmall visar att poster för invånarens och anhörigas kostnader saknas. SR Plånboken (2020): 14-åring med Kivra-konto missade post från Skatteverket, hamnade hos Kronofogden. Kivra/Digg: fysiskt porto 7 kr, digitalt 2 kr – besparingen styr beslutet.", "lucka_status": "Ja"}, {"tax_huvusektion": "Syst ax_underkat": "1.6.6. Regelverk som skapar oavsiktlig exkludering", "tax_underkat_beskrivning": "Regelverk som penningtvättlagen eller kundkännedomsregler kan oavsiktligt utestänga Regelverk som invånare och företag. Problemet uppstår när olika skapar myndigheters regelverk inte är samordnade eller när oavsiktlig implementeringen inte tar hänsyn till de grupper exkludering som lagen avser att skydda.", "taxonomi_id": "1.6.6", "kategori": "Regelverk som skapar oavsiktlig exkludering", "barriartyp": "Styrning", "situation_exempel": "Banken stängde mitt företagskonto för att kunderna inte uppfyllde kundkännedomskraven – nu är jag utan betalkonto, utan BankID och kan inte betala skatt, räkningar eller skicka pengar till min dotter", "radgivning": "Konsumenternas Bank- och finansbyrå; Länsstyrelsen (betaltjänstlagen); kommunal budget- och skuldrådgivning", "tvist": "ARN bankavdelningen (ej bindande); allmän domstol; Finansinspektionen (klagomål)", "tillsynsmyndighet": "Finansinspektionen (bankernas kundkännedom och betalkontodirektivet); Länsstyrelsen (betaltjänstlagen)", "lagstod": "Betaltjänstlagen (2010:751) 4a kap. (rätt till betalkonto); penningtvättslagen (2017:630); EU betalkontodirektivet (2014/92/EU)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – penningtvättslagen kräver kundkännedom men betaltjänstlagen ger rätt till betalkonto. ", "empirisk_kalla": "Regelverken är inte samordnade. Bankerna tolkar penningtvättsreglerna så att de i praktiken övertrumfar rätten till betalkonto. Kommunens skuldrådgivning nekade hjälp för att gården räknas som näringsverksamhet. Ingen instans äger konflikten mellan regelverken. Länsstyrelserna (2025) När betaltjänster är otillgängliga – Berättelser från verkligheten. Persona Anders (52 år, egenföretagare): penningtvättsregler ledde till att två banker sa upp kontot; nekas nytt konto pga betalningsanmärkning. Skulder vuxit till 50 000 kr för att betalningar inte kan göras utan konto. SOU 2023:16 (Staten och betalningarna) adresserar problematiken.", "lucka_status": "Ja"}, {"tax_huvusektion": "Systembarriärer", "tax_huvudsektion_beskrivning": "Strukturella hinder i teknikens utformning och infrastruktur som skapar ojämlika villkor för delaktighet", "tax_kat": "1.6. Ansvarsluckor och bristande styrning", "tax_kat_beskrivning": "Många digitala system är inte exkluderande i sig men blir det i mötet med andra system. Problemet är att ingen har ansvar för helheten.", "tax_kat_förklaring": "Myndigheter och leverantörer fokuserar ofta på sin del i kedjan, men inte på hur den samverkar med andra eller vilka barriärer det skapar för den enskilde. Resultatet är styrningsluckor där ingen fullt ut ansvarar för delaktighet, tillgång eller alternativ.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § kräver begriplig information, 7 § tillgänglighet och 8 § att myndigheter samverkar med varandra. Hälso- och sjukvårdslagen (2017:30) 13 kap. 8 § kräver individuell plan när den enskilde behöver insatser från både socialtjänsten och hälso- och sjukvården. Socialtjänstlagen (2025:400) 7 kap. 1--2 §§ kräver att kommunen planerar insatser och ingår samverkansöverenskommelser med regionen. Konsekvensutredningsförordningen (SFS 2024:183) 6--7 §§ kräver analys av kostnader och intäkter men inte av exkluderingseffekter eller tillgänglighetskonsekvenser. Statskontoret ansvarar för metodutveckling (15 §).", "tax_kat_eu_digital_rights": "Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a). Digitala offentliga tjänster ska vara sömlösa, säkra och interoperabla (artikel 7c). Omfattande tillgång till och vidareutnyttjande av information från den offentliga sektorn ska säkerställas (artikel 7b). Marknadsaktörer som drar nytta av den digitala omställningen ska bidra till kostnaderna för kollektiva nyttigheter och offentliga infrastrukturer (artikel 2c).", "tax_kat_politik": "Förvaltningspolitik och socialpolitik.", "tax_underkat": "1.6.7. Fragmenterad implementering av EU-direktiv", "tax_underkat_beskrivning": "EU-direktiv som genomförs genom ändringar i flera Implementering svenska lagar riskerar att splittra tillsynsansvar av EU-direktiv och försvaga det avsedda skyddet. Riksrevisionen har konstaterat att tillsyn enligt DOS-lagen inte bedrivs i den utsträckning EU kräver (RiR 2023:6).", "taxonomi_id": "1.6.7", "kategori": "Fragmenterad implementering av EU-direktiv", "barriartyp": "Styrning", "situation_exempel": "Myndighetens webbplats är inte tillgänglig för mig som synskadad – EU-direktivet kräver att den ska vara det, men tillsynen hinner inte granska", "radgivning": "Digg (anmäl bristande tillgänglighet); resp. myndighet", "tvist": "Digg (tillsynsbeslut); DO (om diskriminering pga funktionsnedsättning)", "tillsynsmyndighet": "Digg (DOS-lagen)", "lagstod": "SFS 2018:1937 (DOS-lagen); EU-direktiv 2016/2102 (webbtillgänglighetsdirektivet); Diskrimineringslagen (2008:567) 1 kap. 4 §", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja", "empirisk_kalla": "EU kräver granskning av 309 webbplatser och 17 appar per år. Digg klarar ca 40 procent. Tre handläggare, en specialist och en halvtidskonsult sköter hela tillsynen. Digg har inte kunnat granska inloggade tjänster förrän 2022, och då bara två. Myndigheten får 6 mkr/år men bedömer behovet till 14 mkr. Budgetunderlaget räcker till 40 % av EU-kommissionens genomförandebeslut. RiR 2023:6: Digg bedriver inte tillsyn i den utsträckning EU kräver. ", "lucka_status": "Ja"}, {"tax_huvusektion": "Systembarriärer", "tax_huvudsektion_beskrivning": "Strukturella hinder i teknikens utformning och infrastruktur som skapar ojämlika villkor för delaktighet", "tax_kat": "1.6. Ansvarsluckor och bristande styrning", "tax_kat_beskrivning": "Många digitala system är inte exkluderande i sig men blir det i mötet med andra system. Problemet är att ingen har ansvar för helheten.", "tax ing för stöd", "barriartyp": "Styrning", "situation_exempel": "Jag är 24, har ångest och har aldrig sökt sjukpenning förut – jag förstår inte Försäkringskassans e-tjänst och behöver prata med en människa, men telefonkön är timslång", "radgivning": "Försäkringskassan (telefon/besök); Statens servicecenter", "tvist": "JO (om myndighet brister i service)", "tillsynsmyndighet": "JO; ISF (Inspektionen för socialförsäkringen)", "lagstod": "FL 6–7 §§ (smidiga kontakter, tillgänglighet); SFS 2018:1937 (DOS-lagen)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Nej – men…", "empirisk_kalla": "JO och ISF har tillsyn, och Försäkringskassan har en instruktion som kräver service. Problemet är inte att tillsyn saknas utan att budgeteringen inte motsvarar det kända behovet. (RiR 2021:8). Stödbehovet är känt och dokumenterat men prioriteras inte i resursfördelningen. Riksrevisionen (2021) Var god dröj, myndigheterna digitaliserar – service till enskilda som inte kan eller vill vara digitala: Försäkringskassan konstaterar själva att unga med psykisk ohälsa har störst behov av telefonsupport, men halverade samtidigt telefonkundtjänstens öppettider.", "lucka_status": "Nej"}, {"tax_huvusektion": "Systembarriärer", "tax_huvudsektion_beskrivning": "Strukturella hinder i teknikens utformning och infrastruktur som skapar ojämlika villkor för delaktighet", "tax_kat": "1.6. Ansvarsluckor och bristande styrning", "tax_kat_beskrivning": "Många digitala system är inte exkluderande i sig men blir det i mötet med andra system. Problemet är att ingen har ansvar för helheten.", "tax_kat_förklaring": "Myndigheter och leverantörer fokuserar ofta på sin del i kedjan, men inte på hur den samverkar med andra eller vilka barriärer det skapar för den enskilde. Resultatet är styrningsluckor där ingen fullt ut ansvarar för delaktighet, tillgång eller alternativ.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § kräver begriplig information, 7 § tillgänglighet och 8 § att myndigheter samverkar med varandra. Hälso- och sjukvårdslagen (2017:30) 13 kap. 8 § kräver individuell plan när den enskilde behöver insatser från både socialtjänsten och hälso- och sjukvården. Socialtjänstlagen (2025:400) 7 kap. 1--2 §§ kräver att kommunen planerar insatser och ingår samverkansöverenskommelser med regionen. Konsekvensutredningsförordningen (SFS 2024:183) 6--7 §§ kräver analys av kostnader och intäkter men inte av exkluderingseffekter eller tillgänglighetskonsekvenser. Statskontoret ansvarar för metodutveckling (15 §).", "tax_kat_eu_digital_rights": "Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a). Digitala offentliga tjänster ska vara sömlösa, säkra och interoperabla (artikel 7c). Omfattande tillgång till och vidareutnyttjande av information från den offentliga sektorn ska säkerställas (artikel 7b). Marknadsaktörer som drar nytta av den digitala omställningen ska bidra till kostnaderna för kollektiva nyttigheter och offentliga infrastrukturer (artikel 2c).", "tax_kat_politik": "Förvaltningspolitik och socialpolitik.", "tax_underkat": "1.6.9. Bristande tillgång till öppen kunskap och data", "tax_underkat_beskrivning": "Offentlig information och forskning som låses in bakom betalväggar eller komplexa system skapar Bristande kunskapsklyftor. Avsaknad av öppna licenser och tillgång till svårtillgängliga dataformat hindrar innovation, öppen kunskap demokratisk insyn och jämlik kunskapsdelning. och data", "taxonomi_id": "1.6.9", "kategori": "Bristande tillgång till öppen kunskap och data", "barriartyp": "Styrning", "situation_exempel": "SKR erbjuder stöd för kommunernas digitalisering men materialet ligger bakom inloggning – min kommun deltar inte och vi får börja från noll", "radgivning": "SKR; Digg (öppna resurser); OSOR (EU:s handbok för öppen källkod i offentlig sektor)", "tvist": "JO (om myndighets tillgängliggörande av information); förvaltningsrätten", "tillsynsmyndighet": "Ingen tydlig", "lagstod": "PSI-lagen (2010:566, lag om vidareutnyttjande av information); FL 6 §; EU:s öppna data-direktiv (2019/1024)", "tillsynstyp": "Attribut saknas", "tillsynslucka": "Ja – det finns inget krav på att erfarenheter och processtöd från offentligt finansierade digitaliseringsprojekt ska delas öppet.", "empirisk_kalla": "SKR/Adda/Inera: Handslag för välfärdsutveckling genom digitalisering – processtöd och erfarenheter delas bakom inloggning, inte öppet. RiR 2025:8: brist på erfarenhetsdelning mellan strategiska digitaliseringsprojekt leder till återkommande leveransproblem och dubbelarbete. GovStack/OSOR (2025–2027): EU:s strategi för öppen källkod i offentlig förvaltning förutsätter att kunskap delas öppet.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.1. Ekonomisk utsatthet", "tax_kat_beskrivning": "När digitala samhällsfunktioner förutsätter köpkraft blir tillgången villkorad av ekonomiska resurser.", "tax_kat_förklaring": "Digitala samhällsfunktioner förutsätter ofta att den enskilde har råd med utrustning, abonnemang, datatrafik och underhåll. Det allmänna kompenserar sällan för dessa kostnader. Ekonomisk utsatthet förvandlas till digital utestängning.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för att motverka ekonomisk och social utsatthet. Socialtjänstlagen (2025:400) 12 kap. reglerar rätten till ekonomiskt bistånd för en skälig levnadsnivå.", "tax_kat_eu_digital_rights": "Alla i EU ska ha tillgång till konnektivitet till rimligt pris, inklusive personer med låga inkomster (artikel 3). Ingen ska lämnas utanför den digitala omställningen (artikel 2b).", "tax_kat_politik": "Socialpolitik, fördelningspolitik.", "tax_underkat": "2.1.1. Fattigdom", "tax_underkat_beskrivning": "Digitala samhällsfunktioner för gning.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för att motverka ekonomisk och social utsatthet. Socialtjänstlagen (2025:400) 12 kap. reglerar rätten till ekonomiskt bistånd för en skälig levnadsnivå.", "tax_kat_eu_digital_rights": "Alla i EU ska ha tillgång till konnektivitet till rimligt pris, inklusive personer med låga inkomster (artikel 3). Ingen ska lämnas utanför den digitala omställningen (artikel 2b).", "tax_kat_politik": "Socialpolitik, fördelningspolitik.", "tax_underkat": "2.1.2. Otillräcklig kreditprövning", "tax_underkat_beskrivning": "Kreditgivare beviljar lån och krediter trots uppenbar återbetalningsoförmåga. Villkor är svåra Otillräcklig att förstå, räntor höga och möjligheten att kreditprövning omförhandla obefintlig. Skuldsättningen som följer kan i sin tur leda till kreditvärdighetsexkludering", "taxonomi_id": "2.1.2", "kategori": "Otillräcklig kreditprövning", "barriartyp": "Ekonomi", "situation_exempel": "Jag beviljades lån trots uppenbar återbetalningsoförmåga – nu är jag enormt skuldsatt, kanske för resten av livet", "radgivning": "Konsumenternas Bank- och finansbyrå; kommunal budget- och skuldrådgivning; Hallå konsument", "tvist": "ARN bankavdelningen (ej bindande); allmän domstol", "tillsynsmyndighet": "Finansinspektionen (kreditprövning och marknadsföring); Konsumentverket (marknadsföring av krediter)", "lagstod": "Konsumentkreditlagen (2010:1846) 12 § (kreditprövning), 19 § (ränteändringar); lagen om bank- och finansieringsrörelse (2004:297)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Delvis – FI har tillsyn över kreditgivare men kreditprövningen brister systematiskt.", "empirisk_kalla": "Konsumenternas Bank- och finansbyrå (2025) Årsredovisning: konsumtionslån vanligaste klagomålet. Räntefria kampanjer med dolda villkor som slår om till hög ränta. Konsumenter uppger att skulden inte minskar trots långvarig betalning. ", "lucka_status": "Delvis"}, {"tax_huvusektion": "Sårbarheter", "tax_ r betalningsanmärkning. Telia, Tele2, Telenor och Tre nekar regelmässigt abonnemang vid anmärkning. Även bredbandsavtal nekas vid skulder. Lågprisoperatörer (Hallon, Vimla, Fello) erbjuder förskottsbetalning som alternativ men med begränsningar (inga utlandssamtal, ingen telefon på avbetalning).", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.2. Funktionsrelaterad exkludering", "tax_kat_beskrivning": "Digitala system som inte utformas för mänsklig mångfald förvandlar funktionsnedsättning till utestängning", "tax_kat_förklaring": "Kognitiva, sensoriska, motoriska och psykosociala förutsättningar varierar i befolkningen. Det är känt, dokumenterat och rättsligt reglerat. Ändå utformas digitala samhällsfunktioner rutinmässigt utifrån en snäv uppsättning antaganden om hur människor ser, hör, tänker och rör sig. Exkluderingen uppstår inte hos personen utan i systemets designval.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Diskrimineringslagen (2008:567) 1 kap. 4 § fastställer att bristande tillgänglighet kan utgöra diskriminering. FN:s funktionsrättskonvention kräver universell utformning. Lagen om tillgänglighet till digital offentlig service (2018:1937) ställer krav på att digital offentlig service ska vara möjlig att uppfatta, hantera, begripa och robust. Lagen om vissa produkters och tjänsters tillgänglighet (2023:254) ställer tillgänglighetskrav på ett brett spektrum av digitala produkter och tjänster på marknaden, med sanktionsavgifter vid bristande efterlevnad.", "tax_kat_eu_digital_rights": "Den digitala omställningen ska i synnerhet innefatta personer med funktionsnedsättning (artikel 2b). Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a).", "tax_kat_politik": "Funktionsrättspolitik och socialpolitik.", "tax_underkat": "2.2.1. Kognitiv exkludering", "tax_underkat_beskrivning": "Kognitiv orientering, komplex navigering eller stor mängd exkludering information utestänger den som behöver mer tid, tydligare struktur eller enklare gränssnitt.", "taxonomi_id": "2.2.1", "kategori": "Kognitiv exkludering", "barriartyp": "Funktion", "situation_exempel": "Jag har en NPF-diagnos och Försäkringskassans ansökan har så många steg och tidsgränser att jag ger upp halvvägs – det finns inget sätt att spara och fortsätta senare", "radgivning": "Försäkringskassan (telefon/besök); Statens servicecenter; funktionsrättsorganisation", "tvist": "JO; DO (om bristande tillgänglighet utgör diskriminering)", "tillsynsmyndighet": "Digg (DOS-lagen); DO; JO", "lagstod": "DOS-lagen (2018:1937); diskrimineringslagen (2008:567) 1 kap. 4 § (bristande tillgänglighet); FL 6–7 §§", "tillsynstyp": "Tillsyn", "tillsynslucka": "Delvis – DOS-lagen täcker WCAG-krav men inte kognitiv tillgänglighet som informationsarkitektur, antal steg, tidsgränser eller möjlighet att spara och återkomma. WCAG 2.1 har vissa kognitiva kriterier men de är svaga och sällan granskade.", "empirisk_kalla": "RiR 2023:6: NPF-personer beskriver stress i myndigheters e-tjänster, ologisk struktur, avsaknad av interaktionsmöjligheter. BankID: tidsgränser kan inte förlängas. Begripsam (2025): brukare beskriver att digitala system förutsätter kognitiva förmågor som inte alla har.", "lucka_status": "Delvis"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.2. Funktionsrelaterad exkludering", "tax_kat_beskrivning": "Digitala system som inte utformas för mänsklig mångfald förvandlar funktionsnedsättning till utestängning", "tax_kat_förklaring": "Kognitiva, sensoriska, motoriska och psykosociala förutsättningar varierar i befolkningen. Det är känt, dokumenterat och rättsligt reglerat. Ändå utformas digitala samhällsfunktioner rutinmässigt utifrån en snäv uppsättning antaganden om hur människor ser, hör, tänker och rör sig. Exkluderingen uppstår inte hos personen utan i systemets designval.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Diskrimineringslagen (2008:567) 1 kap. 4 § fastställer att bristande tillgänglighet kan utgöra diskriminering. FN:s funktionsrättskonvention kräver universell utformning. Lagen om tillgänglighet till digital offentlig service (2018:1937) ställer krav på att digital offentlig service ska vara möjlig att uppfatta, hantera, begripa och robust. Lagen om vissa produkters och tjänsters tillgänglighet (2023:254) ställer tillgänglighetskrav på ett brett spektrum av digitala produkter och tjänster på marknaden, med sanktionsavgifter vid bristande efterlevnad.", "tax_kat_eu_digital_rights": "Den digitala omställningen ska i synnerhet innefatta personer med funktionsnedsättning (artikel 2b). Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a).", "tax_kat_politik": "Funktionsrättspolitik och socialpolitik.", "tax_underkat": "2.2.2. Sensorisk exkludering", "tax_underkat_beskrivning": "Sensorisk syn- eller hörselnedsättning i sin design utestänger exkludering hela grupper.", "taxonomi_id": "2.2.2", "kategori": "Sensorisk exkludering", "barriartyp": "Funktion", "situation_exempel": "Jag är döv och ska boka tolk via regionens Tolkportal – men verktyget fungerar inte på mobil, jag kan inte ändra en bokning utan att ringa, och regionen har pausat allt förbättringsarbete.", "radgivning": "Tolkcentralen; patientnämnden; Sveriges Dövas Riksförbund (SDR)", "tvist": "DO (bristande tillgänglighet); patientnämnden; JO", "tillsynsmyndighet": "Digg (DOS-lagen); IVO (om tolkbrist leder till patientsäkerhetsrisk); DO", "lagstod": "DOS-lagen (2018:1937); diskrimineringslagen (2008:567) 1 kap. 4 §; HSL (2017:30) 3 kap. 1 §; språklagen (2009:600) 9 § (det allmänna har ansvar att skydda och främja svenskt teckenspråk)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Delvis – tillsyn finns formellt men fungerar inte i praktiken. Tolkportalen som intern beställningsportal kan falla utanför DOS-lagens tillämpningsområde. Regionens omfördelning av öronmärkta statsbidrag (28 mkr tilldelat, 4 mkr vidarebefordrat till Tolkcentralen) saknar extern granskning. Konsultstoppet som pausar tillgänglighetsarbete behandlas som ett generellt sparbeslut, inte som en inskränkning av rättigheter.", "empirisk_kalla": "SDF (dec 2024): Tolkportalen fungerar inte på mobil, krångligt att ändra/avboka, fel information om support. SDF (maj 2025): ny IT-leverantör tar inte ansvar för tidigare kod, lansering försenad. Tolkbristen ökade från 0,6 % till 3,1 % (228 uppdrag, 441 timmar). Staten tilldelade 28 mkr till Region Stockholm men bara 4 mkr extra nådde Tolkcentralen. FaceTime och WhatsApp får inte användas pga GDPR – yngre döva som saknar bildtelefon har inga alternativa kontaktvägar. SDF (okt 2025): regionens konsultstopp pausar allt utvecklingsarbete. Tolkportalen fortsatt otillgänglig. Vårdgivare bokar inte tolk vid akuta behov.", "lucka_status": "Delvis"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.2. Funktionsrelaterad exkludering", "tax_kat_beskrivning": "Digitala system som inte utformas för mänsklig mångfald förvandlar funktionsnedsättning till utestängning", "tax_kat_förklaring": "Kognitiva, sensoriska, motoriska och psykosociala förutsättningar varierar i befolkningen. Det är känt, dokumenterat och rättsligt reglerat. Ändå utformas digitala samhällsfunktioner rutinmässigt utifrån en snäv uppsättning antaganden om hur människor ser, hör, tänker och rör sig. Exkluderingen uppstår inte hos personen utan i systemets designval.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Diskrimineringslagen (2008:567) 1 kap. 4 § fastställer att bristande tillgänglighet kan utgöra diskriminering. FN:s funktionsrättskonvention kräver universell utformning. Lagen om tillgänglighet till digital offentlig service (2018:1937) ställer krav på att digital offentlig service ska vara möjlig att uppfatta, hantera, begripa och robust. Lagen om vissa produkters och tjänsters tillgänglighet (2023:254) ställer tillgänglighetskrav på ett brett spektrum av digitala produkter och tjänster på marknaden, med sanktionsavgifter vid bristande efterlevnad.", "tax_kat_eu_digital_rights": "Den digitala omställningen ska i synnerhet innefatta personer med funktionsnedsättning (artikel 2b). Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a).", "tax_kat_politik": "Funktionsrättspolitik och socialpolitik.", "tax_underkat": "2.2.3. Motorisk exkludering", "tax_underkat_beskrivning": "Motorisk eller precisa rörelser utan alternativ utestänger den exkludering som inte kan utföra dem.", "taxonomi_id": "2.2.3", "kategori": "Motorisk exkludering", "barriartyp": "Funktion", "situation_exempel": "Jag har Parkinsons och kan inte hålla fingret stilla nog för BankID:s fingeravtrycksläsare – och sexsiffrig kod träffar jag fel varje gång", "radgivning": "Banken (alternativa inloggningsmetoder); hjälpmedelscentralen; Funktionsrätt Sverige", "tvist": "DO (bristande tillgänglighet); JO", "tillsynsmyndighet": "DO; Digg (DOS-lagen); FI (BankID som infrastruktur)", "lagstod": "Diskrimineringslagen (2008:567) 1 kap. 4 § (bristande tillgänglighet); EN 301 549 kap. 5.3 (biometri ska inte vara enda identifieringsmetod); DOS-lagen (2018:1937)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Nej – men... ", "empirisk_kalla": "Ansvaret är otydligt. DO kan pröva bristande tillgänglighet, Digg tillsynar DOS-lagen och FI tillsynar bankerna. BankID erbjuder ansiktsigenkänning som alternativ på nyare telefoner men det kräver en enhet som stöder Face ID. Äldre eller billigare telefoner har bara fingeravtryck och kod. Digg webbriktlinjer (EN 301 549 kap. 5.3): digital service ska inte förlita sig på en enda biometrisk egenskap – personer kan sakna fingrar eller ha svårt att placera kroppsdelen korrekt.", "lucka_status": "Nej"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.2. Funktionsrelaterad exkludering", "tax_kat_beskrivning": "Digitala system som inte utformas för mänsklig mångfald förvandlar funktionsnedsättning till utestängning", "tax_kat_förklaring": "Kognitiva, sensoriska, motoriska och psykosociala förutsättningar varierar i befolkningen. Det är känt, dokumenterat och rättsligt reglerat. Ändå utformas digitala samhällsfunktioner rutinmässigt utifrån en snäv uppsättning antaganden om hur människor ser, hör, tänker och rör sig. Exkluderingen uppstår inte hos personen utan i systemets designval.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Diskrimineringslagen (2008:567) 1 kap. 4 § fastställer att bristande tillgänglighet kan utgöra diskriminering. FN:s funktionsrättskonvention kräver universell utformning. Lagen om tillgänglighet till digital offentlig service (2018:1937) ställer krav på att digital offentlig service ska vara möjlig att uppfatta, hantera, begripa och robust. Lagen om vissa produkters och tjänsters tillgänglighet (2023:254) ställer tillgänglighetskrav på ett brett spektrum av digitala produkter och tjänster på marknaden, med sanktionsavgifter vid bristande efterlevnad.", "tax_kat_eu_digital_rights": "Den digitala omställningen ska i synnerhet innefatta personer med funktionsnedsättning (artikel 2b). Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a).", "tax_kat_politik": "Funktionsrättspolitik och socialpolitik.", "tax_underkat": "2.2.4. Psykosocial exkludering", "tax_underkat_beskrivning": "Psykosocial eller känsla av maktlöshet genom otydlig systemlogik exkludering eller risk för oåterkalleliga fel.", "taxonomi_id": "2.2.4", "kategori": "Psykosocial exkludering", "barriartyp": "Funktion", "situation_exempel": "Jag ska rapportera till Försäkringskassan men är livrädd att skriva fel och förlora min ersättning – systemet ger ingen förhandsgranskning och jag vet inte om jag kan ändra efteråt", "radgivning": "Försäkringskassan (telefon/besök); Statens servicecenter", "tvist": "JO; förvaltningsrätten (om felaktigt beslut)", "tillsynsmyndighet": "ISF (Inspektionen för socialförsäkringen); JO", "lagstod": "FL 6–7 §§ (tillgänglighet, service); FL 25 § (kommunikationsskyldighet före beslut)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Nej – men... ", "empirisk_kalla": "Systemdesignen skapar onödig psykisk belastning. FL 25 § ger den enskilde rätt att yttra sig innan myndigheten fattar beslut, men gränssnittet signalerar inte detta. Användaren upplever att ett knapptryck är oåterkalleligt. IAF (2018:5): aktivitetsrapporteringens utformning skapar stress och osäkerhet – den som rapporterar fel riskerar varning och i förlängningen avstängning. RiR 2021:8: unga under 30 med psykisk ohälsa har störst behov av stöd men hänvisas till e-tjänster. RiR 2023:6: NPF-personer beskriver stress i myndigheters e-tjänster.", "lucka_status": "Nej"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.2. Funktionsrelaterad exkludering", "tax_kat_beskrivning": "Digitala system som inte utformas för mänsklig mångfald förvandlar funktionsnedsättning till utestängning", "tax_kat_förklaring": "Kognitiva, sensoriska, motoriska och psykosociala förutsättningar varierar i befolkningen. Det är känt, dokumenterat och rättsligt reglerat. Ändå utformas digitala samhällsfunktioner rutinmässigt utifrån en snäv uppsättning antaganden om hur människor ser, hör, tänker och rör sig. Exkluderingen uppstår inte hos personen utan i systemets designval.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Diskrimineringslagen (2008:567) 1 kap. 4 § fastställer att bristande tillgänglighet kan utgöra diskriminering. FN:s funktionsrättskonvention kräver universell utformning. Lagen om tillgänglighet till digital offentlig service (2018:1937) ställer krav på att digital offentlig service ska vara möjlig att uppfatta, hantera, begripa och robust. Lagen om vissa produkters och tjänsters tillgänglighet (2023:254) ställer tillgänglighetskrav på ett brett spektrum av digitala produkter och tjänster på marknaden, med sanktionsavgifter vid bristande efterlevnad.", "tax_kat_eu_digital_rights": "Den digitala omställningen ska i synnerhet innefatta personer med funktionsnedsättning (artikel 2b). Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a).", "tax_kat_politik": "Funktionsrättspolitik och socialpolitik.", "tax_underkat": "2.2.5. Gradvis försämrad kognitiv förmåga", "tax_underkat_beskrivning": "Gradvis försämrad kognitiv förmåga över tid. Under perioden av gradvis kognitiv förmåga försämring ökar den enskildes behov av kontakt med vård, omsorg och myndigheter samtidigt som systemen saknar rutiner och funktioner för den övergången.", "taxonomi_id": "2.2.5", "kategori": "Gradvis försämrad kognitiv förmåga", "barriartyp": "Funktion", "situation_exempel": "Mamma glömmer sina lösenord allt oftare och missar digital post – hon är inte tillräckligt sjuk för god man men klarar inte längre sin digitala vardag", "radgivning": "Vårdcentralen (kognitiv utredning); kommunens biståndshandläggare; bank (fullmakter)", "tvist": "Tingsrätten (ansökan om god man); JO", "tillsynsmyndighet": "Överförmyndarnämnden (god man); IVO (om omsorgsbehov)", "lagstod": "FB 11 kap. (god man); SFS 2017:310 (framtidsfullmakter); SoL (2025:400)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – det finns ingen mekanism för den gråzon där en person gradvis förlorar digital förmåga men ännu inte uppfyller kraven för god man.", "empirisk_kalla": "Digitala tjänster saknar ofta funktion för successivt delat ansvar – det är antingen full behörighet eller ingen. Det är viktigt att kunna spåra vem som har tagit vilket beslut i delade tjänster. Demensförbundet: ca 150 000 personer i Sverige lever med demenssjukdom, de flesta med gradvis försämring över flera år innan formellt stöd sätts in.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.3. Beroendeposition och digital kontroll", "tax_kat_beskrivning": "Den som lever i en beroendeposition -- gentemot en institution, en vårdgivare eller en partner -- är särskilt utsatt för att digital tillgång begränsas eller att digital teknik används som kontrollverktyg.", "tax_kat_förklaring": "Det allmänna har ansvar för att digitala system varken underlåter att säkerställa tillgång eller möjliggör kontroll.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för alla människors frihet och värdighet. LSS (1993:387) 5--6 §§ fastställer rätten till självbestämmande, delaktighet och inflytande över insatsers utformning. Socialtjänstlagen (2025:400) 2 kap. 1 § fastställer att socialtjänsten ska främja jämlika levnadsvillkor och aktivt deltagande. CRPD artiklarna 14 (frihet och säkerhet), 19 (rätten att leva självständigt) och 22 (rätten till privatliv) ger konventionsgrund. EU:s förklaring om digitala rättigheter: Tekniska lösningar ska möjliggöra utövandet av grundläggande rättigheter (artikel 2a).", "tax_kat_eu_digital_rights": "Den digitala omställningen ska i synnerhet innefatta personer med funktionsnedsättning (artikel 2b). Alla har rätt till integritet och skydd av sina personuppgifter (artikel 17). Ingen ska utsättas för olaglig övervakning (artikel 18).", "tax_kat_politik": "Funktionsrättspolitik, jämställdhetspolitik, socialpolitik, rättspolitik.", "tax_underkat": "2.3.1. Digital tillgång i omsorg", "tax_underkat_beskrivning": "Digital tillgång kan styra över den enskildes internetåtkomst, enheter i omsorg och konton -- eller aldrig erbjuda uppkoppling. Begränsningar kan vara befogade men förutsätter individuell bedömning. Var femte kommunalt äldreboende och nästan var fjärde LSS-boende saknar internet i de boendes lägenheter (Socialstyrelsen 2025).", "taxonomi_id": "2.3.1", "kategori": "Digital tillgång i omsorg", "barriartyp": "Makt/beroende", "situation_exempel": "Jag bor på LSS-boende och det finns inget internet i min lägenhet – personalen säger att jag kan använda wifi i gemensamma utrymmen men där har jag ingen integritet", "radgivning": "Kommunens LSS-handläggare; god man; funktionsrättsorganisation", "tvist": "IVO (anmälan); förvaltningsrätten; JO", "tillsynsmyndighet": "IVO (LSS-boenden och äldreboenden) / Migrationsverket (förvar)", "lagstod": "LSS (1993:387) 5–6 §§ (självbestämmande, goda levnadsvillkor, integritet); RF 2 kap. 6 § (skydd för privatliv)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Delvis – IVO har tillsyn men det finns inga nationella krav på att boenden ska tillhandahålla internet i den enskildes lägenhet. ", "empirisk_kalla": "Socialstyrelsen mäter tillgång men ställer inga krav. Frågan om internet ingår i \"goda levnadsvillkor\" enligt LSS är inte prövad. IVO (2023) Att inte få rätten att leva som andra: 80/90 gruppbostäder med brister, 64 % otillåtna tvångs-/begränsningsåtgärder. Socialstyrelsen (2025) E-hälsa och välfärdsteknik i kommunerna 2025: 23% av LSS-boenden saknar internet. ", "lucka_status": "Delvis"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.3. Beroendeposition och digital kontroll", "tax_kat_beskrivning": "Den som lever i en beroendeposition -- gentemot en institution, en vårdgivare eller en partner -- är särskilt utsatt för att digital tillgång begränsas eller att digital teknik används som kontrollverktyg.", "tax_kat_förklaring": "Det allmänna har ansvar för att digitala system varken underlåter att säkerställa tillgång eller möjliggör kontroll.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för alla människors frihet och värdighet. LSS (1993:387) 5--6 §§ fastställer rätten till självbestämmande, delaktighet och inflytande över insatsers utformning. Socialtjänstlagen (2025:400) 2 kap. 1 § fastställer att socialtjänsten ska främja jämlika levnadsvillkor och aktivt deltagande. CRPD artiklarna 14 (frihet och säkerhet), 19 (rätten att leva självständigt) och 22 (rätten till privatliv) ger konventionsgrund. EU:s förklaring om digitala rättigheter: Tekniska lösningar ska möjliggöra utövandet av grundläggande rättigheter (artikel 2a).", "tax_kat_eu_digital_rights": "Den digitala omställningen ska i synnerhet innefatta personer med funktionsnedsättning (artikel 2b). Alla har rätt till integritet och skydd av sina personuppgifter (artikel 17). Ingen ska utsättas för olaglig övervakning (artikel 18).", "tax_kat_politik": "Funktionsrättspolitik, jämställdhetspolitik, socialpolitik, rättspolitik.", "tax_underkat": "2.3.2. Skyddsbehov och digitala spår", "tax_underkat_beskrivning": "Skyddsbehov och enskilde har kontroll över sin identitet, sina konton digitala spår och sina enheter. För den som lever under hot eller i en kontrollerande relation är detta problematiskt, och farligt. Sammankopplade register kan röja adresser, sekretessmarkering hanteras inte av de flesta digitala myndighetstjänster, och konton och BankID knutna till en förövare kan inte enkelt frigöras.", "taxonomi_id": "2.3.2", "kategori": "Skyddsbehov och digitala spår", "barriartyp": "Skyddsbehov", "situation_exempel": "Jag flydde från en förövare som jag hade en relation med. Personen gör fortfarande allt för att spåra mig och det är svårt att leva dold när allt är digitalt.", "radgivning": "Kvinnojouren; Brottsofferjouren; Skatteverket (skyddade personuppgifter); banken", "tvist": "Polisen (anmälan); tingsrätten (kontaktförbud)", "tillsynsmyndighet": "IMY (personuppgifter); FI (bankens hantering); Skatteverket (sekretessmarkering)", "lagstod": "Offentlighets- och sekretesslagen (2009:400) 22 kap. 1 §; folkbokföringslagen (1991:481) 16 § (skyddad folkbokföring); brottsbalken 4 kap. 4a § (olaga förföljelse)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – sekretessmarkering hanteras inte av de flesta digitala myndighetstjänster. Sammankopplade register (1177, FK, Skatteverket) kan röja adress vid sekretessmarkering om inte varje system aktivt stöder skyddade uppgifter. Det saknas en samlad process för att digitalt frigöra en person från en kontrollerande partner.", "empirisk_kalla": "Unizon (2024): digitalt våld är en del av mäns våld mot kvinnor – förövare använder delade konton, spårning via appar och tillgång till BankID som kontrollverktyg. Nationellt centrum för kvinnofrid (NCK): kvinnor med skyddade personuppgifter beskriver att digitala system läcker adress. Jämställdhetsmyndigheten (2024): sekretessmarkering ger inte fullständigt skydd i digitala system.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.4. Livskris och instabilitet", "tax_kat_beskrivning": "Digitala samhällsfunktioner förutsätter stabilitet, kontinuitet och förmåga att agera i rätt tid. Livskriser bryter alla tre.", "tax_kat_förklaring": "Sjukdom, sorg, separation, våld eller plötslig ekonomisk förändring påverkar förmågan att hantera komplexa system. Det är förutsägbart och väldokumenterat. Ändå saknar digitala samhällsfunktioner rutinmässigt anpassning för tillfälligt förändrade förutsättningar.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § fastställer myndigheters skyldighet att hjälpa den enskilde att ta till vara sina intressen, 7 § kräver tillgänglighet. Socialtjänstlagen (2025:400) 2 kap. 4 § fastställer att socialtjänsten ska vara lätt tillgänglig.", "tax_kat_eu_digital_rights": "Ingen ska lämnas utanför den digitala omställningen, i synnerhet marginaliserade och utsatta människor (artikel 2b). Tekniska lösningar ska möjliggöra utövandet av grundläggande rättigheter (artikel 2a).", "tax_kat_politik": "Socialpolitik och förvaltningspolitik.", "tax_underkat": "2.4.1. Akut livskris", "tax_underkat_beskrivning": "Akut livskris handlingskraft och precision i situationer där sjukdom, psykisk ohälsa, våld eller förlust tillfälligt gör det omöjligt.", "taxonomi_id": "2.4.1", "kategori": "Akut livskris", "barriartyp": "Livskris", "situation_exempel": "Jag sitter på akuten med mitt sjuka barn och parkeringsappen kräver registrering, kortbetalning och zonval – jag kan inte tänka klart just nu", "radgivning": "Sjukhusets reception; parkeringsbolaget", "tvist": "ARN (ej bindande); kommunen (om kommunal parkering)", "tillsynsmyndighet": "Ingen tydlig – kommunen ansvarar för kommunal parkering, privata parkeringsbolag regleras av branschöverenskommelse", "lagstod": "Attribut saknas", "tillsynstyp": "Attribut saknas", "tillsynslucka": "Ja", "empirisk_kalla": "Det finns inga krav på att parkeringsplatser vid samhällskritiska funktioner som sjukhus ska ha analoga betalningsalternativ. Parkeringsbolagen väljer själva vilka betalsätt de erbjuder. RiR 2023:6: digital service tar inte hänsyn till situationer där den enskilde har tillfälligt nedsatt förmåga.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.4. Livskris och instabilitet", "tax_kat_beskrivning": "Digitala samhällsfunktioner förutsätter stabilitet, kontinuitet och förmåga att agera i rätt tid. Livskriser bryter alla tre.", "tax_kat_förklaring": "Sjukdom, sorg, separation, våld eller plötslig ekonomisk förändring påverkar förmågan att hantera komplexa system. Det är förutsägbart och väldokumenterat. Ändå saknar digitala samhällsfunktioner rutinmässigt anpassning för tillfälligt förändrade förutsättningar.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § fastställer myndigheters skyldighet att hjälpa den enskilde att ta till vara sina intressen, 7 § kräver tillgänglighet. Socialtjänstlagen (2025:400) 2 kap. 4 § fastställer att socialtjänsten ska vara lätt tillgänglig.", "tax_kat_eu_digital_rights": "Ingen ska lämnas utanför den digitala omställningen, i synnerhet marginaliserade och utsatta människor (artikel 2b). Tekniska lösningar ska möjliggöra utövandet av grundläggande rättigheter (artikel 2a).", "tax_kat_politik": "Socialpolitik och förvaltningspolitik.", "tax_underkat": "2.4.2. Anhörigansvar utan digitala verktyg", "tax_underkat_beskrivning": "Anhörigansvar rättssäkra sätt för anhöriga att agera i den utan digitala enskildes ärenden vid kris. Bristen på reglerade verktyg ombudsfunktioner tvingar anhöriga att agera utan formellt stöd.", "taxonomi_id": "2.4.2", "kategori": "Anhörigansvar utan digitala verktyg", "barriartyp": "Livskris", "situation_exempel": "Min make fick en stroke och jag behöver sköta hans ärenden – men hans BankID sitter i hans telefon och ingen myndighet accepterar min pappersfullmakt digitalt", "radgivning": "Resp. myndighet; banken; överförmyndarnämnden (god man)", "tvist": "JO; förvaltningsrätten; tingsrätten (god man)", "tillsynsmyndighet": "JO; överförmyndarnämnden", "lagstod": "FL 14 § (ombud); FB 11 kap. (god man); SFS 2017:310 (framtidsfullmakter)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – FL 14 § ger rätt att anlita ombud men digitala myndighetstjänster saknar funktion för ombudshantering.", "empirisk_kalla": "Pappersfullmakt accepteras inte i e-tjänster. Framtidsfullmakt måste ha upprättats i förväg medan personen hade beslutsförmåga. God man tar veckor till månader att ordna via tingsrätten. I mellanperioden har anhöriga inget rättssäkert sätt att agera. Begripsam (2025): framtidsfullmakter fungerar inte digitalt. RiR 2026:4: nationellt ställföreträdarregister saknas. SEB (2025): fullmaktstagare kan inte se eller hantera e-fakturor digitalt. Stockholms överförmyndarförvaltning: banken kan anse att fullmakt inte längre gäller vid kognitiv nedsättning. Digg/PTS (2026): ombudshantering identifierad som viktig för ökad digital inkludering.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.4. Livskris och instabilitet", "tax_kat_beskrivning": "Digitala samhällsfunktioner förutsätter stabilitet, kontinuitet och förmåga att agera i rätt tid. Livskriser bryter alla tre.", "tax_kat_förklaring": "Sjukdom, sorg, separation, våld eller plötslig ekonomisk förändring påverkar förmågan att hantera komplexa system. Det är förutsägbart och väldokumenterat. Ändå saknar digitala samhällsfunktioner rutinmässigt anpassning för tillfälligt förändrade förutsättningar.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § fastställer myndigheters skyldighet att hjälpa den enskilde att ta till vara sina intressen, 7 § kräver tillgänglighet. Socialtjänstlagen (2025:400) 2 kap. 4 § fastställer att socialtjänsten ska vara lätt tillgänglig.", "tax_kat_eu_digital_rights": "Ingen ska lämnas utanför den digitala omställningen, i synnerhet marginaliserade och utsatta människor (artikel 2b). Tekniska lösningar ska möjliggöra utövandet av grundläggande rättigheter (artikel 2a).", "tax_kat_politik": "Socialpolitik och förvaltningspolitik.", "tax_underkat": "2.4.3. Dödsfall och administrativ kris", "tax_underkat_beskrivning": "Dödsfall och övergång vid dödsfall. Anhöriga saknar ofta administrativ fullmakter eller åtkomst till konton, ärenden och kris myndighetskontakter i en situation där dessa behövs akut.", "taxonomi_id": "2.4.3", "kategori": "Dödsfall och administrativ kris", "barriartyp": "Livskris", "situation_exempel": "Min mamma dog och jag behöver avsluta hennes abonnemang, betala hennes räkningar och kontakta myndigheter", "radgivning": "Banken (dödsbo); Skatteverket (bouppteckning, dödsfallsintyg); Efterlevandeguiden.se", "tvist": "Tingsrätten (boutredningsman vid tvist)", "tillsynsmyndighet": "Skatteverket (bouppteckning)", "lagstod": "Ärvdabalken (1958:637) 18–20 kap. (dödsboförvaltning)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – dödsbodelägare har rätt att förvalta tillgångar men digitala tjänster saknar rutiner. Ingen samlad digital process för dödsbohantering.", "empirisk_kalla": "Swedbank/Sparbanken (2025): BankID, kort och konton spärras automatiskt vid dödsfall. Nordea (2025): e-fakturor stängs av men autogiron fortsätter dras. Efterlevandeguiden (statlig samverkan): listar sociala medier och streamingtjänster som ska avslutas men ger ingen samlad digital ingång – varje tjänst kräver separat kontakt med dödsbevis.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.5. Migrationsstatus och rättsligt skydd", "tax_kat_beskrivning": "Det svenska digitala välfärdssystemet är konstruerat kring förutsättningen att den enskilde är invånare med ett etablerat administrativt förhållande till det offentliga. Den som saknar dessa förutsättningar -- asylsökande, papperslösa, statslösa -- befinner sig utanför systemets grundläggande antaganden.", "tax_kat_förklaring": "Digitala samhällsfunktioner bygger på antagandet att den enskilde har en registrerad identitet. Asylsökande, papperslösa och andra med osäker rättslig status faller utanför detta antagande. Deras behov av kontakt med vård, skola och myndigheter kvarstår. Varje systembarriär i sektion 1 förstärks. Digital exkludering blir i dessa fall inte enbart ojämlik tillgång till välfärd utan ett hinder mot rättigheter som Sverige är folkrättsligt förpliktat att skydda.", "tax_kat_stöd_i_lag": "Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Socialtjänstlagen (2025:400) 1 kap. 1 § och Hälso- och sjukvårdslagen (2017:30) 3 kap. 1 § gäller som grundläggande värden oberoende av migrationsstatus. FN:s konvention om ekonomiska, sociala och kulturella rättigheter (ICESCR), artiklarna 12--13, fastslår att rätten till hälsa och utbildning gäller alla på ett lands territorium utan diskriminering -- ESK-kommittén har specifikt uppmanat Sverige att säkerställa detta för asylsökande. FN:s konvention om rättigheter för personer med funktionsnedsättning (CRPD), artiklarna 5 och 19, tillämpas utan undantag för migrationsstatus -- CRPD-kommittén har uttryckt oro över att migranter med funktionsnedsättning i Sverige systematiskt saknar tillgång till stöd och välfärdstjänster. FN:s barnkonvention (CRC), artiklarna 3, 22 och 37, kräver att barnets bästa beaktas i alla asylprocesser -- barnrättskommittén har rekommenderat Sverige att förbjuda förvar av barn på grund av migrationsstatus. 1951 års flyktingkonvention och non-refoulement-principen ger folkrättslig grund åt rädslan för digital spårning (se 2.3.1) -- det är inte irrationell oro utan en skyddad position.", "tax_kat_eu_digital_rights": "Ingen ska lämnas utanför den digitala omställningen, i synnerhet marginaliserade och utsatta grupper (artikel 2b). Tekniska lösningar ska möjliggöra utövandet av grundläggande rättigheter (artikel 2a).", "tax_kat_politik": "Migrationspolitik, socialpolitik, funktionsrättspolitik, barnrättspolitik.", "tax_underkat": "2.5.1. Identitetsexkludering utan personnummer", "tax_underkat_beskrivning": "Digitala samhällsfunktioner förutsätter ofta Identitetskrav personnummer, e-legitimation och bankkonto -- där det första är förutsättning för de övriga. Asylsökande och papperslösa kan sakna alla tre. Utländska e-legitimationer erkänns formellt via Sweden Connect men ger i praktiken inte tillgång till tjänsterna (RiR 2023:6).", "taxonomi_id": "2.5.1", "kategori": "Identitetsexkludering utan personnummer", "barriartyp": "Migration", "situation_exempel": "Jag har ett samordningsnummer – jag kan inte skaffa BankID, inte öppna digital brevlåda och inte använda myndigheternas e-tjänster.", "radgivning": "Skatteverket (folkbokföring, personnummer); Migrationsverket; kommunal flyktingsamordnare", "tvist": "Förvaltningsrätten (folkbokföringsbeslut); JO", "tillsynsmyndighet": "Digg (e-legitimation); JO", "lagstod": "FL 6–7 §§; folkbokföringslagen (1991:481); eIDAS-förordningen (910/2014)", "tillsynstyp": "Attribut saknas", "tillsynslucka": "Ja – ingen myndighet ansvarar för att personer med samordningsnummer får tillgång till digitala samhällstjänster.", "empirisk_kalla": "RiR 2023:6: utländska e-legitimationer ger i praktiken inte tillgång till svenska tjänster. IOM/DTM (2023): ukrainska flyktingar med samordningsnummer utestängs från digitala samhällstjänster. Transportstyrelsen (2025): digital brevlåda kräver svenskt personnummer och e-legitimation – samordningsnummer fungerar inte.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.5. Migrationsstatus och rättsligt skydd", "tax_kat_beskrivning": "Det svenska digitala välfärdssystemet är konstruerat kring förutsättningen att den enskilde är invånare med ett etablerat administrativt förhållande till det offentliga. Den som saknar dessa förutsättningar -- asylsökande, papperslösa, statslösa -- befinner sig utanför sy ", "tax_kat_politik": "Migrationspolitik, socialpolitik, funktionsrättspolitik, barnrättspolitik.", "tax_underkat": "2.5.2. Rädsla för digital spårning", "tax_underkat_beskrivning": "Digitala system som kräver personuppgifter för Rädsla för tillgång till vård, stöd eller digital spårning rättighetsinformation tvingar den enskilde att välja mellan att utöva en rättighet och att skydda sin säkerhet. Rädslan är folkrättsligt grundad.", "taxonomi_id": "2.5.2", "kategori": "Rädsla för digital spårning", "barriartyp": "Migration", "situation_exempel": "Jag har fått avslag på min asylansökan men behöver vård – jag vågar inte söka den eftersom jag inte vet om vårdgivaren delar mina uppgifter med Migrationsverket", "radgivning": "Röda Korset; Läkare i Världen; Asylrättscentrum", "tvist": "IVO (om vård nekas); JO", "tillsynsmyndighet": "IVO; IMY", "lagstod": "SFS 2008:286 (lagen om vård till tillståndslösa); HSL (2017:30) 4 § (vård som inte kan anstå); OSL 25 kap. (hälso- och sjukvårdssekretess); ICESCR art. 12", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – hälso- och sjukvårdssekretessen skyddar patientuppgifter men det pågår politisk diskussion om informationsplikt mot Migrationsverket.", "empirisk_kalla": "Ovissheten i sig utgör en barriär. Ingen myndighet ansvarar för att informera papperslösa om att vården är sekretessbelagd. Socialstyrelsen (2021): papperslösa söker vård i mindre utsträckning av rädsla för spårning. Läkare utan gränser/Rosengrenska: patienter avstår akutvård av rädsla. 1951 års flyktingkonvention: non-refoulement ger folkrättslig grund åt rädslan.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.5. Migrationsstatus och rättsligt skydd", "tax_kat_beskrivning": "Det svenska digitala välfärdssystemet är konstruerat kring förutsättningen att den enskilde är invånare med ett etablerat administrativt förhållande till det offentliga. D  (artikel 2b). Tekniska lösningar ska möjliggöra utövandet av grundläggande rättigheter (artikel 2a).", "tax_kat_politik": "Migrationspolitik, socialpolitik, funktionsrättspolitik, barnrättspolitik.", "tax_underkat": "2.5.3. Funktionsnedsättning och migrationsstatus", "tax_underkat_beskrivning": "När migrationsstatus samverkar med Funk funktionsnedsättning uppstår ett utanförskap som tionsnedsättning ingen myndighet har ett tydligt ansvar för. Tillgänglighetsanpassning förutsätter ofta en migrationsstatus registrerad status som saknas.", "taxonomi_id": "2.5.3", "kategori": "Funktionsnedsättning och migrationsstatus", "barriartyp": "Migration", "situation_exempel": "Jag är asylsökande och har en hörselnedsättning – jag kan inte få hörapparat anpassad eftersom hjälpmedelscentralen kräver personnummer för att öppna ett ärende.", "radgivning": "Migrationsverket; regionen (asylhälsa); funktionsrättsorganisation", "tvist": "IVO; DO (diskriminering på grund av funktionsnedsättning och etnisk tillhörighet)", "tillsynsmyndighet": "IVO; DO", "lagstod": "HSL (2017:30); SFS 2008:286; CRPD art. 5 och 19; diskrimineringslagen (2008:567)", "tillsynstyp": "Tillsyn", "tillsynslucka": "Ja – CRPD gäller oavsett migrationsstatus men hjälpmedelssystem kräver personnummer. Ingen myndighet äger frågan om tillgänglighetsanpassning för asylsökande med funktionsnedsättning.", "empirisk_kalla": "CRPD-kommittén har uttryckt oro över att migranter med funktionsnedsättning i Sverige systematiskt saknar tillgång till stöd.  IOM/DTM (2023): ukrainska flyktingar med funktionsnedsättning beskriver svårigheter att få hjälpmedel.", "lucka_status": "Ja"}, {"tax_huvusektion": "Sårbarheter", "tax_huvudsektion_beskrivning": "Livsomständigheter som systemen inte är utformade att hantera.", "tax_kat": "2.5. Migrationsstatus och rättsligt skydd", "tax_kat_beskrivning": "Det svenska digitala välfärdssystemet är konstruerat kring förutsättningen att den enskilde är invånare med ett etablerat administrativt för
