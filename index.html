<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samhällskontraktet i en digital tid – taxonomi-utforskare v1.6</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,400&family=Inter:wght@300;400;500;600&display=swap');
:root {
  --bg:#faf9f7;--surface:#fff;--surface2:#f9f8f6;--surface3:#f0eeea;
  --border:#ddd9d3;--border-light:#e8e5e0;--text:#1a1a1a;--text-dim:#5c5750;--text-muted:#736e65;
  --accent:#2c5f8a;--accent-light:#e8f0f7;--accent-hover:#1e4a6e;
  --ja:#1f7340;--ja-bg:#eef7f1;--delvis:#2e6b9c;--delvis-bg:#eaf1f7;--nej:#c0392b;--nej-bg:#fdf0ef;
  --law-bg:#f7f5f0;--eu-bg:#f0f5f7;--tag-bg:#f0ede8;
  --sec1:#8a5a2d;--sec2:#5a7a1e;--sec3:#4e6d82;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6;font-size:14px}
.app{max-width:1400px;margin:0 auto;padding:28px 24px}
header{margin-bottom:28px;padding-bottom:16px;border-bottom:2px solid var(--border)}
header h1{font-family:'Source Serif 4',Georgia,serif;font-size:24px;font-weight:600;letter-spacing:-0.01em}
header p{color:var(--text-dim);font-size:13px;margin-top:3px}
.stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:var(--surface);border:1px solid var(--border-light);border-radius:6px;padding:10px 16px;min-width:110px}
.stat-val{font-family:'Source Serif 4',serif;font-size:22px;line-height:1}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:2px}
.stat.ja .stat-val{color:var(--ja)}.stat.delvis .stat-val{color:var(--delvis)}.stat.nej .stat-val{color:var(--nej)}.stat.total .stat-val{color:var(--accent)}
.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:240px;position:relative}
.search-box input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:9px 12px 9px 34px;font-family:inherit;font-size:13px;color:var(--text);outline:none}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text-muted)}
.search-box::before{content:'\2315';position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px}
.fbtn{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:7px 13px;color:var(--text-dim);font-family:inherit;font-size:12px;cursor:pointer;transition:all .12s;white-space:nowrap}
.fbtn:hover{border-color:var(--accent);color:var(--text)}.fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.fg{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.fg-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.07em;margin-right:3px}
.main{display:grid;grid-template-columns:320px 1fr;gap:16px;min-height:70vh}
@media(max-width:900px){.main{grid-template-columns:1fr}}
.catlist{background:#fff;border:1px solid var(--border);border-radius:8px;overflow-y:auto;max-height:78vh;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.catlist::-webkit-scrollbar{width:4px}.catlist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sec-divider{padding:12px 14px 9px;font-size:12px;font-weight:600;color:var(--accent);background:var(--surface);border-bottom:2px solid var(--border-light);cursor:pointer;letter-spacing:.01em;transition:all .12s;border-left:3px solid transparent}
.sec-divider.sec-1{border-left-color:var(--sec1);color:var(--sec1)}
.sec-divider.sec-2{border-left-color:var(--sec2);color:var(--sec2)}
.sec-divider.sec-3{border-left-color:var(--sec3);color:var(--sec3)}
.sec-divider.sec-1:hover{background:rgba(138,90,45,.1)}
.sec-divider.sec-2:hover{background:rgba(90,122,30,.1)}
.sec-divider.sec-3:hover{background:rgba(78,109,130,.1)}
.sec-divider.selected{background:var(--surface2)}
.grp-hdr{padding:8px 14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);background:#fff;border-bottom:1px solid var(--border-light);position:sticky;top:0;z-index:2;cursor:pointer;transition:all .12s;display:flex;justify-content:space-between;align-items:center;border-left:3px solid transparent}
.grp-hdr.sec-1{border-left-color:rgba(138,90,45,.3);background:#fef5ef}
.grp-hdr.sec-2{border-left-color:rgba(90,122,30,.3);background:#fcfcf0}
.grp-hdr.sec-3{border-left-color:rgba(78,109,130,.3);background:#f5f8fa}
.grp-hdr::after{content:'\25B8';font-size:12px;opacity:.3;transition:all .15s;font-weight:400}
.grp-hdr.sec-1:hover{color:var(--sec1);background:#fceee2;border-left-color:var(--sec1)}
.grp-hdr.sec-2:hover{color:var(--sec2);background:#f6f8e0;border-left-color:var(--sec2)}
.grp-hdr.sec-3:hover{color:var(--sec3);background:#ebf1f5;border-left-color:var(--sec3)}
.grp-hdr:hover::after{opacity:.7}
.grp-hdr.selected{background:var(--accent-light)}
.grp-hdr.selected.sec-1{color:var(--sec1);background:#fceee2;border-left-color:var(--sec1)}
.grp-hdr.selected.sec-2{color:var(--sec2);background:#f6f8e0;border-left-color:var(--sec2)}
.grp-hdr.selected.sec-3{color:var(--sec3);background:#ebf1f5;border-left-color:var(--sec3)}
.grp-hdr.selected::after{opacity:.7}
.grp-hdr.expanded::after{content:'\25BE';opacity:.5}
.cat-item{padding:10px 14px;border-bottom:1px solid var(--border-light);cursor:pointer;transition:all .1s;display:flex;align-items:flex-start;gap:9px;border-left:3px solid transparent}
.cat-item.sec-1{border-left-color:rgba(138,90,45,.2)}
.cat-item.sec-2{border-left-color:rgba(90,122,30,.2)}
.cat-item.sec-3{border-left-color:rgba(78,109,130,.2)}
.cat-item.sec-1:hover{border-left-color:var(--sec1);background:#fceee2}
.cat-item.sec-2:hover{border-left-color:var(--sec2);background:#f6f8e0}
.cat-item.sec-3:hover{border-left-color:var(--sec3);background:#ebf1f5}
.cat-item.selected{background:var(--accent-light);border-left:3px solid var(--accent)}
.cat-item.selected.sec-1{background:#fceee2;border-left-color:var(--sec1)}
.cat-item.selected.sec-2{background:#f6f8e0;border-left-color:var(--sec2)}
.cat-item.selected.sec-3{background:#ebf1f5;border-left-color:var(--sec3)}
.cat-item .ci-id{font-size:11px;font-weight:600;color:var(--text-muted);min-width:32px;padding-top:1px}
.cat-item .ci-name{font-size:12.5px;color:var(--text);flex:1}
.ci-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.ci-dot.ja{background:var(--ja)}.ci-dot.delvis{background:var(--delvis)}.ci-dot.nej{background:var(--nej)}
.detail{background:var(--surface);border:1px solid var(--border-light);border-radius:8px;padding:24px;overflow-y:auto;max-height:78vh}
.detail::-webkit-scrollbar{width:4px}.detail::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.d-empty{display:flex;align-items:center;justify-content:center;height:300px;color:var(--text-muted);font-size:13px;text-align:center}
.d-hdr{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border-light)}
.d-hdr .d-id.sec-1{color:var(--sec1)}
.d-hdr .d-id.sec-2{color:var(--sec2)}
.d-hdr .d-id.sec-3{color:var(--sec3)}
.d-id{font-size:11px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.d-title{font-family:'Source Serif 4',serif;font-size:20px;font-weight:600;line-height:1.3;margin-bottom:8px}
.d-desc{font-size:13.5px;color:var(--text-dim);line-height:1.6}
.d-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.mtag{font-size:10px;padding:3px 10px;border-radius:16px;border:1px solid var(--border);color:var(--text-dim)}
.mtag.ja{border-color:var(--ja);color:var(--ja);background:var(--ja-bg)}
.mtag.delvis{border-color:var(--delvis);color:var(--delvis);background:var(--delvis-bg)}
.mtag.nej{border-color:var(--nej);color:var(--nej);background:var(--nej-bg)}
.sit-quote{background:var(--surface2);border-left:3px solid var(--accent);padding:12px 16px;border-radius:0 6px 6px 0;font-style:italic;font-size:13px;line-height:1.55;margin-bottom:16px;color:var(--text)}
.sit-quote.sec-1{border-left-color:var(--sec1);background:#fef5ef}
.sit-quote.sec-2{border-left-color:var(--sec2);background:#fcfcf0}
.sit-quote.sec-3{border-left-color:var(--sec3);background:#f5f8fa}
.iblock{margin-bottom:16px}
.iblock-t{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.iblock-c{font-size:13px;line-height:1.65;color:var(--text)}
.law-box{background:var(--law-bg);border-radius:7px;padding:14px 18px;margin-bottom:14px}
.eu-box{background:var(--eu-bg);border-radius:7px;padding:14px 18px;margin-bottom:14px}
.lucka-box{border-radius:7px;padding:14px 18px;margin-bottom:14px}
.lucka-box.ja{background:var(--ja-bg);border:1px solid rgba(192,57,43,.15)}
.lucka-box.delvis{background:var(--delvis-bg);border:1px solid rgba(212,136,15,.15)}
.lucka-box.nej{background:var(--nej-bg);border:1px solid rgba(39,131,74,.15)}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:1100px){.dgrid{grid-template-columns:1fr}}
.dcard{background:#fff;border:1px solid var(--border-light);border-radius:6px;padding:12px}
.dcard .iblock-c{font-size:12px;color:var(--text-dim)}
.emp-scroll{font-size:12px;color:var(--text-dim);line-height:1.65;max-height:160px;overflow-y:auto;padding-right:6px}
.emp-scroll::-webkit-scrollbar{width:3px}.emp-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.ptag{display:inline-block;background:var(--tag-bg);border:1px solid var(--border);border-radius:16px;padding:3px 12px;font-size:11px;color:var(--text-dim);margin-right:4px;margin-bottom:4px}
.collapse-btn{font-size:11px;color:var(--accent);cursor:pointer;border:none;background:none;font-family:inherit;padding:4px 0;margin-top:4px}
.collapse-btn:hover{color:var(--accent-hover)}
.collapsed{display:none}
.uk-list-compact{margin-top:16px}
.uk-list-compact .cat-item{padding:8px 12px}
.uk-list-compact .ci-id{font-size:10px;min-width:28px}
.uk-list-compact .ci-name{font-size:11.5px}
footer{margin-top:32px;padding-top:12px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted)}
.overview-page{padding:0}
.ov-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.ov-col{background:var(--surface);border:1px solid var(--border-light);border-radius:8px;overflow:hidden}
.ov-sec-hdr{padding:10px 12px 4px;font-family:'Source Serif 4',serif;font-size:14px;font-weight:600;color:var(--accent);border-bottom:2px solid var(--accent);cursor:pointer}
.ov-sec-hdr:hover{background:var(--accent-light)}
.ov-kat{border-bottom:1px solid var(--border-light)}
.ov-kat:last-child{border-bottom:none}
.ov-kat-hdr{padding:8px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);background:var(--surface2);cursor:pointer}
.ov-kat-hdr:hover{color:var(--accent)}
.ov-item{display:flex;align-items:center;gap:6px;padding:4px 12px;font-size:11.5px;cursor:pointer;transition:background .1s}
.ov-item:hover{background:var(--accent-light)}
.ov-highlight.nej-hl{background:var(--nej-bg)}
.ov-highlight.delvis-hl{background:var(--delvis-bg)}
.ov-highlight.ja-hl{background:var(--ja-bg)}
.ov-id{font-size:10px;color:var(--text-muted);min-width:26px;font-variant-numeric:tabular-nums}
.ov-name{flex:1;color:var(--text)}
@media(max-width:900px){.ov-cols{grid-template-columns:1fr}}

</style>
</head>

_kalla":"Forbrukerrådet (2020) Out of Control s. 5–6, 82–101: tio appar delade platsdata med minst 135 tredjeparter; fem platsdatamäklare kartlade –  alla tog emot GPS-position kombinerad med enhets-ID. | NRK (2020) Avslørt av mobilen: köpte platsdata för 35 000 NOK, fick tillgång till rörelsemönster från 140 000 mobiler. Datatilsynet inledde granskning. | Sveriges Konsumenter (2020): anmälde Google till IMY för spårning via platstjänster.","beskrivning":"Appar som samlar in platsdata informerar sällan tydligt om hur, varför eller med vem informationen delas.","lankar":["https://www.forbrukerradet.no/out-of-control/","https://www.nrk.no/norge/xl/avslort-av-mobilen-1.14911685","https://www.sverigeskonsumenter.se/nyheter-och-press/nyheter-och-pressmeddelanden/anonymiserad-platsdata-inte-sarskilt-anonym/"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.4 Digital otrygghet och otydlighet","taxonomi_id":"1.4.3","kategori":"Otydlig datadelning i välfärdsteknik","situation_exempel":"Kommunen lånade ut en robotdammsugare till mig – har den haft kamera och mikrofon på nu utan att jag vet var datan skickades?","radgivning_enskild":"Kommunens omsorgschef; patientnämnden","radgivning_utforare":"IVO (välfärdsteknik); IMY (dataskydd by design)","tvist":"IVO (insatsens utformning); IMY (dataskydd)","tillsynsmyndighet":"IVO (omsorgskvalitet); IMY (personuppgiftsbehandling)","lagstod":"GDPR 2016/679 art. 13–14 (informationsskyldighet), art. 25 (inbyggt dataskydd); SoL 2025:400; patientdatalagen (2008:355)","tillsynslucka":"Nej – ingen systematisk tillsyn över vilken data IoT-enheter i omsorgstjänster samlar in eller vart den skickas","lucka_status":"Nej","empirisk_kalla":"M3 (2026) Användare fick av misstag kontroll över 6700 robotdammsugare: Säkerhetsbrist i DJI Romo exponerade 6 700 robotdammsugares planritningar, livevideo och mikrofoner. Da kalla":"Lagrådsremiss (2026) Nya regler mot bedrägerier och annat vilseledande genom elektroniska\nkommunikationer: under 2023 polisanmäldes ca 29 000 telefonbedrägerier. Den sammanlagda brottsvinsten av dessa bedrägerier uppgick till 708 miljoner kronor. Bland privatpersoner slår bedrägerier genom elektroniska kommunikationstjänster hårt mot framför allt äldre personer\noch leder ofta till negativa psykosociala konsekvenser. | BRÅ (2025) Nationella trygghetsundersökningen (NTU): Bedrägeri på internet är den brottstyp som störst andel av befolkningen (ganska eller mycket) ofta oroar sig för 2025 (39 %)","beskrivning":"Ansvaret för att skydda sig mot digitala bedrägerier läggs systematiskt på den enskilde. Det saknas krav på att digitala system ska byggas med inbyggt skydd.","lankar":["https://www.regeringen.se/contentassets/ed8fe7b73b404edcb3ef83a9977a89fa/nya-regler-mot-bedragerier-och-annat-vilseledande-genom-elektroniska-kommunikationer.pdf","https://bra.se/statistik/statistik-fran-enkatundersokningar/nationella-trygghetsundersokningen/otrygghet-och-oro-for-brott"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.4 Digital otrygghet och otydlighet","taxonomi_id":"1.4.6","kategori":"Statlig digital övervakning","situation_exempel":"Staten utökar sin insyn i mitt digitala liv utan att jag vet om det eller kan ifrågasätta det","radgivning_enskild":"Institutet för mänskliga rättigheter; IMY; Civil Rights Defenders","radgivning_utforare":"IMY (dataskydd); SIN (tillsyn över hemliga tvångsmedel)","tvist":"Förvaltningsdomstol; Europadomstolen (EKMR art. 8)","tillsynsmyndighet":"IMY (dataskydd); JO (myndighetsutövning); Säkerhets- och integritetsskyddsnämnden (SIN)","lagstod":"RF 2 kap. 6 § (skydd mot intrång i personlig integritet); GDPR 2016/679; EKMR art. 8 (rätt till privatliv); EU AI Act 2024/1689 art. 5 (förbjudna AI-tillämpningar, inkl. biometrisk identifiering i realtid i offentliga utrymmen)","tillsynslucka":"Nej – Enskilda lagförslag prövas var för sig utan proportionalitetsbedömning av den kumulativa påverkan på integriteten.","lucka_status":"Nej","empirisk_kalla":"Institutet för mänskliga rättigheter (2025) Årsrapport 2025: visitationszoner, ansiktsigenkänning, tillgång till biometriska register, anonyma vittnen – alla motiverade med säkerhetsargument, utan samlad integritetsanalys.| Institutet för mänskliga rättigheter (2026) Årsrapport 2026, s. 41: I vårt remissvar avstyrkte vi förslaget om polisens användning av AI för ansiktsigenkänning i realtid (Ds 2025:7) i sin helhet. Institutet för mänskliga rättigheter menar att det innebär ett allvarligt intrång i rätten till privat- och familjeliv och skyddet för den personliga integriteten. Det öppnar också för godtycklig tillämpning och ändamålsglidning, det vill säga när ett verktyg eller en åtgärd börjar användas för andra syften än som först var tanken.","beskrivning":"Utökade befogenheter för staten att övervaka, samla in och samköra den enskildes digitala data utan att proportionalitet, rättssäkerhet och skydd mot missbruk säkerställs.","lankar":["https://mrinstitutet.se/download/18.2906d1bb195b2914c0c39eb5/1744008050409/rapport_Arsrapport_manskliga-rattigheter-2025.pdf","https://mrinstitutet.se/download/18.234277b219d0483f491b63a/1774331817101/Rapport-Arsrapport-2026.pdf"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.5 Diskriminerande systemdesign","taxonomi_id":"1.5.1","kategori":"Normbaserad design","situation_exempel":"Försäkringskassan kontrollerade min vab-ansökan extra – jag vet inte varför jag valdes ut eller vad algoritmen baserade sig på","radgivning_enskild":"Försäkringskassan (begära motivering); IMY (klagomål)","radgivning_utforare":"IMY (vägledning om AI/dataskydd); DO (diskrimineringsperspektiv)","tvist":"Förvaltningsrätten (överklaga beslut)","tillsynsmyndighet":"IMY (dataskydd/AI); JO (myndighetsutövning); DO (diskriminering)","lagstod":"GDPR 2016/679 art. 22 (automatiserat beslutsfattande), art. 5 (transparens); Diskrimineringslagen (2008:567) 1 kap. 4 §; FL 32 § (motivering); EU AI Act 2024/1689 art. 6, 9–10 (högrisk-AI: krav på riskbedömning, datakvalitet, transparens)","tillsynslucka":"Nej – IMY inledde granskning men Försäkringskassan tog riskprofilen ur bruk innan granskningen slutfördes, ärendet avskrevs. Ingen prövning av om urvalet var diskriminerande.","lucka_status":"Nej","empirisk_kalla":"Institutet för mänskliga rättigheter (2026) Årsrapport 2026, s. 57:  AI-tekniken innebär nya risker för att mänskliga rättigheter kränks. Bristande transparens, felaktiga underlag och begränsade möjligheter till ansvarsutkrävande kan leda till att enskilda drabbas av felaktiga eller godtyckliga beslut. | Svenska Dagbladet (2025) Pekade ut mammor – nu slopas AI-systemet:  Försäkringskassans hemliga bot skulle stoppa fusk – men pekade i stället ut oskyldiga mammor och föräldrar i utsatta grupper. Ett år efter SvD:s granskning avvecklar myndigheten AI-systemet. | IMY (2025): granskning av Försäkringskassans maskininlärningsbaserade riskprofil för vab-kontroller – avskriven efter att systemet togs ur bruk. |Se även 3.1.4 (AI-kompetens som demokratifråga)","beskrivning":"Digitala samhällsfunktioner designas ofta utifrån en antagen norm. Den som faller utanför normen utestängs. Samma mekanism uppstår när AI-system tränas på data som speglar befintliga ojämlikheter då systemet ärver och förstärker dem.","lankar":["https://mrinstitutet.se/download/18.234277b219d0483f491b63a/1774331817101/Rapport-Arsrapport-2026.pdf","https://www.svd.se/a/d45KKB/forsakringskassans-ai-slopas-efter-svd-s-granskning","https://www.imy.se/nyheter/avslutad-tillsyn-efter-att-forsakringskassan-tagit-ai-system-ur-bruk/"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.5 Diskriminerande systemdesign","taxonomi_id":"1.5.2","kategori":"Språkliga barriärer","situation_exempel":"Myndighetens e-tjänst finns bara på svenska – jag förstår inte vad jag ska göra","radgivning_enskild":"Resp. myndighet (begära tolk eller hjälp, FL 13 §); Statens servicecenter (begära tolk eller hjälp, FL 13 §)","radgivning_utforare":"Digg (DOS-lagen, vägledning om flerspråkighet)","tvist":"Saknas – det finns inget överklagbart beslut när en e-tjänst inte är översatt","tillsynsmyndighet":"JO; Digg (DOS-lagen)","lagstod":"FL 13 § (tolk och översättning); SFS 2018:1937 (DOS-lagen); RF 1 kap. 2 §","tillsynslucka":"Delvis – FL 13 § kräver att myndigheter hjälper den som inte behärskar svenska men RiR 2023:6 visar att majoriteten av granskade e-tjänster inte är översatta","lucka_status":"Delvis","empirisk_kalla":"RiR 2023:6 (2023) Digitala tjänster till privatpersoner – stora utvecklingsmöjligheter för statliga myndigheter s. 34–35:  Vi noterar att de flesta digitala tjänster som får anses vara grundläggande saknar översättning. Det gäller till exempel Skatteverkets digitala deklarationstjänst, anmäla ny adress eller skriva in sig hos Arbetsförmedlingen. Vi ser också att vissa tjänster där en betydande del av målgruppen kan antas tala andra språk än svenska inte heller är översatta. Det gäller de tjänster som man kan använda när man är ny i Sverige, till exempel att bli inskriven i Försäkringskassan, vilket man behöver bli innan man har rätt att söka stöd. Enligt de servicehandläggare vid Statens servicecenter som vi har intervjuat är bristande kunskap i svenska en vanlig anledning till att personer besöker servicekontoren för att få hjälp.","beskrivning":"Digitala samhällsfunktioner som bara erbjuds på vissa språk eller som använder juridiskt, tekniskt eller byråkratiskt språk utestänger den som inte behärskar det","lankar":["https://www.riksrevisionen.se/download/18.1e0fa62b19047f61fcc9553/1719239329567/RiR_2023_6_master.pdf"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.5 Diskriminerande systemdesign","taxonomi_id":"1.5.3","kategori":"Systemlogik","situation_exempel":"Jag hittar inte rätt blankett på myndighetens hemsida (allt är organiserat efter deras avdelningar, inte efter mitt behov)","radgivning_enskild":"Resp. myndighet (telefon/besök); Statens servicecenter","radgivning_utforare":"Digg (DOS-lagen, vägledning om informationsarkitektur)","tvist":"Saknas – ologisk informationsarkitektur är inte ett överklagbart beslut","tillsynsmyndighet":"Digg (DOS-lagen); JO","lagstod":"FL 6–7 §§ (smidiga kontakter, tillgänglighet); SFS 2018:1937 (DOS-lagen)","tillsynslucka":"Delvis – DOS-lagen och Diggs tillsyn täcker teknisk tillgänglighet (WCAG) men inte informationsarkitektur och begriplighet.","lucka_status":"Delvis","empirisk_kalla":"RiR 2023:6 (2023) Digitala tjänster till privatpersoner – stora utvecklingsmöjligheter för statliga myndigheter s. 30: I de öppna svaren framkommer vissa återkommande problem. Dessa handlar\nbland annat om att det är svårt att hitta i de digitala tjänsterna, eller att det är svårt\natt förstå tjänsterna och informationen i dem. | SMFOI 2025 s. 17: Sedan 2017 har personer med funktionsnedsättning rapporterat att de har stora svårigheter att söka information, att navigera sig fram till information och att förstå den information de till slut hittar. Det är till exempel en återkommande kritik som riktats mot samhällsviktiga tjänster som 1177.se och Försäkringskassan. Här går det inte att se några tydliga förbättringar. | Digg/PTS (2026) Redovisning av uppdraget att stödja genomförandet av Sveriges Digitaliseringsstrategi  s. 36:  Endast en dryg femtedel av de svarande kommunerna följer  regelbundet upp enkelheten i kommunens digitala tjänster för invånare. | Digg (2026) Uppdrag att analysera och beskriva\nmöjligheter och utmaningar kopplade till att etablera en digital ingång till det offentliga. Slutrapport i regeringsuppdraget Fi2025/02066: Etableringen av en gemensam digital ingång är inte i första hand en teknisk fråga. Den handlar i hög grad om styrning, ansvar och arbetssätt. För att lyckas behöver offentlig förvaltning i större utsträckning agera samlat utifrån människors behov, snarare än utifrån enskilda organisationers uppdrag. En gemensam digital ingång leder inte i sig till sammanhängande tjänster, utan förutsätter att processer, ansvar och datadelning fungerar samordnat över organisationsgränser, och att ansvar ligger hos de aktörer som har ansvar över data, regelverk och processer. På kort och medellång sikt handlar arbetet med en gemensam digital ingång i stor utsträckning om att skapa sammanhang, vägledning och integration – snarare än att ersätta befintliga tjänster (s. 14).","beskrivning":"När digitala samhällsfunktioner organiseras efter systemets logik snarare än efter hur människor söker och förstår information blir innehåll otillgängligt trots att det tekniskt finns där.","lankar":["https://www.riksrevisionen.se/download/18.1e0fa62b19047f61fcc9553/1719239329567/RiR_2023_6_master.pdf","https://www.begripsam.se/download/18.34c5105e19cf45dbbdba114/1773657022640/SMFOI_2025_huvudrapport_v2.pdf","https://www.digg.se/download/18.4d9d13fe19c34cfab85e4b/1772203531877/Rapport-Uppf%C3%B6ljning-av-digitaliseringsstrategin-feb-2026.pdf","https://www.digg.se/download/18.12d3b9fb19d0d4280da64f/1774989242010/Uppdrag%20att%20beskriva%20utmaningar%20och%20mo%CC%88jligheter.pdf"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.5 Diskriminerande systemdesign","taxonomi_id":"1.5.4","kategori":"Kognitiva krav","situation_exempel":"Ansökan har så många steg och tidsgränser att jag inte hinner tänka — jag ger upp halvvägs och det finns inget sätt att spara och fortsätta senare","radgivning_enskild":"Resp. myndighet (begära hjälp, FL 6 §); Statens servicecenter","radgivning_utforare":"Digg (DOS-lagen); DO (diskrimineringsperspektiv)","tvist":"DO (bristande tillgänglighet som diskriminering); förvaltningsrätten (om beslut kan överklagas)","tillsynsmyndighet":"Digg (DOS-lagen); JO; DO (om funktionsnedsättning, diskrimineringslagen)","lagstod":"FL 6–7 §§ (smidiga kontakter, tillgänglighet); SFS 2018:1937 (DOS-lagen); Diskrimineringslagen (2008:567) 1 kap. 4 § (bristande tillgänglighet som diskriminering)","tillsynslucka":"Delvis – WCAG ställer krav på tillräcklig tid (2.2.1) och begriplig information (3.1) men Digg bedriver inte tillsyn i den utsträckning EU kräver (RiR 2023:6 s. 59). Kognitiv tillgänglighet saknar specifika krav i nuvarande standard.","lucka_status":"Delvis","empirisk_kalla":"RiR 2023:6 (2023) Digitala tjänster till privatpersoner – stora utvecklingsmöjligheter för statliga myndigheter s. 30: Några av personerna med neuropsykiatrisk\nfunktionsnedsättning (NPF) ger uttryck för problem när man blir stressad, att de\nuppfattar tjänsterna som röriga och att de känner en oro och osäkerhet inför om de\nanvänder tjänsterna på rätt sätt.| SMFOI 2025 s. 12: Lagstiftning om tillgänglighet på webben ställer övergripande krav på begriplighet men den stora majoriteten av personer med\nfunktionsnedsättning är beroende av att man ser lagstiftningen som en miniminivå och går vidare genom att göra tjänsterna enklare, mer begripliga och med bättre design.","beskrivning":"Digitala samhällsfunktioner som innehåller många steg, korta tidsgränser eller komplex information skapar hinder för den som behöver mer tid eller tydligare struktur.","lankar":["https://www.riksrevisionen.se/download/18.1e0fa62b19047f61fcc9553/1719239329567/RiR_2023_6_master.pdf","https://www.begripsam.se/download/18.34c5105e19cf45dbbdba114/1773657022640/SMFOI_2025_huvudrapport_v2.pdf"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.6 Ansvar för användbarhet","taxonomi_id":"1.6.1","kategori":"Pedagogiskt ansvar","situation_exempel":"Mitt anslutningståg ställdes in och jag står på stationen. Tågföretagets chatbot fattar inte vad jag menar och jag hittar inget telefonnummer. Jag vet inte ens om jag har rätt till ersättning.","radgivning_enskild":"Kommunal konsumentvägledning; Hallå konsument","radgivning_utforare":"Konsumentverket (vägledning om kundservice)","tvist":"ARN (ej bindande)","tillsynsmyndighet":"Konsumentverket; Transportstyrelsen (tågpassagerarförordningen)","lagstod":"FL 6–7 §§ (om myndighet); SFS 2022:260 (om privat); EU 2021/782 (tågpassagerare)","tillsynslucka":"Nej – Tillsynsansvaret är splittrat mellan myndighet, kommun och marknad – ingen instans granskar rätten till fungerande stöd som en helhet.","lucka_status":"Nej","empirisk_kalla":"DN/Kristofer Ahlström (2026) Hur dålig kan kundtjänst bli innan den blir direkt olaglig?: AI-chatbottar, timslånga telefonköer, telefonnummer omöjliga att hitta – supporten fungerar inte i realtid.","beskrivning":"Den som ansvarar för ett digitalt system ansvarar också för att den enskilde kan använda det. När stöd saknas eller ersätts med otillräckliga automatiserade lösningar förskjuts ansvaret till den enskilde.","lankar":["https://www.dn.se/kultur/kristofer-ahlstrom-hur-dalig-kan-kundtjanst-bli-innan-den-blir-direkt-olaglig/"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.6 Ansvar för användbarhet","taxonomi_id":"1.6.2","kategori":"Förändringsansvar","situation_exempel":"Appen uppdaterades – jag som kunde förut hittar inte längre","radgivning_enskild":"Resp. myndighet (FL 6 §, om offentlig tjänst); kundtjänst (om privat tjänst); kommunal vägledning i digital vardag (om det finns)","radgivning_utforare":"Digg (digital tillgänglighet); Konsumentverket (om privat tjänst)","tvist":"Saknas – en gränssnittsförändring är inte ett överklagbart beslut","tillsynsmyndighet":"JO (om myndighet); Digg (DOS-lagen); Konsumentverket (om privat, systematiska brister); PTS (LPTT – om privat tjänst inom bank, e-handel, elektronisk kommunikation)","lagstod":"FL 6–7 §§; SFS 2018:1937 (DOS-lagen); KköpL (2022:260) om privat tjänst; LPTT (2023:254)","tillsynslucka":"Nej – ingen myndighet granskar att gränssnittsförändringar inte försämrar användbarhet för befintliga användare. DOS-lagen kräver tillgänglighet men inte kontinuitet vid förändring","lucka_status":"Nej","empirisk_kalla":"PC-tidningen (2026-02-01): Windows 11-uppdatering KB5074109 låste filer i OneDrive och Dropbox för tusentals användare – installerades automatiskt utan att den enskilde kunde förhindra det. Ingen lösning från Microsoft vid publiceringen. | Kommentar från skapare av taxonomi: Ingen myndighet följer systematiskt upp om gränssnittsförändringar eller tvingande uppdateringar försämrar användbarhet för befintliga användare.","beskrivning":"Medborgaren behärskar en digital tjänst men tjänsten uppdateras och personen kan inte längre navigera den. Inte kognitiv exkludering i traditionell mening: förmågan finns men gränssnittet ändras snabbare än anpassningsförmågan.","lankar":["https://pctidningen.se/datorutrustning/operativsystem/windows-11/katastrofal-windows-uppdatering-laser-dina-filer"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.6 Ansvar för användbarhet","taxonomi_id":"1.6.3","kategori":"Rättighetsansvar","situation_exempel":"Mitt konto stängdes utan förklaring. Ingen kontaktväg alls.","radgivning_enskild":"Saknas i praktiken. IMY (klagomål); Hallå konsument (allmän vägledning)","radgivning_utforare":"Konsumentverket (vägledning om informationsskyldighet); IMY (dataskydd)","tvist":"Oklart – DSA art. 20 ger rätt till intern klagomålshantering hos plattformen, men tvistlösning (art. 21) sker via certifierat organ som ofta saknas i Sverige.","tillsynsmyndighet":"Konsumentverket / IMY; Mediemyndigheten (DSA); PTS (LPTT – e-handel)","lagstod":"DSA (EU) 2022/2065 art. 20–21; e-handelslagen (2002:562) 8 § (kontaktuppgiftskrav); LPTT (2023:254","tillsynslucka":"Nej – plattformar har ingen skyldighet att erbjuda mänsklig kontakt. Konsumenten saknar i praktiken möjlighet att nå fram.","lucka_status":"Nej","empirisk_kalla":"Forbrukerrådet (2026) Breaking free. Pathways to a fair technological future: plattformar stänger kontaktvägar och använder automatiserade system som enda kanal.  | Konsumentverket (2025:3) Brister i företagens kundtjänster s. 3: 19 av 60 företag saknade fullständiga kontaktuppgifter; s. 17–18: 42 av 60 erbjöd chatt/formulär men bara 2 informerade om möjlighet att spara kommunikationen.","beskrivning":"Den som ansvarar för ett digitalt system ansvarar också för att den enskilde kan använda det. När stöd saknas eller ersätts med otillräckliga automatiserade lösningar förskjuts ansvaret till den enskilde.","lankar":["https://storage02.forbrukerradet.no/media/2026/02/breaking-free-pathways-to-a-fair-technological-future.pdf","https://stpubshop.blob.core.windows.net/publikationer/redovisningsrapport-2025-3-brister-i-foretagens-kundtjanster-konsumentverket-2025_02b.pdf"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.6 Ansvar för användbarhet","taxonomi_id":"1.6.4","kategori":"Ansvarsförskjutning via digital självservice","situation_exempel":"Jag visste inte att mina myndighetsbrev gick till Kivra – missade en betalning och hamnade hos Kronofogden.","radgivning_enskild":"Kommunal konsumentvägledning; Kronofogden (begära omprövning)","radgivning_utforare":"Digg (vägledning om digital post)","tvist":"Kronofogden (invändning mot betalningsföreläggande); förvaltningsrätten (om myndighetsbeslut)","tillsynsmyndighet":"Digg (digital post som infrastruktur); IMY (om personuppgiftsbehandling vid anslutning); JO (om myndighets delgivningsskyldighet)","lagstod":"FL 6–7 §§ (tillgänglighet, service); SFS 2023:704 (lagen om auktoriserade digitalpostlådor); delgivningslagen (2010:1932)","tillsynslucka":"Nej – ingen granskar att den enskilde faktiskt förstått att post omdirigeras digitalt, eller att konsekvenserna av att missa digital post kan vara rättsförlust","lucka_status":"Nej","empirisk_kalla":"Sveriges Radio Plånboken (2020-10-21): 14-årings Kivra-konto ledde till missad post från Skatteverket – hamnade hos Kronofogden. | Raymond, T. (2025) Gotland i en digital tid s. 79: It-handledaren på Korpens bibliotek berättar att ett grundläggande problem är att många\ninte vet om att de har en digital brevlåda. Det har till exempel hänt att personalen har hjälpt någon att logga in och de hittade flera fakturor som redan hade förfallit.","beskrivning":"Ärenden som rör ekonomisk utsatthet, sjukdom, våld eller rättslig osäkerhet hanteras digitalt utan alternativ. Systemet förutsätter att den enskilde klarar självbetjäning i situationer där det sällan är rimligt","lankar":["https://www.sverigesradio.se/artikel/7579862","https://dokument.gotland.se/IntegrationService.svc/doc/content/49202"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.7 Ansvarsluckor och bristande styrning","taxonomi_id":"1.7.1","kategori":"Avsaknad av systemansvar","situation_exempel":"Jag blev sjukskriven och behövde kontakta FK, AF, kommunen och min vårdcentral — alla med olika inloggningar, olika handläggare och olika regler. Ingen kunde ge mig en överblick. Jag vet fortfarande inte om jag missat något jag hade rätt till.","radgivning_enskild":"Resp. myndighet; kurator på vårdenheten; patientnämnden; Statens servicecenter; Finsam (samordnad rehabilitering)","radgivning_utforare":"Digg (vägledning om digital samordning och Ena); SKR (stöd till kommuner och regioner om samverkan)","tvist":"Saknas – bristande samverkan mellan myndigheter är inte överklagbart som enskilt beslut.","tillsynsmyndighet":"JO; IVO (vårdkedjan); Digg (digital samordning)","lagstod":"RF 1 kap. 2 §; FL 6 § (service), 8 § (samverkan); HSL (2017:30) 7 kap. 2–3 § (fast vårdkontakt, samordnad individuell plan)","tillsynslucka":"Nej – FL 8 § kräver samverkan och HSL kräver samordnad individuell plan, men ingen av dem omfattar digitala system. Ingen myndighet ansvarar för att medborgaren har en samlad bild.","lucka_status":"Nej","empirisk_kalla":"Digg/PTS (2026) Redovisning av uppdraget att stödja genomförandet av Sveriges Digitaliseringsstrategi s. 26–27: Brister i ansvarsfördelning, finansiering och prioritering skapar stuprör mellan initiativ. Tre strukturella glapp: (1) ansvar och mandat otydliga vid gemensamma beslut, (2) långsiktig finansiering saknas, (3) inga återkommande processer som väger sektorers behov mot varandra. | RiR 2023:6 Digitala tjänster till privatpersoner – stora utvecklingsmöjligheter för statliga myndigheters: Det saknas i de flesta fall en samlad plats där man kan få information om vilka myndigheter som ska kontaktas och i vilken ordning, vid en\nviss livshändelse (sid. 36). Riksrevisionen konstaterar att det inte finns legala hinder för en starkare nationell styrning från regeringen (sid. 70). |SMFOI 2025 s. 49: digital brevlåda skapar fragmentering — räkningar kommer via internetbanken, Kivra, Klarna, Mina Sidor. | Digg (2026) Uppdrag att analyser och beskriva möjligheter och utmaningar kopplade till att etablera en digital ingång till det offentliga: Etableringen av en gemensam digital ingång är inte i första hand en teknisk fråga. Den handlar i hög grad om styrning, ansvar och arbetssätt. För att lyckas behöver offentlig förvaltning i större utsträckning agera samlat utifrån människors behov, snarare än utifrån enskilda organisationers uppdrag. En gemensam digital ingång leder inte i sig till sammanhängande tjänster, utan förutsätter att processer, ansvar och datadelning fungerar samordnat över organisationsgränser, och att ansvar ligger hos de aktörer som har ansvar över data, regelverk och processer.","beskrivning":"Aktörer tar ansvar för sin del, men ingen ansvarar för hur systemen samverkar eller vilka barriärer som uppstår i kedjan.","lankar":["https://www.digg.se/download/18.4d9d13fe19c34cfab85e4b/1772203531877/Rapport-Uppf%C3%B6ljning-av-digitaliseringsstrategin-feb-2026.pdf","https://www.riksrevisionen.se/download/18.1e0fa62b19047f61fcc9553/1719239329567/RiR_2023_6_master.pdf","https://www.begripsam.se/download/18.34c5105e19cf45dbbdba114/1773657022640/SMFOI_2025_huvudrapport_v2.pdf","https://www.digg.se/download/18.12d3b9fb19d0d4280da64f/1774989242010/Uppdrag%20att%20beskriva%20utmaningar%20och%20mo%CC%88jligheter.pdf"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.7 Ansvarsluckor och bristande styrning","taxonomi_id":"1.7.2","kategori":"Otydliga styrkedjor","situation_exempel":"Min region bytte journalsystem och nu kan personalen inte se min läkemedelshistorik ordentligt – risken för feldosering har ökat","radgivning_enskild":"Patientnämnden; 1177; ansvarig vårdgivare","radgivning_utforare":"E-hälsomyndigheten (nationell digital infrastruktur); SKR (stöd till regioner vid systembyten)","tvist":"IVO (tillsynsbeslut vid patientsäkerhetsrisk)","tillsynsmyndighet":"IVO (patientsäkerhet); JO","lagstod":"HSL (2017:30) 3 kap. 1 § (vård på lika villkor); patientsäkerhetslagen (2010:659); patientdatalagen (2008:355)","tillsynslucka":"Delvis – IVO har tillsyn över patientsäkerhet men inte över regionernas val av journalsystem eller upphandlingsprocess. Ingen myndighet granskar att systembyten inte försämrar patientsäkerheten","lucka_status":"Delvis","empirisk_kalla":"SVT (2026-03-06) Allvarliga kritiken mot nya journalsystemet Cosmic: Läkemedelskommittén i Region Västernorrland varnar för att Cosmic försvårar uppföljning av läkemedelshistorik och ökar risken för feldoseringar. | Svensk farmaci (2025-08-13) Fel i Cosmic gör att patienter riskerar att få fel läkemedel: Praktikertjänst anmälde till Läkemedelsverket, felet hade tidigare anmälts av tillverkaren Cambio men kvarstod i flera versioner (4.0–4.2). Remisser försvinner ur systemet under vissa förhållanden.","beskrivning":"Det är oklart vem som ska agera när problem uppstår, särskilt i samverkande system där flera myndigheter och leverantörer är inblandade. Parallella nationella infrastrukturer (Ena, NDI, sektorspecifika satsningar) byggs utan explicit samordning.","lankar":["https://www.svt.se/nyheter/lokalt/vasternorrland/allvarliga-kritiken-mot-nya-journalsystemet-coscmic","https://www.svenskfarmaci.se/2025/08/13/fel-i-cosmic-gor-att-patienter-riskerar-att-fa-fel-lakemedel/"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.7 Ansvarsluckor och bristande styrning","taxonomi_id":"1.7.3","kategori":"Bristande konsekvensanalys","situation_exempel":"Hemtjänsten gick över till digital matbeställning utan att utreda om jag klarar det – jag har svårt att se och beställer samma saker varje vecka","radgivning_enskild":"Kommunens biståndshandläggare; patientnämnden","radgivning_utforare":"IVO (vägledning om välfärdsteknik); SKR (stöd till kommuner); Institutet för mänskliga rättigheter (vägledning om konsekvensutredningar)","tvist":"IVO (om insatsen inte möter behovet); JO","tillsynsmyndighet":"IVO (omsorgens kvalitet); kommunens egna revisorer","lagstod":"SoL (2025:400) 2 kap. 4 § (lätt tillgänglig); 8 kap. 2–3 §§ (äldres självständighet); SFS 2024:183 (konsekvensutredningsförordningen)","tillsynslucka":"Nej – 120 kommuner har infört digitala matinköp (SR 2026) utan dokumenterad konsekvensanalys av nutritionseffekter.","lucka_status":"Nej","empirisk_kalla":"Sveriges Radio (2026-02-12) Äldre tvingas handla mat digitalt – Johan: ”Blev omöjligt”: i minst 120 kommuner har hemtjänstpersonal slutat handla i fysisk butik. SKR kallar det \"nödvändig effektiviseringsåtgärd\". | Begripsam (2025) Utestängd från det kontantlösa samhället s. 21: hemtjänstpersonal beskriver att digitala matinköp leder till att brukare beställer kakor och godis istället för riktig mat.| Institutet för mänskliga rättigheter (2026) Årsrapport 2026 s. 34: I våra remissvar påpekar vi återkommande att statliga utredningar i många fall saknar tillräckliga konsekvensbedömningar utifrån mänskliga rättigheter, vilket försvårar möjligheten att tidigt se risker och göra tydliga avvägningar och proportionalitetsbedömningar.","beskrivning":"Digitala lösningar införs utan att strukturella exkluderingsrisker analyseras, särskilt i gränssnitt mellan system och myndigheter.","lankar":["https://www.sverigesradio.se/artikel/allt-fler-aldre-med-hemtjanst-maste-handla-mat-digitalt","https://www.begripsam.se/download/18.4fd9741419ac5edf2a463b49/1764751364652/Rapport%20Utesta%CC%88ngd%20fra%CC%8An%20det%20kontantlo%CC%88sa%20samha%CC%88llet%20december%202025.pdf","https://mrinstitutet.se/download/18.234277b219d0483f491b63a/1774331817101/Rapport-Arsrapport-2026.pdf"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.7 Ansvarsluckor och bristande styrning","taxonomi_id":"1.7.4","kategori":"Regelverk som skapar oavsiktlig exkludering","situation_exempel":"Banken stängde mitt företagskonto för att kunderna inte uppfyllde kundkännedomskraven – nu är jag utan betalkonto, utan BankID och kan inte betala skatt, räkningar eller skicka pengar till min dotter","radgivning_enskild":"Konsumenternas Bank- och finansbyrå; Länsstyrelsen (betaltjänstlagen); kommunal budget- och skuldrådgivning","radgivning_utforare":"FI (vägledning om betalkontodirektivet och kundkännedom)","tvist":"ARN bankavdelningen (ej bindande); allmän domstol","tillsynsmyndighet":"Finansinspektionen (bankernas kundkännedom och betalkontodirektivet); Länsstyrelsen (betaltjänstlagen)","lagstod":"Betaltjänstlagen (2010:751) 4a kap. (rätt till betalkonto); penningtvättslagen (2017:630); EU betalkontodirektivet (2014/92/EU)","tillsynslucka":"Nej – FI granskar kundkännedom och betalkontodirektivet separat, men ingen myndighet äger konflikten mellan regelverken. Bankerna tolkar penningtvättslagen så att den i praktiken övertrumfar rätten till betalkonto.","lucka_status":"Nej","empirisk_kalla":"Länsstyrelserna (2025) När betaltjänster är otillgängliga, Persona Anders (52 år): penningtvättsregler ledde till att två banker sa upp kontot; nekas nytt konto pga betalningsanmärkning. Skulder vuxit till 50 000 kr. Kommunens skuldrådgivning nekade hjälp för att gården räknas som näringsverksamhet. | Riksbanken, Betalningsrapporten 2026 s. 55: Riksbanken anser att bankerna, riksdagen och regeringen behöver göra mer för att\ninkludera fler på betalningsmarknaden. För det första bör bankerna alltid pröva riskreducerande åtgärder innan de nekar eller avslutar ett betalkonto. Finansinspektionen ska ge ut vägledning på området, vilkettkommer hjälpa bankerna att göra korrekta bedömningar när penningtvättsregelverket hamnar i konflikt med rätten till ett betalkonto. .","beskrivning":"Regelverk som penningtvättlagen eller kundkännedomsregler kan oavsiktligt utestänga invånare och företag. Problemet uppstår när olika myndigheters regelverk inte är samordnade eller när implementeringen inte tar hänsyn till de grupper som lagen avser att skydda.","lankar":["https://www.lansstyrelsen.se/download/18.1dda0708198e5f6fa8112688/1756382206490/N%C3%A4r%20betaltj%C3%A4nster%20%C3%A4r%20otillg%C3%A4ngliga%20Ber%C3%A4ttelser%20fr%C3%A5n%20verkligheten%202025.pdf","https://www.riksbank.se/sv/betalningar--kontanter/sa-betalar-svenskarna/betalningsrapport-2026/"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.7 Ansvarsluckor och bristande styrning","taxonomi_id":"1.7.5","kategori":"Implementering av EU-direktiv","situation_exempel":"Myndighetens webbplats är inte tillgänglig för mig som synskadad","radgivning_enskild":"Digg (anmäl bristande tillgänglighet); resp. myndighet","radgivning_utforare":"Digg (vägledning om webbtillgänglighet och WCAG); MFD (Myndigheten för delaktighet)","tvist":"Förvaltningsrätten (överklagande av Diggs tillsynsbeslut); DO (diskrimineringsärende)","tillsynsmyndighet":"Digg (DOS-lagen); JO","lagstod":"SFS 2018:1937 (DOS-lagen); EU-direktiv 2016/2102 (webbtillgänglighetsdirektivet); Diskrimineringslagen (2008:567) 1 kap. 4 §","tillsynslucka":"Nej – EU kräver granskning av 309 webbplatser och 17 appar per år; Digg klarar ca 40 % med tre handläggare","lucka_status":"Nej","empirisk_kalla":"Rir 2023:6 Digitala tjänster till privatpersoner – stora utvecklingsmöjligheter för statliga myndigheter s 59-60 : Digg bedriver inte tillsyn i den utsträckning EU kräver. Enligt Diggs budgetunderlag för 2023–2025 räcker de medel som Digg får för uppdraget bara till övervakning av ungefär 40 procent av vad EU-kommissionen har beslutat om. | Digg/PTS (2026) Redovisning av uppdraget att stödja genomförandet av Sveriges Digitaliseringsstrategi  s. 35: Mätningar av webbplatser och appar visar fortfarande stora tillgänglighetsbrister inom både offentlig och privat sektor.","beskrivning":"EU-direktiv som genomförs genom ändringar i flera svenska lagar riskerar att splittra tillsynsansvar och försvaga det avsedda skyddet. Riksrevisionen har konstaterat att tillsyn enligt DOS-lagen inte bedrivs i den utsträckning EU kräver (RiR 2023:6)","lankar":["https://www.riksrevisionen.se/download/18.1e0fa62b19047f61fcc9553/1719239329567/RiR_2023_6_master.pdf","https://www.digg.se/download/18.4d9d13fe19c34cfab85e4b/1772203531877/Rapport-Uppf%C3%B6ljning-av-digitaliseringsstrategin-feb-2026.pdf"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.7 Ansvarsluckor och bristande styrning","taxonomi_id":"1.7.6","kategori":"Effektivitetslogik och förvaltningsmässig inlåsning","situation_exempel":"Kommunen räknade på vad de sparar genom att skicka post digitalt – men inte på vad jag behöver för att ta emot digital post, att mina anhöriga lägger timmar på att hjälpa mig, eller vad som händer när jag missar ett brev och hamnar hos Kronofogden eller missar en läkartid.","radgivning_enskild":"Resp. myndighet (begära fysisk post); Kronofogden (invändning vid krav); kommunal konsumentvägledning","radgivning_utforare":"Digg (vägledning om digital post); ESV (nyttorealisering)","tvist":"Förvaltningsrätten","tillsynsmyndighet":"Digg (digital post som infrastruktur); JO; ESV (nyttokalkyler i statlig förvaltning)","lagstod":"FL 6–7 §§ (tillgänglighet, service); SFS 2023:704 (lagen om auktoriserade digitala brevlådor); SFS 2024:183 (konsekvensutredningsförordningen); delgivningslagen (2010:1932)","tillsynslucka":"Nej – standardmall för nyttokalkyl saknar rutinmässigt poster för invånarens kostnader. Konsekvensutredningsförordningen kräver analys vid införanden men ingen granskar att den genomförs.","lucka_status":"Nej","empirisk_kalla":"Raymond, T. (2025) Gotland i en digital tid s 71-72: Genomgång av Ineras nyttokalkylmall visar att poster för invånarens och anhörigas kostnader saknas.","beskrivning":"Organisationens behov av styrning, kontroll eller effektivitet gör det omöjligt att avvika från digitala rutiner, även när den enskildes behov kräver något annat. Systemets inre logik går före den enskildes rätt till stöd.","lankar":["https://dokument.gotland.se/IntegrationService.svc/doc/content/49202"]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.8 Digital robusthet och kontinuitet","taxonomi_id":"1.8.1","kategori":"Cybersäkerhet i samhällsviktiga tjänster","situation_exempel":"","radgivning_enskild":"","radgivning_utforare":"","tvist":"","tillsynsmyndighet":"","lagstod":"","tillsynslucka":"","lucka_status":"Nej","empirisk_kalla":"","beskrivning":"","lankar":[]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.8 Digital robusthet och kontinuitet","taxonomi_id":"1.8.2","kategori":"Digital suveränitet och kritiska beroenden","situation_exempel":"","radgivning_enskild":"","radgivning_utforare":"","tvist":"","tillsynsmyndighet":"","lagstod":"","tillsynslucka":"","lucka_status":"Nej","empirisk_kalla":"","beskrivning":"","lankar":[]},{"tax_huvusektion":"Systembarriärer","tax_huvudsektion_beskrivning":"Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.","tax_kat":"1.8 Digital robusthet och kontinuitet","taxonomi_id":"1.8.3","kategori":"Kontinuitet i kris och höjd beredskap","situation_exempel":"","radgivning_enskild":"","radgivning_utforare":"","tvist":"","tillsynsmyndighet":"","lagstod":"","tillsynslucka":"","lucka_status":"Nej","empirisk_kalla":"","beskrivning":"","lankar":[]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.1 Ekonomisk utsatthet","taxonomi_id":"2.1.1","kategori":"Fattigdom","situation_exempel":"Kommunen nekar mig dator eftersom jag har en smartphone – men på den lilla skärmen är det svårt att fylla i formulär och bifoga bilagor","radgivning_enskild":"Kommunens socialtjänst; biblioteket (låna dator); konsumentbudgetrådgivning","radgivning_utforare":"Socialstyrelsen (riktlinjer om ekonomiskt bistånd); SKR (stöd till kommuner)","tvist":"Förvaltningsrätten (överklaga biståndsbeslut); kammarrätten","tillsynsmyndighet":"IVO (socialtjänstens insatser); Länsstyrelsen (kommunens socialtjänst)","lagstod":"SoL (2025:400) 12 kap. (ekonomiskt bistånd, skälig levnadsnivå); RF 1 kap. 2 §","tillsynslucka":"Nej – ingen nationell vägledning om digital utrustning som del av skälig levnadsnivå. Kammarrättens dom (2018) att smartphone uppfyller samma behov som dator tillämpas generellt.","lucka_status":"Nej","empirisk_kalla":"Raymond, T. (2024) Digital delaktighet. Digitalisering som inte lämnar någon utanför. s. 19: Ansökan om införskaffande av mobiltelefon eller dator kan beviljas utifrån skäliga kostnader som respektive kommun bedömer. Däremot beviljas sällan inköp av dator/surfplatta om en smartphone redan finns i hemmet. Anledningen är att en smartphone med internetuppkoppling bedöms uppfylla samma behov som en dator enl dom i Kammarrätten i Göteborg (mål 3255–18, 2018-12-11). | Sveriges Stadsmissioner (2024) Fattigdomsrapporten 2024 s.12: Socialstyrelsen, som ansvarar för de nationella riktlinjerna kring ekonomiskt bistånd, har vid upprepade tillfällen uttryckt oro över att nivån för riksnormen inte överensstämmer med deras syn på en skälig levnadsnivå.","beskrivning":"Digitala samhällsfunktioner förutsätter att den enskilde har råd med abonnemang, enheter, underhåll och löpande datatrafik. Kostnaden för digital delaktighet har aldrig systematiskt beräknats eller kompenserats. Den som inte har råd hänvisas till olika publika lösningar med olika typer av begränsningar och säkerhetsinställningar.","lankar":["https://www.rvn.se/contentassets/8acb7d26c2754f148a1de07e95b4675f/digital-delaktighet-rapport-rvn-digidel-240530.pdf","https://www.dagensjuridik.se/nyheter/ny-praxis-far-ratt-till-socialbidrag-for-kop-av-smartphone/","https://sverigesstadsmissioner.se/wp-content/uploads/Fattigdomsrapporten-2024-Sveriges-Stadsmissioner.pdf"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.1 Ekonomisk utsatthet","taxonomi_id":"2.1.2","kategori":"Otillräcklig kreditprövning","situation_exempel":"Jag klickade \"betala senare\" utan att förstå att \ndet var ett lån – nu har jag skulder hos flera \ninkassobolag","radgivning_enskild":"Konsumenternas Bank- och finansbyrå; kommunal budget- och skuldrådgivning; Hallå konsument","radgivning_utforare":"FI (vägledning om kreditprövning); Konsumentverket (marknadsföring av krediter)","tvist":"ARN bankavdelningen (ej bindande); allmän domstol","tillsynsmyndighet":"Finansinspektionen (kreditprövning och marknadsföring); Konsumentverket (marknadsföring av krediter)","lagstod":"Konsumentkreditlagen (2010:1846) 12 § (kreditprövning), 19 § (ränteändringar); lagen om bank- och finansieringsrörelse (2004:297)","tillsynslucka":"Delvis – FI har tillsyn över kreditgivare men kreditprövningen brister systematiskt.","lucka_status":"Delvis","empirisk_kalla":"Konsumenternas Bank- och finansbyrå (2026) Årsredovisning 2025: Flera klagomål angående konsumtionslån bland annat räntefria kampanjer med dolda villkor, bristfälliga kreditprövningar och annuitetslån med lång återbetalningstid.","beskrivning":"Kreditgivare beviljar lån och krediter trots uppenbar återbetalningsoförmåga. Villkor är svåra att förstå, räntor höga och möjligheten att omförhandla obefintlig. Skuldsättningen som följer kan i sin tur leda till kreditvärdighetsexkludering (2.1.3)","lankar":["https://www.konsumenternas.se/globalassets/pdf/vb/verksamhetsberattelse-2025.pdf"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.1 Ekonomisk utsatthet","taxonomi_id":"2.1.3","kategori":"Kreditvärdighetsexkludering","situation_exempel":"Jag nekas mobilabonnemang på grund av skulder och kan inte längre nå digitala samhällsfunktioner","radgivning_enskild":"Resp. operatör (förskottsalternativ); Kommunal budget- och skuldrådgivning; Konsumenternas Bank- och finansbyrå; Telekområdgivarna","radgivning_utforare":"PTS (samhällsomfattande tjänster)","tvist":"ARN (ej bindande); allmän domstol","tillsynsmyndighet":"PTS (LPTT – elektronisk kommunikation); FI (kreditupplysning)","lagstod":"LEK (2022:482) 7 kap. (samhällsomfattande tjänster – täcker telefoni men inte mobildata eller bredband). I övrigt saknas lagstöd som säkerställer skuldsattas tillgång till digital infrastruktur; LPTT (2023:254)","tillsynslucka":"Nej – LEK:s samhällsomfattande tjänster täcker telefoni men inte mobildata eller bredband. Ingen myndighet säkerställer att skuldsatta behåller tillgång till digital infrastruktur.","lucka_status":"Nej","empirisk_kalla":"Kronofogden (2026): Antalet skuldsatta i Sverige är nästan 450 000. | Telia (2026): du kan inte teckna abonnemang hos oss om du har en betalningsanmärkning. Om du redan är kund och har ett eller flera befintliga abonnemang kan du behålla dem. Du kan dock inte förlänga eller göra om villkoren för dem, exempelvis ta ut en ny mobil eller ta del av ett kampanjerbjudande. | Bredbandsval.se (2025): De flesta internetleverantörer utför en kreditkontroll i samband med beställning av bredband. Om den kreditupplysning som görs visar på en nedsatt betalningsförmåga kan tyvärr operatören neka dig att skaffa bredband via dem.","beskrivning":"Skuldsättning eller låg kreditvärdighet kan hindra tillgång till internet- och telefonabonnemang.","lankar":["https://kronofogden.se/om-kronofogden/nyheter-och-press/pressmeddelande/2026-01-26-skulderna-hos-kronofogden-fortsatter-att-oka#:~:text=Skatteskulder%20vanligt&text=%C3%84ven%20antalet%20skuldsatta%20%C3%B6kar%20n%C3%A5got,procent%20j%C3%A4mf%C3%B6rt%20med%20f%C3%B6reg%C3%A5ende%20%C3%A5r.","https://www.telia.se/support/kopinformation","https://www.bredbandsval.se/bredband/betalningsanmarkning"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.2 Funktionsrelaterad exkludering","taxonomi_id":"2.2.1","kategori":"Kognitiv exkludering","situation_exempel":"Jag har en NPF-diagnos och Försäkringskassans ansökan har så många steg och tidsgränser att jag ger upp halvvägs och det finns inget sätt att spara och fortsätta senare","radgivning_enskild":"Försäkringskassan (telefon/besök); Statens servicecenter; funktionsrättsorganisation","radgivning_utforare":"","tvist":"JO; DO (om bristande tillgänglighet utgör diskriminering)","tillsynsmyndighet":"Digg (DOS-lagen); DO; JO","lagstod":"DOS-lagen (2018:1937); diskrimineringslagen (2008:567) 1 kap. 4 § (bristande tillgänglighet); FL 6–7 §§","tillsynslucka":"Delvis – DOS-lagen täcker WCAG-krav men inte kognitiv tillgänglighet som informationsarkitektur, antal steg, tidsgränser eller möjlighet att spara och återkomma. WCAG 2.1 har vissa kognitiva kriterier men de är svaga och sällan granskade.","lucka_status":"Delvis","empirisk_kalla":"RiR 2026:4 s. 28: I samtal med fokusgrupper med företrädare för organisationer inom\nfunktionshinderområdet framkommer att försäkrade med kognitiv nedsättning har\nsvårt att anmäla ändrade förhållanden inom sjukersättning. | FN:s funktionsrättskommitté (2024, CRPD/C/SWE/CO/2–3, punkt 9c): konstaterar att det saknas tillräckliga möjligheter för enskilda att klaga och få upprättelse i fall där kommuner och regioner brister i genomförandet av funktionsrättskonventionens rättigheter. |  Institutet för mänskliga rättigheter (2026) Årsrapport 2026:  I undersökning från 2023, genomförd tillsammans med Rivkraftspanelen, besvarad av\n1 833 personer med funktionsnedsättning, uppgav endast 36 procent av\ndeltagarna att de vet vart de kan vända sig om deras rättigheter inte efterlevs.","beskrivning":"Digitala samhällsfunktioner som förutsätter snabb orientering, komplex navigering eller stor mängd information utestänger den som behöver mer tid, tydligare struktur eller enklare gränssnitt.","lankar":["https://www.riksrevisionen.se/download/18.3183a4c019c47d273ac1dc18/1771403839821/RiR-2026-4-rapport.pdf","https://regeringen.se/contentassets/c6e42825cbcc4985b771934a7b8248e4/crpd-kommittens-slutsatser-och-rekommendationer-2024-03-22-svensk-oversattning.pdf","https://mrinstitutet.se/download/18.234277b219d0483f491b63a/1774331817101/Rapport-Arsrapport-2026.pdf"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.2 Funktionsrelaterad exkludering","taxonomi_id":"2.2.2","kategori":"Sensorisk exkludering","situation_exempel":"Jag är döv och ska boka tolk via regionens Tolkportal – men verktyget fungerar inte på mobil och regionen har pausat allt förbättringsarbete.","radgivning_enskild":"Tolkcentralen; patientnämnden; Sveriges Dövas Riksförbund (SDR)","radgivning_utforare":"Digg (webbtillgänglighet); MFD (delaktighet); SKR (stöd till regioner)","tvist":"DO (diskrimineringsärende); förvaltningsrätten (om vårdinsats kan överklagas)","tillsynsmyndighet":"Digg (DOS-lagen); IVO (om tolkbrist leder till patientsäkerhetsrisk); DO; PTS (LPTT — elektronisk kommunikation, banktjänster)","lagstod":"DOS-lagen (2018:1937); diskrimineringslagen (2008:567) 1 kap. 4 §; HSL (2017:30) 3 kap. 1 §; språklagen (2009:600) 9 § (det allmänna har ansvar att skydda och främja svenskt teckenspråk); LPTT (2023:254)","tillsynslucka":"Delvis — Tolkportalen som intern beställningsportal kan falla utanför DOS-lagens tillämpningsområde. Sparåtgärder som pausar tillgänglighetsarbete behandlas som generella budgetbeslut, inte som inskränkningar av rättigheter.","lucka_status":"Delvis","empirisk_kalla":"Stockholms Dövas Förening (dec 2024) Rapport från möte angående Tolkportalen: Tolkportalen fungerar inte på mobil, krångligt att ändra/avboka, fel information om support. Stockholms Dövas Förening (maj 2025) Summering från samverkansmötet med Tolkcentralen: ny IT-leverantör tar inte ansvar för tidigare kod, lansering försenad. Tolkbristen ökade från 0,6 % till 3,1 % (228 uppdrag, 441 timmar). Staten tilldelade 28 mkr till Region Stockholm men bara 4 mkr extra nådde Tolkcentralen. FaceTime och WhatsApp får inte användas pga GDPR – yngre döva som saknar bildtelefon har inga alternativa kontaktvägar. Stockholms Dövas Förening (okt 2025) Rapport: samverkansmöte med Tolkcentralen: regionens konsultstopp pausar allt utvecklingsarbete. Tolkportalen fortsatt otillgänglig. Vårdgivare bokar inte tolk vid akuta behov. | FN:s funktionsrättskommitté (2024, CRPD/C/SWE/CO/2–3, punkt 9c): konstaterar att det saknas tillräckliga möjligheter för enskilda att klaga och få upprättelse i fall där kommuner och regioner brister i genomförandet av funktionsrättskonventionens rättigheter.","beskrivning":"Digitala samhällsfunktioner som inte kompenserar för syn- eller hörselnedsättning i sin design utestänger hela grupper.","lankar":["https://stockholmsdf.se/nyheter/rapport-tolkportalen/","https://stockholmsdf.se/nyheter/summering-fran-tolkcentralen/","https://stockholmsdf.se/nyheter/samverkansmote-tolkcentralen/","https://regeringen.se/contentassets/c6e42825cbcc4985b771934a7b8248e4/crpd-kommittens-slutsatser-och-rekommendationer-2024-03-22-svensk-oversattning.pdf"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.2 Funktionsrelaterad exkludering","taxonomi_id":"2.2.3","kategori":"Motorisk exkludering","situation_exempel":"Jag har Parkinsons och kan inte hålla fingret stilla nog för BankID:s fingeravtrycksläsare, sexsiffrig kod, jag träffar fel varje gång","radgivning_enskild":"Banken (alternativa inloggningsmetoder); hjälpmedelscentralen; Funktionsrätt Sverige","radgivning_utforare":"Digg (webbtillgänglighet, EN 301 549); FI (bankernas tillgänglighetskrav)","tvist":"DO (diskrimineringsärende)","tillsynsmyndighet":"DO; Digg (DOS-lagen); FI (BankID som infrastruktur); PTS (LPTT — banktjänster)","lagstod":"Diskrimineringslagen (2008:567) 1 kap. 4 § (bristande tillgänglighet); EN 301 549 kap. 5.3 (biometri ska inte vara enda identifieringsmetod); DOS-lagen (2018:1937); LPTT (2023:254)","tillsynslucka":"Delvis — ansvaret splittrat mellan DO, Digg och FI.","lucka_status":"Delvis","empirisk_kalla":"BankID (support.bankid.com): ansiktsigenkänning stöds bara på iPhone (Face ID) — inte på Android. Användare med motorisk funktionsnedsättning och Android-telefon har bara fingeravtryck och sexsiffrig kod som alternativ.","beskrivning":"Digitala gränssnitt som kräver finmotorik, handstyrka eller precisa rörelser utan alternativ utestänger den som inte kan utföra dem.","lankar":["https://support.bankid.com/sv/tekniska-fragor-och-problem/fingeravtryck-och-ansiktsigenkanning"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.2 Funktionsrelaterad exkludering","taxonomi_id":"2.2.4","kategori":"Psykosocial exkludering","situation_exempel":"Jag måste skicka in återkommande rapporter men är rädd att skriva fel och förlora min ersättning – systemet ger ingen förhandsgranskning och jag vet inte om jag kan ändra efteråt","radgivning_enskild":"Respektive myndighet (telefon); Statens servicecenter","radgivning_utforare":"ISF (granskning av FK:s digitala tjänster); IAF (tillsyn över arbetslöshetsförsäkringen); Digg (digital tillgänglighet)","tvist":"Förvaltningsrätten (om felaktigt beslut)","tillsynsmyndighet":"ISF (Inspektionen för socialförsäkringen); IAF (tillsyn över arbetslöshetsförsäkringen); JO","lagstod":"FL 6–7 §§ (tillgänglighet, service); FL 25 § (kommunikationsskyldighet före beslut)","tillsynslucka":"Delvis — ISF och JO har tillsyn men ingen granskar att gränssnittsdesignen skapar onödig psykisk belastning. FL 25 § (rätt att yttra sig före beslut) syns inte i gränssnittet","lucka_status":"Delvis","empirisk_kalla":"IAF (2018:5) Aktivitetsrapportering — till vilken nytta och för vem? s. 20: De intervjuade var överens om att det finns grupper av sökande som behöver särskilt stöd med aktivitetsrapporteringen och s. 3: En arbetssökande som inte lämnar in sin aktivitetsrapport kan få en sanktion, i form av en varning eller avstängning, för misskötsel av sitt arbetssökande. | RiR 2023:6 s. 30: Ett annat problem handlar om att personer är rädda för att göra fel eller känner sig\nstressade och osäkra.","beskrivning":"Digitala samhällsfunktioner kan skapa stress, ångest eller känsla av maktlöshet genom otydlig systemlogik eller risk för oåterkalleliga fel.","lankar":["https://www.iaf.se/globalassets/dokument/rapporter/2017-2018/2018-5-aktivitetsrapportering-till-vilken-nytta-och-for-vem.pdf","https://www.riksrevisionen.se/download/18.1e0fa62b19047f61fcc9553/1719239329567/RiR_2023_6_master.pdf"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.2 Funktionsrelaterad exkludering","taxonomi_id":"2.2.5","kategori":"Gradvis försämrad kognitiv förmåga","situation_exempel":"Mamma glömmer sina lösenord allt oftare och missar digital post – hon är inte tillräckligt sjuk för god man men klarar inte längre sin digitala vardag","radgivning_enskild":"Vårdcentralen (kognitiv utredning); kommunens biståndshandläggare; bank (fullmakter)","radgivning_utforare":"Överförmyndarnämnden (vägledning om god man och fullmakter); Digg (digital tillgänglighet)","tvist":"Tingsrätten (ansökan om god man)","tillsynsmyndighet":"Överförmyndarnämnden (god man); IVO (om omsorgsbehov)","lagstod":"FB 11 kap. (god man); SFS 2017:310 (framtidsfullmakter); SoL (2025:400)","tillsynslucka":"Nej – det finns ingen mekanism för den gråzon där en person gradvis förlorar digital förmåga men ännu inte uppfyller kraven för god man.","lucka_status":"Nej","empirisk_kalla":"Svenskt Demenscentrum (2023): År 2023 uppgick antalet personer med demenssjukdom till omkring 130 000–150 000. Varje år beräknas 20 000–25 000 personer insjukna, enligt Socialstyrelsen. | Institutet för mänskliga rättigheter (2026) Årsrapport 2026 s. 71: Lagen om stöd och service till vissa funktionshindrade (LSS) undantar funktionsnedsättningar som uppenbart beror på normalt åldrande. Det innebär att personer som får hjälpbehov sent i livet – exempelvis på grund av nedsatt rörlighet, syn, hörsel eller kognitiv svikt – inte har tillgång till samma rättighetsbaserade stöd som yngre personer med motsvarande funktionsnedsättning.","beskrivning":"Digitala samhällsfunktioner förutsätter stabil kognitiv förmåga över tid. Under perioden av gradvis försämring ökar den enskildes behov av kontakt med vård, omsorg och myndigheter samtidigt som systemen saknar rutiner och funktioner för den övergången.","lankar":["https://demenscentrum.se/Fakta-om-demens/Demens-i-siffror/","https://mrinstitutet.se/download/18.234277b219d0483f491b63a/1774331817101/Rapport-Arsrapport-2026.pdf"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.3 Beroendeposition och digital kontroll","taxonomi_id":"2.3.1","kategori":"Tillgång i omsorg","situation_exempel":"Jag bor på LSS-boende och det finns inget internet i min lägenhet – personalen säger att jag kan använda wifi i gemensamma utrymmen men där ser andra min skärm","radgivning_enskild":"Kommunens LSS-handläggare; god man; funktionsrättsorganisation","radgivning_utforare":"IVO (vägledning om LSS-boenden); Socialstyrelsen (riktlinjer om goda levnadsvillkor)","tvist":"Förvaltningsrätten (överklaga biståndsbeslut)","tillsynsmyndighet":"IVO (LSS-boenden och äldreboenden) / Migrationsverket (förvar)","lagstod":"LSS (1993:387) 5–6 §§ (självbestämmande, goda levnadsvillkor, integritet); RF 2 kap. 6 § (skydd för privatliv)","tillsynslucka":"Delvis — IVO har tillsyn men det finns inga nationella krav på internet i den enskildes lägenhet. Frågan om internet ingår i 'goda levnadsvillkor' enligt LSS är inte rättsligt prövad","lucka_status":"Delvis","empirisk_kalla":"Socialstyrelsen (2025) E-hälsa och välfärdsteknik i kommunerna 2025: Internettillgången i enskildas rum eller lägenheter är högre på kommunalt drivna särskilda boenden för äldre än i stöd- och serviceboenden för personer med\nfunktionsnedsättning. 66 procent av kommunerna har uppgett att alla deras särskilda boenden för äldre har tillgång till internet i enskildas rum eller lägenheter. 58 procent av kommunerna uppger att det finns internetuppkoppling på alla stöd- och serviceboenden för personer med funktionsnedsättnin som drivs av kommunen. Resultaten är desamma som förra året. 20 respektive 23 procent av kommunerna saknar internettillgång i enskildas rum eller lägenheter. Samtidigt minskar andelen kommuner som erbjuder gratis internetuppkoppling på sina boenden, i år är den cirka 55 procent. | IVO (2023) Att inte få rätten att leva som andra :IVO har genomfört en riktad tillsyn av 90 gruppbostäder (LSS-boenden) för vuxna med funktionsnedsättningar. IVO har funnit brister i 80 av de 90 granskade gruppbostäderna (tillsynen i fråga gällde otillåtna tvångs- och begränsningsåtgärder)","beskrivning":"Personal i boenden, daglig verksamhet eller förvar kan styra över den enskildes internetåtkomst, enheter och konton – eller aldrig erbjuda uppkoppling. Begränsningar kan vara befogade men förutsätter individuell bedömning. Var femte kommunalt äldreboende och nästan var fjärde LSS-boende saknar internet i de boendes lägenheter (Socialstyrelsen 2025).","lankar":["https://www.socialstyrelsen.se/contentassets/d90a552a88914f07b47eb174b0f4fbd2/2025-5-9625.pdf","https://www.ivo.se/aktuellt/publikationer/rapporter/att-inte-fa-ratten-att-leva-som-andra/"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.3 Beroendeposition och digital kontroll","taxonomi_id":"2.3.2","kategori":"Skyddsbehov","situation_exempel":"Jag flydde från en förövare som jag hade en relation med. Personen gör fortfarande allt för att spåra mig och det är svårt att leva dold när allt är digitalt.","radgivning_enskild":"Kvinnojouren; Brottsofferjouren; Skatteverket (skyddade personuppgifter); banken","radgivning_utforare":"SKR (stöd till kommuner om skyddade personuppgifter); IMY (dataskydd); Jämställdhetsmyndigheten (vägledning om digitalt våld)","tvist":"Polisen (anmälan); tingsrätten (kontaktförbud)","tillsynsmyndighet":"IMY (personuppgifter); FI (bankens hantering); Skatteverket (sekretessmarkering)","lagstod":"Offentlighets- och sekretesslagen (2009:400) 22 kap. 1 §; folkbokföringslagen (1991:481) 16 § (skyddad folkbokföring); brottsbalken 4 kap. 4a § (olaga förföljelse)","tillsynslucka":"Nej – sekretessmarkering hanteras inte konsekvent i digitala myndighetstjänster. Sammankopplade register kan röja adress om inte varje system aktivt stöder skyddade uppgifter. Ingen samlad process finns för att digitalt frigöra en person från en kontrollerande partner","lucka_status":"Nej","empirisk_kalla":"Jämställdhetsmyndigheten (2026) Det gränslösa våldet (Rapport 2026:1): teknologifaciliterat våld handlar om hur digital teknik används för att utöva och förstärka psykiskt, sexuellt och ekonomiskt våld — utsattheten är omfattande och tydligt könad. | SVT (2024) SVT granskar: Så röjs skyddade personer av rättsväsendet: Nästan 33 000 personer i Sverige lever med skyddade personuppgifter, eftersom de är utsatta för hot eller våld. Men det händer att deras uppgifter blir röjda – och då kan det få stora konsekvenser. När det händer är det vanligt att källan till röjningarna är polis, åklagare och domstolar – det visar en enkät som Skatteverket gjort med gömda personer. | Jämställdhetsmyndigheten (2022) Skyddade personuppgifter —  oskyddade personer. s. 43: Möjligheten att ta fram ett digitalt ID-nummer som inte är kopplat till den faktiska personen bör utredas, för att personer med skyddade personuppgifter ska kunna ta del av digital service och tjänster på samma villkor som övriga medborgare.","beskrivning":"Digitala samhällsfunktioner förutsätter att den enskilde har kontroll över sin identitet, sina konton och sina enheter. För den som lever under hot eller i en kontrollerande relation är detta problematiskt, och farligt. Sammankopplade register kan röja adresser, sekretessmarkering hanteras inte av de flesta digitala myndighetstjänster, och konton och BankID knutna till en förövare kan inte enkelt frigöras.","lankar":["https://jamstalldhetsmyndigheten.se/aktuellt/publikationer/rapport-2026-1-det-granslosa-valdet-en-kartlaggning-av-den-digitala-teknikens-betydelse-for-mans-vald-mot-kvinnor-och-vald-mot-barn/","https://www.svt.se/nyheter/lokalt/smaland/svt-granskar-sa-rojs-skyddade-personer-av-rattsvasendet","https://jamstalldhetsmyndigheten.se/media/bkbdjajc/2022_10-delrapport-skyddade-personuppgifer.pdf"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.4 Livskris och instabilitet","taxonomi_id":"2.4.1","kategori":"Akut livskris","situation_exempel":"Jag sitter på akuten med mitt sjuka barn och parkeringsappen kräver registrering, kortbetalning och zonval – jag kan inte tänka klart just nu","radgivning_enskild":"Sjukhusets reception; parkeringsbolaget","radgivning_utforare":"Saknas","tvist":"ARN (ej bindande); kommunen (om kommunal parkering)","tillsynsmyndighet":"Ingen tydlig – kommunen ansvarar för kommunal parkering, privata parkeringsbolag regleras av branschöverenskommelse","lagstod":"RF 1 kap. 2 § (det allmänna ska trygga rätten till hälsa); kommunallagen (2017:725) kap. 2 (kommunens ansvar för allmänna platser)","tillsynslucka":"Nej – ingen myndighet ställer krav på att parkeringsplatser vid samhällskritiska funktioner ska ha analoga betalningsalternativ.","lucka_status":"Nej","empirisk_kalla":"Sveriges Radio P4 (2025) Sjukhusparkering: Parkeringsappar skapar stress för äldre och teknikovana vid sjukhus och andra offentliga platser. | Jmfr 1.3.1 (Digitalt utan alternativ) för detaljerad empiri om parkeringsappar.","beskrivning":"Digitala samhällsfunktioner som förutsätter handlingskraft och precision i situationer där sjukdom, psykisk ohälsa, våld eller förlust tillfälligt gör det omöjligt.","lankar":["https://www.sverigesradio.se/artikel/parkeringsappar-for-krangliga-hugo-tar-bussen-istallet"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.4 Livskris och instabilitet","taxonomi_id":"2.4.2","kategori":"Anhörigansvar","situation_exempel":"Min mamma är ensamstående och har varit med om en olycka. Hon ligger på sjukhus. Jag behöver meddela hennes arbetsgivare och FK att hon inte kan jobba och jag behöver betala hennes räkningar. Men jag har ingen fullmakt.","radgivning_enskild":"Resp. myndighet; banken; överförmyndarnämnden (god man)","radgivning_utforare":"Digg (ombudshantering i digitala tjänster); SKR (stöd till kommuner om fullmakter)","tvist":"Förvaltningsrätten (myndighetsbeslut)","tillsynsmyndighet":"JO; överförmyndarnämnden","lagstod":"FL 14 § (ombud); SFS 2017:310 (framtidsfullmakter)","tillsynslucka":"Nej — FL 14 § ger rätt att anlita ombud men digitala myndighetstjänster saknar funktion för ombudshantering. I mellanperioden mellan akut behov och formellt ställföreträdarskap har anhöriga inget rättssäkert sätt att agera digitalt.","lucka_status":"Nej","empirisk_kalla":"Konsumenternas Bank- och finansbyrå (2026) Verksamhetsberättelse 2025 s. 24: återkommande klagomål om att det inte var möjligt att hjälpa anhörig med bankärenden digitalt. | Begripsam (2025) Utestängd från det kontantlösa samhället s. 24–25: problem med fullmakter. | Prop. 2025/26:92 Ett ställföreträdarskap att lita på: nationellt ställföreträdarregister föreslås. | Se även 1.2.4 (Ombudskap)","beskrivning":"Digitala samhällsfunktioner som saknar enkla och rättssäkra sätt för anhöriga att agera i den enskildes ärenden vid kris. Bristen på reglerade ombudsfunktioner tvingar anhöriga att agera utan formellt stöd","lankar":["https://www.konsumenternas.se/globalassets/pdf/vb/verksamhetsberattelse-2025.pdf","https://www.begripsam.se/download/18.4fd9741419ac5edf2a463b49/1764751364652/Rapport%20Utesta%CC%88ngd%20fra%CC%8An%20det%20kontantlo%CC%88sa%20samha%CC%88llet%20december%202025.pdf","https://www.regeringen.se/rattsliga-dokument/proposition/2025/12/prop.-20252692"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.4 Livskris och instabilitet","taxonomi_id":"2.4.3","kategori":"Dödsfall","situation_exempel":"Min mamma dog och jag har svårt
