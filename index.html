att få överblick över alla olika typer av prenumerationer och fakturor","radgivning_enskild":"Banken (dödsbo); Skatteverket (bouppteckning, dödsfallsintyg); Efterlevandeguiden.se","radgivning_utforare":"Digg (digital samordning); Skatteverket (bouppteckningsprocess)","tvist":"Tingsrätten (boutredningsman vid tvist)","tillsynsmyndighet":"Skatteverket (bouppteckning)","lagstod":"Ärvdabalken (1958:637) 18–20 kap. (dödsboförvaltning)","tillsynslucka":"Nej – dödsbodelägare har rätt att förvalta tillgångar men digitala tjänster saknar rutiner. Ingen samlad digital process för dödsbohantering.","lucka_status":"Nej","empirisk_kalla":"Swedbank (2025) När någon dör –  ta hand om dödsbo och bouppteckning: När vi får veta av Skatteverket att någon har dött sker följande: Betal- och kreditkort samt BankID spärras; Internetbanken och telefontjänsten Kundcenter avslutas; Tjänsten e-faktura sägs upp, och alla framtida fakturor skickas istället som pappersfakturor; Privatgiro avslutas; Dispositionsrätter för god man, förvaltare och övriga personer tas bort; Kapital- och räntebesked skickas till dödsboets adress. | Nordea (2025) Checklista vid dödsfall: e-fakturor stängs av men autogiron fortsätter dras. | Efterlevandeguiden (statlig samverkan): listar sociala medier och streamingtjänster som ska avslutas men ger ingen samlad digital ingång – varje tjänst kräver separat kontakt med dödsbevis.","beskrivning":"Digitala samhällsfunktioner som saknar rutiner för övergång vid dödsfall. Anhöriga saknar ofta fullmakter eller åtkomst till konton, ärenden och myndighetskontakter i en situation där dessa behövs akut.","lankar":["https://www.swedbank.se/privat/livet/familj/dodsfall-dodsbo.html","https://www.nordea.se/privat/liv/familj/vid-dodsfall/checklista-vid-dodsfall.html","https://www.efterlevandeguiden.se/"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.5 Barn och unga","taxonomi_id":"2.5.1","kategori":"Digitala ombud","situation_exempel":"Jag och mitt ex har gemensam vårdnad men vi pratar inte med varandra – tjänsten kräver att vi båda signerar digitalt och det går inte att lösa","radgivning_enskild":"Skatteverket; familjerätten i kommunen","radgivning_utforare":"Digg (vägledning om digital ombudshantering); Skatteverket (folkbokföringsprocesser)","tvist":"Tingsrätten (ensam vårdnad); familjerätten (samarbetssamtal)","tillsynsmyndighet":"JO","lagstod":"FB 6 kap. (vårdnad); FL 6–7 §§","tillsynslucka":"Nej – tjänster som kräver dubbel signering förutsätter samarbetande vårdnadshavare. Inget alternativ finns när kommunikationen brister.","lucka_status":"Nej","empirisk_kalla":"RiR 2023:6 s. 23: Exempel på tjänster som rör barn och kräver dubbel signering,\nvilket inte är möjligt att göra digitalt i vissa fall. Det handlar exempelvis om att\nansöka om för- och efternamn på nyfött barn, ansöka om id-kort för barn och anmäla\nflerbarnstillägg (föräldrarnas gemensamma anmälan om mottagare)","beskrivning":"Digitala samhällsfunktioner förutsätter en vårdnadshavare med e-legitimation. Ensamkommande barn, barn omhändertagna enligt LVU och barn i familjer utan giltig e-legitimation saknar strukturerade alternativ. Tjänster som kräver dubbel signering av vårdnadshavarna går i många fall inte att genomföra digitalt (RiR 2023:6).","lankar":["https://www.riksrevisionen.se/download/18.1e0fa62b19047f61fcc9553/1719239329567/RiR_2023_6_master.pdf"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.5 Barn och unga","taxonomi_id":"2.5.2","kategori":"Digitala spår skapade av andra","situation_exempel":"Min mamma la upp bilder på mig på sin Instagram – nu vill jag ta bort bilderna men det är hennes konto.","radgivning_enskild":"Bris; Barnombudsmannen; IMY","radgivning_utforare":"IMY (vägledning om barns dataskydd); Mediemyndigheten (skydd för minderåriga online)","tvist":"IMY (klagomål)","tillsynsmyndighet":"IMY","lagstod":"GDPR art. 17 (rätt till radering); GDPR art. 8 (barns samtycke); CRC art. 16 (skydd för privatliv); BrB 4:6c (olaga integritetsintrång); 6 kap. 11 § FB (barnets bestämmanderätt)","tillsynslucka":"Delvis – GDPR ger rätt till radering men barnet kan inte agera utan förälderns medverkan. IMY kan pröva klagomål men har inte agerat i sharentingfall.","lucka_status":"Delvis","empirisk_kalla":"Schildt Gillion, A. (2021) Juridiken bakom sharenting. Barns rättigheter när vårdnadshavare publicerar bilder eller annan information om sitt barn på\ninternet s 38: I Frankrike har man förstärkt barns rätt till radering genom att ge även mindre barn en rätt att kräva radering. Om ett barn önskar få sina uppgifter raderade på exempelvis en förälders instagramkonto bör även noteras\natt barnet, utöver att vända sig direkt till föräldern, kan vända sig direkt till\nplattformen med sådan begäran. | IMY (2026) Dataskydd för dig som är ung – dina rättigheter: Du har rätt att säga nej till dina föräldrar och andra vuxna, om du inte vill att de ska dela en bild, film eller information som handlar om dig på sina sociala medier.","beskrivning":"Barns digitala identitet skapas av föräldrar, skola och vård utan barnets medverkan. Rätten att begära radering finns i GDPR men förutsätter kännedom om var uppgifterna finns. Det är ett villkor som sällan är uppfyllt i praktiken.","lankar":["https://mediemyndigheten.se/globalassets/barn-och-pedagogik/pedagogiskt-material/sharenting/juridiken-bakom-sharenting.pdf","https://www.imy.se/privatperson/dataskydd/dataskydd-for-dig-som-ar-ung/for-dig-som-ar-ung/dina-rattigheter/"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.5 Barn och unga","taxonomi_id":"2.5.3","kategori":"Bristande samtyckesskydd","situation_exempel":"Jag orkade inte läsa alla villkor när jag fyllde 13 och skaffade sociala medier – jag har ingen aning vad som händer med min data.","radgivning_enskild":"Bris; Barnombudsmannen; IMY","radgivning_utforare":"IMY (vägledning om barns dataskydd); Mediemyndigheten (skydd för minderåriga online); EDPB (riktlinjer om barns samtycke)","tvist":"IMY (klagomål)","tillsynsmyndighet":"IMY","lagstod":"GDPR art. 8 (barns samtycke, 13-årsgräns); GDPR art. 12 (tydlig information); DSA 2022/2065 art. 28 (skydd för minderåriga); CRC art. 16","tillsynslucka":"Delvis – IMY har tillsyn men har konstaterat att informationen sällan är barnanpassad och att mekanismer för att utöva rättigheter ofta saknas eller är svåra att hitta.","lucka_status":"Delvis","empirisk_kalla":"IMY, Barnombudsmannen & Statens medieråd (2020) Barns och ungas rättigheter på digitala plattformar. En vägledning till aktörer. s. 20: Barnet har rätt att få information anpassad till sin ålder och mognad. | Schildt Gillion (2021) Juridiken bakom sharenting, s. 35–36: Sverige valde 13-årsgränsen men det är oklart hur samtyckets kvalitet säkerställs i praktiken. | CRC-kommittén (2023) CRC/C/SWE/CO/6-7 punkt 22: Sverige bör stärka skyddet för barns rättigheter i den digitala miljön.","beskrivning":"Sverige tillämpar 13-årsgräns för barns samtycke och GDPR kräver åldersanpassad information. IMY har konstaterat att informationen sällan är barnanpassad och att mekanismer för att utöva rättigheter ofta saknas eller är svåra att hitta. Reglering utan fungerande implementering ger inte reellt skydd.","lankar":["https://www.imy.se/globalassets/dokument/ovrigt/barn-och-ungas-rattigheter-pa-digitala-plattformar.pdf","https://mediemyndigheten.se/globalassets/barn-och-pedagogik/pedagogiskt-material/sharenting/juridiken-bakom-sharenting.pdf","https://www.regeringen.se/globalassets/regeringen/dokument/socialdepartementet/barnets-rattigheter/crc_c_swe_co_6-7_51663_e-8.pdf"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.5 Barn och unga","taxonomi_id":"2.5.4","kategori":"Åldersgränser och digitala vakuum","situation_exempel":"Jag är 16 och kan se min journal på 1177 men förstår inte mina provsvar – mina föräldrar har inte längre tillgång och ingen förklarar för mig","radgivning_enskild":"Vårdcentralen; ungdomsmottagningen; 1177","radgivning_utforare":"Inera (vägledning om journalåtkomst för minderåriga); SKR (riktlinjer för regionerna); IVO (tillsynsvägledning hälso- och sjukvård)","tvist":"Patientnämnden; IVO","tillsynsmyndighet":"IVO; IMY (journalåtkomst)","lagstod":"Patientlagen (2014:821) 3 kap. (information); patientdatalagen (2008:355); GDPR art. 8; CRC art. 3","tillsynslucka":"Nej – patientlagen ger rätt till information men digitala journalsystem saknar åldersanpassad vägledning.","lucka_status":"Nej","empirisk_kalla":"Barncancerfonden m.fl. (2025) Skrivelse till Inera – 16 patient- och funktionsrättsorganisationer: föräldrar förlorar journalåtkomst via 1177 vid 13 år — för familjer med svårt sjuka barn innebär det att de navigerar komplex behandling utan tillgång till livsviktig information, och Ineras nya förslag kräver fortfarande årlig dispens. | SKR & Inera (2025) \"Avsikten är att skydda tonåringars integritet\": nytt förslag på remiss innebär journalåtkomst för vårdnadshavare till 15 år och ärendehantering till 18, men förlängd åtkomst vid svår sjukdom kräver verksamhetschefsbeslut i varje enskilt fall.","beskrivning":"Barn 13–18 år förväntas i allt fler digitala system agera självständigt utan rättshandlingsförmåga eller stöd. Inom hälso- och sjukvården skapar patientlagens regler ett gränsland där den unges journalåtkomst inte kombineras med vägledning. Systemet tar bort vuxenstödet utan att tillföra ett annat.","lankar":["https://www.barncancerfonden.se/press/2025/16-organisationer-i-gemensam-skrivelse-foraldrar-maste-fa-tillgang-till-sina-svart-sjuka-tonaringars-journaler/","https://skr.se/pressrum/aktuellt/nyhetsarkiv/avsiktenarattskyddatonaringarsintegritet.9203.html"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.5 Barn och unga","taxonomi_id":"2.5.5","kategori":"Manipulativ design riktad mot barn","situation_exempel":"Min dotter är 12 och följer influencers på TikTok – hon vill vara som de och tjatar om att köpa saker hela tiden","radgivning_enskild":"Konsumentverket; Mediemyndigheten; Bris","radgivning_utforare":"Konsumentverket (vägledning om marknadsföring mot barn); Mediemyndigheten (skydd för minderåriga online); BEUC (riktlinjer influencermarknadsföring)","tvist":"Konsumentverket (anmälan); ARN (vid köp)","tillsynsmyndighet":"Konsumentverket; Mediemyndigheten","lagstod":"DSA 2022/2065 art. 28 (skydd för minderåriga, förbud mot riktad reklam baserad på profilering); UCPD 2005/29/EG (förbud mot direkt köpuppmaning till barn); MFL 2008:486 (marknadsföring mot barn); CRC art. 17, 36 (skydd mot kommersiell exploatering); AVMSD 2010/13/EU art. 9 (skydd av minderåriga i audiovisuella tjänster)","tillsynslucka":"Delvis – DSA förbjuder riktad reklam mot minderåriga baserad på profilering, men plattformarnas ålderskontroll kringgås rutinmässigt. Självreglering (EU Pledge) har visat sig otillräcklig. Konsumentverket har tillsyn men influencermarknadsföring mot barn är ett nytt och outvecklat tillsynsområde.","lucka_status":"Delvis","empirisk_kalla":"The European Consumer Organisation, BEUC (2025) Influencer Marketing Unboxed, s. 9: 88 % av användare 15–24 år uppger att de påverkats av influencerinnehåll.  S. 13: av 576 granskade influencers hade 97 % kommersiellt innehåll men bara 20 % märkte det systematiskt. s. 28: 13 klagomål om marknadsföring av ohälsosam mat riktad mot barn inlämnade till EU Pledge — samtliga avvisades eller bedömdes som regelrätta. | Sveriges konsumenter (2026) Ståndpunkt. Stärkt konsumentskydd\nför barn i digitala miljöer, s. 8:  Sveriges Konsumenter ser behov av att stärka konsumentskyddet för barn i digitala miljöer.","beskrivning":"Digitala tjänster riktade till barn använder designmönster som utnyttjar barns kognitiva och emotionella utveckling. Belöningssystem, oändlig scroll, notifikationer och sociala jämförelser designas för att maximera engagemang, inte för barnets bästa.","lankar":["https://www.sverigeskonsumenter.se/media/21bdfna2/influencer-marketing-report.pdf"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.6 Migrationsstatus och rättsligt skydd","taxonomi_id":"2.6.1","kategori":"Identitetskrav","situation_exempel":"Jag har ett samordningsnummer – jag kan inte skaffa BankID, inte öppna digital brevlåda och inte använda myndigheternas e-tjänster.","radgivning_enskild":"Skatteverket (folkbokföring, personnummer); Migrationsverket; kommunal flyktingsamordnare","radgivning_utforare":"Digg (vägledning om e-legitimation och tillgänglighet); Skatteverket (vägledning samordningsnummer); SKR (riktlinjer för kommunal service)","tvist":"Förvaltningsrätten (folkbokföringsbeslut)","tillsynsmyndighet":"Digg (e-legitimation); JO","lagstod":"FL 6–7 §§; folkbokföringslagen (1991:481); eIDAS-förordningen (910/2014)","tillsynslucka":"Nej – ingen myndighet ansvarar för att personer med samordningsnummer får tillgång till digitala samhällstjänster.","lucka_status":"Nej","empirisk_kalla":"Digg:s informationswebb elegitimation.se om att använda utländska e-legitimationer i Sverige (hämtad 2026-04-07): En e-legitimation från ett annat land än Sverige kan i vissa fall användas för att logga in i svenska myndigheters e-tjänster men det är inte säkert att det går att använda alla funktioner i e-tjänsten. Det beror på att många svenska e-tjänster kräver ett svenskt personnummer, och att den utländska e-legitimationen inte är kopplad till det svenska personnumret. | IOM (2023) Ukrainians and third-country nationals under temporary protection in Sweden. s. 4 : Avsaknaden av personnummer förhindrar fullständig tillgång till flera offentliga och privata tjänster. Transportstyrelsens webbsida om digital brevlåda (hämtad 2026-04-07): Personer som har samordningsnummer kan inte ha digital brevlåda då alla tjänsterna kräver legitimation och det finns idag ingen e-legitimation som fungerar med samordningsnummer.","beskrivning":"Digitala samhällsfunktioner förutsätter ofta personnummer, e-legitimation och bankkonto – där det första är förutsättning för de övriga. Asylsökande och papperslösa kan sakna alla tre. Utländska e-legitimationer erkänns formellt via Sweden Connect men ger i praktiken inte tillgång till tjänsterna (RiR 2023:6).","lankar":["https://www.elegitimation.se/utlandska-e-legitimationer-och-e-tjanster","https://dtm.iom.int/sites/g/files/tmzbdl1461/files/reports/DTM2023_Sweden_Ukrainians%20and%20TCNs%20under%20TP_Executive_Summary_SWE_ENG.pdf","https://www.transportstyrelsen.se/sv/om-oss/det-har-ar-transportstyrelsen/vart-uppdrag-och-arbetssatt/digital-brevlada/"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.6 Migrationsstatus och rättsligt skydd","taxonomi_id":"2.6.2","kategori":"Rädsla för digital spårning","situation_exempel":"Jag har fått avslag på min asylansökan men behöver vård – jag vågar inte söka den eftersom jag inte vet om vårdgivaren delar mina uppgifter med Migrationsverket","radgivning_enskild":"Röda Korset; Läkare i Världen; Asylrättscentrum","radgivning_utforare":"Socialstyrelsen (vägledning om vård för tillståndslösa); SKR (riktlinjer för regionerna); IVO (tillsynsvägledning hälso- och sjukvård)","tvist":"IVO (om vård nekas)","tillsynsmyndighet":"IVO; IMY; JO","lagstod":"SFS 2008:286 (lagen om vård till tillståndslösa); HSL (2017:30) 4 § (vård som inte kan anstå); OSL 25 kap. (hälso- och sjukvårdssekretess); ICESCR art. 12","tillsynslucka":"Nej – hälso- och sjukvårdssekretessen skyddar patientuppgifter men det pågår politisk diskussion om informationsplikt mot Migrationsverket. Ingen myndighet ansvarar för att informera papperslösa om att vården är sekretessbelagd.","lucka_status":"Nej","empirisk_kalla":"DN (2026-04-06) Allt färre papperslösa söker vård: ”De är rädda”: antalet papperslösa som söker offentlig vård har halverats i flera storstadsregioner — oron för informationsplikten, okunskap om rättigheter och avsaknad av BankID/legitimation är återkommande orsaker. En gravid papperslös kvinna frågade om hemförlossning för att undvika sjukhus  – Skatteverket informeras vid födsel och omfattas av informationsplikten.","beskrivning":"Digitala system som kräver personuppgifter för tillgång till vård, stöd eller rättighetsinformation tvingar den enskilde att välja mellan att utöva en rättighet och att skydda sin säkerhet. Rädslan är folkrättsligt grundad","lankar":["https://www.dn.se/sverige/allt-farre-papperslosa-soker-vard-de-ar-radda/"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.6 Migrationsstatus och rättsligt skydd","taxonomi_id":"2.6.3","kategori":"Funktionsnedsättning och migrationsstatus","situation_exempel":"Jag är asylsökande och har en hörselnedsättning – jag kan inte få hörapparat anpassad eftersom hjälpmedelscentralen kräver personnummer för att öppna ett ärende.","radgivning_enskild":"Migrationsverket; regionen (asylhälsa); funktionsrättsorganisation","radgivning_utforare":"Socialstyrelsen (vägledning om hjälpmedel); SKR (riktlinjer för hjälpmedelsförskrivning); Myndigheten för delaktighet (tillgänglighet och funktionsrätt)","tvist":"IVO; DO (diskriminering på grund av funktionsnedsättning och etnisk tillhörighet)","tillsynsmyndighet":"IVO; DO","lagstod":"HSL (2017:30); SFS 2008:286; CRPD art. 5 och 19; diskrimineringslagen (2008:567)","tillsynslucka":"Nej – CRPD gäller oavsett migrationsstatus men hjälpmedelssystem kräver personnummer. Ingen myndighet äger frågan om tillgänglighetsanpassning för asylsökande med funktionsnedsättning.","lucka_status":"Nej","empirisk_kalla":"Funktionsrätt Sverige (2025) Respekt för funktionsrätt. Uppföljning av rekommendationer från FN:s funktionsrättskommitté om genomförande av konventionen om rättigheter för personer med funktionsnedsättning. s. 18: Funktionsrätt Sverige bedömer att rättigheterna för migranter med funktionsnedsättning har backat på flera områden. Den nuvarande migrationspolitiken saknar ett MR-perspektiv och tar inte hänsyn till intersektionalitet, exempelvis till situationen för personer med funktionsnedsättning som befinner sig i migrations- eller asylprocesser. | IOM (2023) Ukrainians and third-country nationals under temporary protection in Sweden. s. 23: föräldrar och anhöriga till personer med funktionsnedsättning rapporterar svårigheter att få adekvat medicinsk och ekonomisk hjälp för familjemedlemmar med vårdbehov.","beskrivning":"När migrationsstatus samverkar med funktionsnedsättning uppstår ett utanförskap som ingen myndighet har ett tydligt ansvar för. Tillgänglighetsanpassning förutsätter ofta en registrerad status som saknas.","lankar":["https://funktionsratt.se/wp-content/uploads/frs/2025/12/respekt-for-funktionsratt-den-3-december-edit.pdf","https://dtm.iom.int/sites/g/files/tmzbdl1461/files/reports/DTM2023_Sweden_Ukrainians%20and%20TCNs%20under%20TP%20in%20Sweden_June_0.pdf"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.6 Migrationsstatus och rättsligt skydd","taxonomi_id":"2.6.4","kategori":"Barn och unga med migrationsstatus","situation_exempel":"Jag är 16 och kom ensam till Sverige – jag har ingen digital identitet, min gode man har problem med mitt ärende och jag kan inte följa min asylprocess digitalt.","radgivning_enskild":"God man; Asylrättscentrum; Rädda Barnen; kommunens socialtjänst","radgivning_utforare":"Migrationsverket (vägledning om asylprocessen för barn); SKR (riktlinjer för god man); Socialstyrelsen (vägledning om ensamkommande barn)","tvist":"Förvaltningsrätten (asylbeslut);","tillsynsmyndighet":"Migrationsverket (asylprocessen); IVO (boende); överförmyndarnämnden (god man); JO","lagstod":"CRC art. 3, 22, 37; utlänningslagen (2005:716); LMA (1994:137); FB 11 kap.","tillsynslucka":"Nej – barnkonventionen kräver att barnets bästa beaktas men Migrationsverkets digitala processer förutsätter vuxen digital kompetens och ombud med digital behörighet.","lucka_status":"Nej","empirisk_kalla":"CRC-kommittén (2023) CRC/C/SWE/CO/6-7, punkt 43 och 20: asylsökande och migrantbarn markerat som brådskande — barn hörs inte systematiskt i migrationsbeslut och undantaget om \"olämplighet\" i utlänningslagen kvarstår. Se även 2.5 (Barn och unga)","beskrivning":"Ensamkommande barn saknar digital identitet, behörigt ombud och möjlighet att följa sin process digitalt. Barnets bästa som primär princip återspeglas inte i hur digitala asylprocesser är utformade.","lankar":["https://www.regeringen.se/globalassets/regeringen/dokument/socialdepartementet/barnets-rattigheter/crc_c_swe_co_6-7_51663_e-8.pdf"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.6 Migrationsstatus och rättsligt skydd","taxonomi_id":"2.6.5","kategori":"Tidsbegränsad status","situation_exempel":"Mitt uppehållstillstånd löpte ut förra veckan – jag har ansökt om förlängning men i väntan har jag förlorat tillgång till 1177, FK och min digitala brevlåda.","radgivning_enskild":"Migrationsverket; Skatteverket (folkbokföring); resp. myndighet","radgivning_utforare":"Migrationsverket (vägledning om förlängningsprocess); Skatteverket (vägledning folkbokföring); Digg (vägledning e-legitimation)","tvist":"Förvaltningsrätten (folkbokföringsbeslut; uppehållstillståndsbeslut)","tillsynsmyndighet":"JO; Digg; Skatteverket (folkbokföring)","lagstod":"Utlänningslagen (2005:716); FL 6–7 §§; Folkbokföringslagen (1991:481) 20 §","tillsynslucka":"Nej – digitala system saknar hantering av statusövergångar.","lucka_status":"Nej","empirisk_kalla":"Informationsverige.se (2025): den som ansöker om förlängning efter att uppehållstillståndet löpt ut riskerar att förlora arbetsrätt och förmåner som introduktionsersättning, studiemedel och föräldrapenning — ansökan kräver inloggning med BankID. | Skatteverket (webbsida, hämtad 2026-04-08): En person som Skatteverket bedömer har en okänd bosättning men som vistas i Sverige, kan bli avregistrerad från folkbokföringen som försvunnen. Avregistrering från folkbokföringen innebär att personen förlorar tillgång till förmåner, sjukvård och utbetalningar från FK och Pensionsmyndigheten.","beskrivning":"Digitala system saknar i regel hantering av statusövergångar. Den som väntar på förlängt tillstånd kan förlora åtkomst till tjänster trots laglig rätt att vara i landet.","lankar":["https://www.informationsverige.se/en/jag-har-fatt-uppehallstillstand/ansoka-om-forlangt-uppehallstillstand.html","https://skatteverket.se/offentligaaktorer/folkbokforing/avregistreradsomforsvunnenpersonensbosattningarokand.4.fa979e918895f4387d102.html"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.7 Plattformsstyrt arbete","taxonomi_id":"2.7.1","kategori":"Algoritmisk arbetsledning","situation_exempel":"Jag kör mat åt en plattform – appen bestämmer vilka leveranser jag får, hur lång tid jag har och vad jag tjänar. Igår sänktes min ersättning utan förklaring","radgivning_enskild":"Fackförbund (Transportarbetareförbundet); Arbetsmiljöverket","radgivning_utforare":"Arbetsmiljöverket (vägledning om plattformsarbete); Skatteverket (vägledning om arbetsgivaransvar)","tvist":"Arbetsdomstolen (frågan om anställningsförhållande); allmän domstol","tillsynsmyndighet":"Arbetsmiljöverket; Skatteverket (arbetsgivaransvar); IMY (dataskydd vid automatiserat beslutsfattande)","lagstod":"EU:s plattformsdirektiv (2024/2831) presumtion om anställning; LAS (1982:80); arbetsmiljölagen (1977:1160)","tillsynslucka":"Nej – plattformsdirektivet är antaget men inte genomfört i svensk lag.","lucka_status":"Nej","empirisk_kalla":"Fairwork/Oxford (2025) Fair Work for Platform Workers: Lessons from the EU Directive and Beyond (i Industrial Law Journal): intervjuer med över 7 400 plattformsarbetare visar att de upprepade gånger utsätts för ogenomskinliga algoritmiska beslut om arbetsvillkor och disciplinära åtgärder. | Electronic Frontier Foundation (2025) What Europe’s New Gig Work Law Means for Unions and Technology: 79 % av europeiska företag använder algoritmisk övervakning — problem inkluderar algoritmisk lönediskriminering baserad på bedömd ekonomisk utsatthet. | Human Rights Watch (2025) The Gig Trap: plattformarnas ägarskap av inkomstdata skapar informationsasymmetri — arbetare saknar insyn i hur ersättningen beräknas.","beskrivning":"Digitala plattformar styr arbetsvillkor genom algoritmer som fördelar uppdrag, sätter tidsramar och utvärderar prestation utan motsvarande arbetsgivaransvar. Den som utför arbetet saknar insyn i hur beslut fattas och möjlighet att förhandla.","lankar":["https://academic.oup.com/ilj/article/54/3/425/8176731","https://www.eff.org/deeplinks/2025/10/what-europes-new-gig-work-law-means-unions-and-technology","https://www.hrw.org/report/2025/05/12/the-gig-trap/algorithmic-wage-and-labor-exploitation-in-platform-work-in-the-us"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.7 Plattformsstyrt arbete","taxonomi_id":"2.7.2","kategori":"Villkorat socialt skyddsnät","situation_exempel":"Jag blev sjuk men får ingen sjukpenning – Försäkringskassan säger att jag inte är anställd utan uppdragstagare åt plattformen","radgivning_enskild":"Försäkringskassan; fackförbund; Allmänna ombudet för socialförsäkringen","radgivning_utforare":"Försäkringskassan (vägledning om SGI); Skatteverket (vägledning om arbetsgivaransvar); ISF (tillsynsvägledning socialförsäkring)","tvist":"Förvaltningsrätten (sjukpenning); Arbetsdomstolen (anställningsfrågan)","tillsynsmyndighet":"ISF; Arbetsmiljöverket","lagstod":"SFB (2010:110); EU plattformsdirektiv (2024/2831); LAS (1982:80)","tillsynslucka":"Nej – SFB villkorar sjukpenning mot anställning eller egenföretagande med karensdag. Plattformsarbetaren faller mellan kategorierna. Plattformsdirektivet är antaget men inte genomfört i svensk lag.","lucka_status":"Nej","empirisk_kalla":"ISF (2023:3) Gigarbetare och socialförsäkringen: socialförsäkringen är konstruerad för regelbundna tillsvidareanställningar — gigarbetares oregelbundna inkomst gör det omöjligt att beräkna framtida inkomst, vilket försvårar rätten till sjukpenning och föräldrapenning. | Hartzén (2023) Plattformsarbetare och sjukpenninggrundande inkomst (Förvaltningsrättslig tidskrift, Lunds universitet): SGI fastställs utifrån inkomstklassificering medan rätten till sjukpenning bedöms utifrån arbetsrättslig status — inkonsekvensen skapar rättsosäkerhet för plattformsarbetare. | Arbetsliv/Prevent (2024): en majoritet av plattformsarbetarna saknar regelrätt anställning och har därmed inte rätt till sjukpenning, föräldraförsäkring eller arbetslöshetsersättning trots att de arbetar regelbundet.","beskrivning":"Digitala plattformar klassificerar den som utför arbetet som uppdragstagare, inte som anställd. Socialförsäkringssystemets skydd förutsätter anställning.","lankar":["https://isf.se/publikationer/rapporter/2023/2023-04-27-gigarbetare-och-socialforsakringen","https://portal.research.lu.se/sv/publications/plattformsarbetare-och-sjukpenninggrundande-inkomst-lika-men-%C3%A4nd%C3%A5/","https://www.prevent.se/arbetsliv/lagar-och-regler/2024/starkta-rattigheter-for-gig-arbetare/"]},{"tax_huvusektion":"Ojämlikhetsfaktorer","tax_huvudsektion_beskrivning":"Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.","tax_kat":"2.7 Plattformsstyrt arbete","taxonomi_id":"2.7.3","kategori":"Inkomst som inte ryms i systemen","situation_exempel":"Jag kör för en plattform och söker bostadsbidrag – men min inkomst varierar från vecka till vecka och FK:s system kräver en fast månadsinkomst. Jag vet inte vad jag ska skriva.","radgivning_enskild":"Försäkringskassan; Skatteverket; fackförbund","radgivning_utforare":"Försäkringskassan (vägledning om inkomstrapportering); Skatteverket (vägledning om arbetsgivardeklaration på individnivå); ISF (tillsynsvägledning socialförsäkring)","tvist":"Förvaltningsrätten (om återkrav); JO","tillsynsmyndighet":"ISF; JO","lagstod":"SFB (2010:110); FL 6–7 §§","tillsynslucka":"Nej – digitala system för inkomstrapportering förutsätter stabila belopp.","lucka_status":"Nej","empirisk_kalla":"RiR 2026:4 s. 58: en stor del av felaktiga utbetalningar beror på att försäkrade inte anmält ändrade förhållanden — systemen bygger till stor del på att försäkrade själva anmäler ändringar, vilket medför stora risker för felaktiga utbetalningar. | RiR 2026:4 s. 44: Försäkringskassans handläggningssystem har föråldrade funktioner för att hantera ändrade förhållanden — ärendeköer och fördröjd hantering ökar risken för felaktiga utbetalningar och återkrav. | ISF (2023:3) Gigarbetare och socialförsäkringen: gigarbetares oregelbundna inkomst gör det omöjligt att beräkna framtida inkomst — socialförsäkringen är konstruerad för regelbundna tillsvidareanställningar.","beskrivning":"Digitala system för inkomstrapportering förutsätter stabila, förutsägbara belopp. Oregelbundna plattformsinkomster passar inte i mallarna. Den som försöker göra rätt riskerar ändå felrapportering, återkrav och sanktioner.","lankar":["https://www.riksrevisionen.se/nyhetsarkiv/nyhetsarkiv/2026-02-19-ineffektiv-hantering-av-andrade-forhallanden-i-socialforsakringen.html","https://isf.se/publikationer/rapporter/2023/2023-04-27-gigarbetare-och-socialforsakringen"]},{"tax_huvusektion":"Bildning, egenmakt och delaktighet","tax_huvudsektion_beskrivning":"Det allmännas ansvar att upprätthålla förutsättningarna för att den enskilde ska kunna förstå, agera och delta i en digitaliserad välfärdsstat.","tax_kat":"3.1 Bildningens förutsättningar","taxonomi_id":"3.1.1","kategori":"Sammanhållet ekosystem","situation_exempel":"saknas 2026-04-28","radgivning_enskild":"saknas 2026-04-28","radgivning_utforare":"saknas 2026-04-28","tvist":"saknas 2026-04-28","tillsynsmyndighet":"saknas 2026-04-28","lagstod":"saknas 2026-04-28","tillsynslucka":"saknas 2026-04-28","lucka_status":"Nej","empirisk_kalla":"saknas 2026-04-28","beskrivning":"Det allmänna informerar inte systematiskt om vilka rättigheter till stöd, vägledning och alternativa kontaktvägar som finns. Rättigheter som inte är kända kan inte utövas.","lankar":[]},{"tax_huvusektion":"Bildning, egenmakt och delaktighet","tax_huvudsektion_beskrivning":"Det allmännas ansvar att upprätthålla förutsättningarna för att den enskilde ska kunna förstå, agera och delta i en digitaliserad välfärdsstat.","tax_kat":"3.1 Bildningens förutsättningar","taxonomi_id":"3.1.2","kategori":"Organisatorisk förankring","situation_exempel":"saknas 2026-04-28","radgivning_enskild":"saknas 2026-04-28","radgivning_utforare":"saknas 2026-04-28","tvist":"saknas 2026-04-28","tillsynsmyndighet":"saknas 2026-04-28","lagstod":"saknas 2026-04-28","tillsynslucka":"saknas 2026-04-28","lucka_status":"Nej","empirisk_kalla":"saknas 2026-04-28","beskrivning":"Förmågan att navigera offentliga system och administrativa processer digitalt. Skild från digital kompetens i snäv mening: en person kan vara tekniskt kunnig men ändå inte förstå hur man bifogar rätt underlag till rätt myndighet i rätt format.","lankar":[]},{"tax_huvusektion":"Bildning, egenmakt och delaktighet","tax_huvudsektion_beskrivning":"Det allmännas ansvar att upprätthålla förutsättningarna för att den enskilde ska kunna förstå, agera och delta i en digitaliserad välfärdsstat.","tax_kat":"3.1 Bildningens förutsättningar","taxonomi_id":"3.1.3","kategori":"MIK som pedagogisk kärnkompetens","situation_exempel":"Bibliotekarier, pedagoger, folkbildare och gatubyråkrater hjälper hundratals invånare varje dag med att navigera information, bedöma trovärdighet och hantera digitala tjänster. Men medie- och informationskunnighet (MIK) är inte en definierad del av deras uppdrag. Därför sker stödet utan mandat och utan adekvat utan kompetensutveckling.","radgivning_enskild":"Biblioteket (vardagsnära stöd vid besök). I praktiken saknar den enskilde möjlighet att efterfråga MIK-stöd — behovet uppstår i vardagen utan att den enskilde kan identifiera det som en rättighet.r och kompetensutveckling)","radgivning_utforare":"Mediemyndigheten (MIK Sverige); Digiteket (fortbildning inom bibliotekssektorn); SKR (stöd till kommuner som arbetsgivare)","tvist":"Ingen etablerad tvistväg.","tillsynsmyndighet":"Mediemyndigheten (samordnar MIK Sverige men saknar verktyg att granska om insatserna integreras i professionell praktik). Ingen myndighet ansvarar för att MIK-kompetens är en del av kärnuppdraget för bildningsprofessioner.","lagstod":"RF 1 kap. 2 §; Bibliotekslagen (2013:801) 2 §, 7 §; FL 6 §","tillsynslucka":"Nej – MIK har i huvudsak organiserats som separata insatser riktade till medborgaren. Förmågan att stödja den enskilde i att söka, tolka och värdera information är inte integrerad i professionell praktik för de yrkesgrupper som dagligen möter behovet.","lucka_status":"Nej","empirisk_kalla":"UNESCO (2021) Think Critically, Click Wisely – MIL Curriculum for Educators & Learners: UNESCO skiljer mellan tre nivåer: att undervisa om MIK, att undervisa genom MIK och att använda MIK som verktyg för samhällsdeltagande. MIK presenteras som en process integrerad i yrkesutövning och samhällsengagemang, inte som ett avgränsat ämne. Målet är att pedagoger, samhällsledare och folkbildare själva ska bli medie- och informationskunniga och utveckla de kompetenser som krävs för att integrera MIK på alla nivåer och i alla utbildningsformer (sid. 60). | Carlsson, U. (red.) (2018) Medie- och informationskunnighet (MIK) i den digitala tidsåldern – En demokratifråga: Kartläggning, analys, reflektioner: Lärare och bibliotekarier är att betrakta som nyckelfunktioner för arbetet med MIK i Sverige mot medborgare i olika målgrupper (sid. 100); Folkbiblioteken utgör naturliga arenor för att understödja invånarnas medie- och informationskunnighet; en uppgift som förutom att framhållas i bibliotekslagen även har stöd i Unescos och IFLA:s internationella biblioteksmanifest (sid. 83).| EU AI Act (2024) art. 4: ålägger leverantörer och användare av AI-system att säkerställa tillräcklig AI-kunnighet hos personal – motsvarande krav saknas för de professioner som möter den enskilde i bildningsuppdraget.","beskrivning":"Desinformation och manipulation i digitala miljöer underminerar demokratisk delaktighet. Det allmänna saknar samordnade insatser för att stärka befolkningens förmåga att identifiera, förstå och hantera falsk och vilseledande information.","lankar":["https://unesdoc.unesco.org/ark:/48223/pf0000377068","https://urn.kb.se/resolve?urn=urn:nbn:se:norden:org:diva-5321","https://ai-act-service-desk.ec.europa.eu/en/ai-act/article-4"]},{"tax_huvusektion":"Bildning, egenmakt och delaktighet","tax_huvudsektion_beskrivning":"Det allmännas ansvar att upprätthålla förutsättningarna för att den enskilde ska kunna förstå, agera och delta i en digitaliserad välfärdsstat.","tax_kat":"3.2 Egenmakt och samhällsförståelse","taxonomi_id":"3.2.1","kategori":"Medborgerlig kompetens","situation_exempel":"saknas 2026-04-28","radgivning_enskild":"saknas 2026-04-28","radgivning_utforare":"saknas 2026-04-28","tvist":"saknas 2026-04-28","tillsynsmyndighet":"saknas 2026-04-28","lagstod":"saknas 2026-04-28","tillsynslucka":"saknas 2026-04-28","lucka_status":"Nej","empirisk_kalla":"saknas 2026-04-28","beskrivning":"DigComp saknar svensk översättning och anpassning. Utan gemensam terminologi och referensram fragmenteras insatser inom utbildning, folkbildning, omsorg och arbetsmarknad. Varje aktör utgår från sin egen definition av vad digital kompetens innebär.","lankar":[]},{"tax_huvusektion":"Bildning, egenmakt och delaktighet","tax_huvudsektion_beskrivning":"Det allmännas ansvar att upprätthålla förutsättningarna för att den enskilde ska kunna förstå, agera och delta i en digitaliserad välfärdsstat.","tax_kat":"3.2 Egenmakt och samhällsförståelse","taxonomi_id":"3.2.2","kategori":"Medie- och informationskunnighet (MIK)","situation_exempel":"saknas 2026-04-28","radgivning_enskild":"saknas 2026-04-28","radgivning_utforare":"saknas 2026-04-28","tvist":"saknas 2026-04-28","tillsynsmyndighet":"saknas 2026-04-28","lagstod":"saknas 2026-04-28","tillsynslucka":"saknas 2026-04-28","lucka_status":"Nej","empirisk_kalla":"saknas 2026-04-28","beskrivning":"Det allmänna saknar systematiska insatser för att stärka förmågan att söka, tolka och värdera information i digitala miljöer","lankar":[]},{"tax_huvusektion":"Bildning, egenmakt och delaktighet","tax_huvudsektion_beskrivning":"Det allmännas ansvar att upprätthålla förutsättningarna för att den enskilde ska kunna förstå, agera och delta i en digitaliserad välfärdsstat.","tax_kat":"3.2 Egenmakt och samhällsförståelse","taxonomi_id":"3.2.3","kategori":"Digital kompetens","situation_exempel":"Jag har lärt mig mycket på egen hand och i folkbildande insatser – men när jag söker jobb vill arbetsgivaren veta vad jag kan och jag har inget sätt att visa det. Alla pratar om \"digital kompetens\" men menar olika saker.","radgivning_enskild":"Saknas i egentlig mening. Biblioteket (lokal vägledning, ej standardiserad); Arbetsförmedlingen (kompetenskartläggning, ej baserad på DigComp); kommunal vuxenutbildning (formell validering men ej för icke-formell digital kompetens).","radgivning_utforare":"Digg (digitaliseringspolitik, ej kompetensvalidering); PTS (digital inkludering, samordning); Skolverket (formell utbildning). Ingen aktör vägleder utförare i att använda en gemensam referensram för digital kompetens – den finns inte.","tvist":"JO (om myndighet inte kan hänvisa till likvärdigt kompetensstöd)","tillsynsmyndighet":"Ingen tydlig – Digg samordnar digitaliseringspolitik men har inte tillsyn över kompetensinsatsers samstämmighet eller kvalitet. Skolverket ansvarar för formell utbildning. Ingen myndighet ansvarar för validering av vuxnas icke-formella digitala kompetens. Medan PTS har samordningsuppdrag digital inkludering.","lagstod":"RF 1 kap. 2 § (det allmännas ansvar för delaktighet); Bibliotekslagen (2013:801) 7 § (informationsteknik för lärande och delaktighet)","tillsynslucka":"Nej – det saknas nationell instans som ansvarar för gemensam definition, nivåbeskrivning och validering av digital kompetens utanför det formella utbildningssystemet.","lucka_status":"Nej","empirisk_kalla":"Cosgrove & Cachia (2025) DigComp 3.0, JRC: Ramverket definierar 21 kompetenser i fyra färdighetsnivåer (grund, medel, avancerad och specialiserad) med 500+ lärandemål. Ramverket DigComp används i EU som referens för mätning, kursdesign och validering. Österrike har nationell anpassning (DigComp 2.3 AT) med tillägg av Area 0 för baskompetens. Sverige har inte anammat DigComp för att arbeta systematiskt med olika färdigheter och förmågor i digital kompetens. | Sveriges digitaliseringsstrategi 2025–2030 defintierar digital bas-, bredd- och spetskompetens. Digital baskompetens innebär att ha grundläggande digitala färdigheter, dvs. förmåga att använda digitala verktyg för exempelvis kommunikation och samarbete, säkerhet eller problemlösning. Digital breddkompetens innebär att ha en generell digital kompetens, dvs. förmåga att hantera det växande antal system och applikationer som krävs för att utföra olika arbetsuppgifter. Digital spetskompetens inbegriper specialistkompetens inom exempelvis\nAI, programmering, cybersäkerhet och andra områden som är relevanta för digitaliseringen av samhället (sid. 9). | Digg/PTS (2026) Redovisning av uppdraget att stödja genomförandet av Sveriges Digitaliseringsstrategi. Indikatorerna följer DigComp 3.0 för bas- och breddkompetens (befolkningen), ICILS för elever åk 8, ICT specialists för spetskompetens (sid. 5-8).","beskrivning":"Aktörer som bibliotek, folkbildning och civilsamhälle bär i praktiken det digitala stödansvaret utan formellt uppdrag, resurser eller löpande kompetensutveckling. Detta informella system undergrävs av resursneddragningar.","lankar":["https://publications.jrc.ec.europa.eu/repository/handle/JRC144121","https://www.digitalaustria.gv.at/en/digital-skills/austrian-model-for-digital-competence.html","https://www.regeringen.se/contentassets/fe3e296228fb474f803a986ae3842b4c/sveriges-digitaliseringsstrategi-20252030.pdf","https://www.digg.se/download/18.4d9d13fe19c34cfab85e4a/1772203531748/Rapportbilaga-feb-2026-Uppf%C3%B6ljning-av-digitaliseringsstrategin.pdf"]},{"tax_huvusektion":"Bildning, egenmakt och delaktighet","tax_huvudsektion_beskrivning":"Det allmännas ansvar att upprätthålla förutsättningarna för att den enskilde ska kunna förstå, agera och delta i en digitaliserad välfärdsstat.","tax_kat":"3.3 Inflytande och demokratisk insyn","taxonomi_id":"3.3.1","kategori":"Osynliga rättigheter","situation_exempel":"Jag visste inte att jag hade rätt till hjälp eller analogt alternativ – ingen informerade mig","radgivning_enskild":"Resp. myndighet; Servicekontor (Statens servicecenter); kommunal vägledning i digital vardag (informell vägledning)","radgivning_utforare":"Resp. myndighet (FL 6 §); Statens servicecenter (vägledning om alternativa kontaktvägar); kommunal konsumentvägledning","tvist":"JO (om myndighet brister i att informera om alternativa kontaktvägar)","tillsynsmyndighet":"JO kan granska enskilda fall. Ingen myndighet har systemtillsyn över att det allmänna aktivt informerar om rättigheter till stöd och alternativa kontaktvägar.","lagstod":"RF 1 kap. 2 §; FL 6 § (serviceskyldighet, hjälp att ta till vara intressen), 7 § (tillgänglighet)","tillsynslucka":"Nej – FL 6 § ger rätten men ingen systemtillsyn säkerställer att myndigheter aktivt informerar om den. Rättigheter som inte är kända kan inte utövas. FN:s funktionsrättskommitté (2024, CRPD/C/SWE/CO/2–3) konstaterar att det saknas tillräckliga klagomålsmekanismer för enskilda när kommuner och regioner brister.","lucka_status":"Nej","empirisk_kalla":"Institutet för mänskliga rättigheter (2023) Kännedom om och upplevelser av mänskliga rättigheter i Sverige 2022–2023: bara 4 % känner sig helt säkra på vart de kan vända sig vid rättighetskränkning; 35 % vet inte alls; av dem som upplevt kränkningar men inte vänt sig någonstans anger 47 % att de inte vet hur (s. 14–15). | Skallerud, Jørgensen & Karlsson (2024) Exploring Human Rights Awareness, Attitudes and Perception in Scandinavia: 35 % av svenskarna kan inte nämna en enda specifik mänsklig rättighet; medvetenheten om ekonomiska och sociala rättigheter (social trygghet 50 %, bostad 54 %, hälsa 55 %) är markant lägre än om medborgerliga rättigheter (yttrandefrihet 94 %) (s. 14). | Institutet för mänskliga rättigheter (2024) Allt ifrågasätts: 36 % av personer med funktionsnedsättning vet vart de kan vända sig om rättigheter inte efterlevs — många beskriver upplevelser av att känna sig misstrodda och som en belastning vid försök att utkräva sina rättigheter. | RiR 2021:8 Var god dröj, myndigheterna digitaliserar – service till enskilda som inte kan eller vill vara digitala: bara ett fåtal av 22 granskade myndigheter har en tydlig bild av enskildas behov av alternativ till digital service — utan sådan kunskap kan myndigheten inte aktivt informera om rätten till hjälp eller alternativa kontaktvägar ( s. 32–33). | FN:s funktionsrättskommitté (2024, CRPD/C/SWE/CO/2–3) punkt 9c: det saknas tillräckliga klagomålsmekanismer för enskilda när kommuner och regioner brister.","beskrivning":"Den enskilde och civilsamhället saknar systematiska möjligheter att påverka hur digitala samhällsfunktioner utformas. Offentlig digitalisering sker utan strukturer för delaktighet i design och utveckling. Aktiv involvering i utformningen av digitala samhällsfunktioner är en konventionsförpliktelse, inte en kvalitetsambition.","lankar":["https://mrinstitutet.se/vara--publikationer/rapporter/rapporter/2023-11-23-kannedom-om-och-upplevelser-av-manskliga-rattigheter-i-sverige-2022-2023","https://mrinstitutet.se/vara--publikationer/rapporter/rapporter/2024-12-09-exploring-human-rights-awareness-attitudes-and-perception-in-scandinavia","https://mrinstitutet.se/vara--publikationer/rapporter/rapporter/2024-09-04-allt-ifragasatts","https://www.riksrevisionen.se/granskningar/granskningsrapporter/2021/var-god-droj-myndigheterna-digitaliserar---service-till-enskilda-som-inte-kan-eller-vill-vara-digitala.html"]},{"tax_huvusektion":"Bildning, egenmakt och delaktighet","tax_huvudsektion_beskrivning":"Det allmännas ansvar att upprätthålla förutsättningarna för att den enskilde ska kunna förstå, agera och delta i en digitaliserad välfärdsstat.","tax_kat":"3.3 Inflytande och demokratisk insyn","taxonomi_id":"3.3.2","kategori":"Bristande inflytande över digitala samhällsfunktioner","situation_exempel":"Nytt kommunalt system driftsattes utan att medborgare fick tycka till","radgivning_enskild":"Kommunen (synpunktshantering); JO (om beslutet påverkar rättigheter)","radgivning_utforare":"Saknas 2026-04-08","tvist":"JO (bristande delaktighet vid myndighetsutövning); förvaltningsrätten (om beslutet kan överklagas)","tillsynsmyndighet":"JO (enskilda fall). Ingen myndighet har systemtillsyn över att medborgare involveras i utformningen av digitala samhällsfunktioner. CRPD art. 4.3 kräver aktiv involvering av personer med funktionsnedsättning – men ingen svensk myndighet ansvarar för att det sker vid digitalisering.","lagstod":"RF 1 kap. 1 § (all offentlig makt utgår från folket); RF 1 kap. 2 § (delaktighet och inflytande); Kommunallagen 5 kap.; CRPD art. 4.3; FL 6–7 §§","tillsynslucka":"Nej –","lucka_status":"Nej","empirisk_kalla":"RiR 2025:8 s. 26–50: 1 094 strategiska digitaliseringsprojekt – medborgarna har inget inflytande; nyttorealisering saknas systematiskt; kostnadsnyttoanalyser inkluderar sällan medborgarnyttor; 2/3 av myndigheter arbetar inte systematiskt med nyttorealisering. | Digg/PTS (2026) s. 35: Riksrevisionen bedömer att myndigheterna inte involverar användare i tillräcklig utsträckning vid utveckling av digitala tjänster – bara ett fåtal arbetar systematiskt med användarinvolvering. 88 % av statliga myndigheter involverar målgrupper i \"någon utsträckning\" men bara en dryg femtedel av kommuner följer regelbundet upp enkelheten i digitala tjänster. 15 % av kommuner saknar helt rutiner för att samla in eller använda återkoppling från användare. | Feenberg (1992): teknikens utformning kan demokratiseras men bara om berörda har inflytande. | Raymond (2024) s. 52–65: samhällets feedbackloop innehåller viktiga indikatorer på digitala samhällshinder som är upphov till fördyrande dubbelarbete. |","beskrivning":"Digitalisering av offentlig förvaltning och politisk kommunikation skapar nya luckor i dokumentationen av beslut och processer. Automatiserade beslutsregler ändras utan versionering. Diarieförda handlingar och webbsidor raderas efter utredningstid eller avslutad insats. Politisk kommunikation i mejl och slutna system gallras utan att arkiveras. Format blir obsoleta vid systembyten. Myndigheters domännamn, rapporter och utredningar avpubliceras utan att informationen bevaras eller omdirigeras.","lankar":[]},{"tax_huvusektion":"Bildning, egenmakt och delaktighet","tax_huvudsektion_beskrivning":"Det allmännas ansvar att upprätthålla förutsättningarna för att den enskilde ska kunna förstå, agera och delta i en digitaliserad välfärdsstat.","tax_kat":"3.3 Inflytande och demokratisk insyn","taxonomi_id":"3.3.3","kategori":"Skydd mot otillbörlig informationspåverkan","situation_exempel":"saknas 2026-04-28","radgivning_enskild":"saknas 2026-04-28","radgivning_utforare":"saknas 2026-04-28","tvist":"saknas 2026-04-28","tillsynsmyndighet":"saknas 2026-04-28","lagstod":"saknas 2026-04-28","tillsynslucka":"saknas 2026-04-28","lucka_status":"Nej","empirisk_kalla":"saknas 2026-04-28","beskrivning":"Offentlig information och data som låses in bakom betalväggar eller komplexa system begränsar demokratisk insyn och jämlik kunskapsdelning. Avsaknad av öppna licenser och tillgängliga format hindrar den enskilde från att granska och använda information som borde vara allmänt tillgänglig","lankar":[]},{"tax_huvusektion":"Bildning, egenmakt och delaktighet","tax_huvudsektion_beskrivning":"Det allmännas ansvar att upprätthålla förutsättningarna för att den enskilde ska kunna förstå, agera och delta i en digitaliserad välfärdsstat.","tax_kat":"3.3 Inflytande och demokratisk insyn","taxonomi_id":"3.3.4","kategori":"Förlorade beslutsspår","situation_exempel":"Jag vill hitta en rapport som producerades av Digitaliseringsrådet 2021 men deras webbplats är borta. På deras domännam ligger slaskreklam nu.","radgivning_enskild":"Resp. myndighet (begära allmän handling, TF 2 kap.)","radgivning_utforare":"Riksarkivet (digital informationshantering); Digg (ramverk för spårbarhet inom Ena); SKR","tvist":"Förvaltningsrätten (överklagande vid bristande dokumentation); JO (bristande diarieföring eller dokumentationsplikt); kammarrätten (sekretessbeslut kring allmänna handlingar)","tillsynsmyndighet":"Riksarkivet (arkivbildning, statliga myndigheter). JO (enskilda fall). Ingen myndighet har systemtillsyn över att digitala beslutsspår bevaras i versionerade och tillgängliga format.","lagstod":"TF 2 kap. (offentlighetsprincipen); Arkivlagen (1990:782); FL (2017:900) 27 § (dokumentationsplikt vid handläggning), 32 § (motivering av beslut); RF 1 kap. 1 § (folkstyrelseprincipen)","tillsynslucka":"Delvis – Riksarkivet har tillsynsansvar över arkivbildning men arkivlagen är från 1991 och täcker inte den digitala verkligheten; riksarkivarien har vid upprepade tillfällen efterlyst en moderniserad arkivlag utan resultat. Ingen tillsyn över att digitala beslutsspår, webbpublicerat material eller beslutsregler versioneras och bevaras.","lucka_status":"Delvis","empirisk_kalla":"Lemne, M. & Ilshammar, L. (2026) \"Sverige håller på att radera sitt demokratiska minne\", Dala-Demokraten, Opinionstext 8 april 2026: politisk kommunikation i mejl och SMS bevaras inte systematiskt | Riksarkivet (2024) Årsredovisning: det saknas tillräckligt skydd för samhällsviktig information | Johansson, M. (2026) \"Riksarkivet har dragit sig undan ansvaret för digitalt bevarande\", Magasin K: föreskrifter finns men implementeringen brister | RiR 2025:8 s. 72: myndigheter genomför likartade projekt inom digital arkivering och diarieföring men samverkan understiger 30 procent | Axbom, P. (2024) \"Myndigheters länkröta\", axbom.se: myndigheters domännamn, rapporter och utredningar försvinner från webben utan att informationen bevaras","beskrivning":"","lankar":[]},{"tax_huvusektion":"Bildning, egenmakt och delaktighet","tax_huvudsektion_beskrivning":"Det allmännas ansvar att upprätthålla förutsättningarna för att den enskilde ska kunna förstå, agera och delta i en digitaliserad välfärdsstat.","tax_kat":"3.3 Inflytande och demokratisk insyn","taxonomi_id":"3.3.5","kategori":"Öppen kunskap och demokratisk insyn","situation_exempel":"Kommunens digitaliseringsprojekt kostade miljoner men det finns ingen slutrapport, ingen öppen källkod och ingen dokumentation av hur systemen fungerar. Jag som invånare kan inte granska vad jag betalat för.","radgivning_enskild":"Resp. myndighet (begära allmän handling, TF 2 kap.); kommunens revisorer; JO (om insyn nekas)","radgivning_utforare":"Saknas 2026-04-08","tvist":"Kammarrätten (överklagande av sekretessbeslut); JO","tillsynsmyndighet":"Ingen samlad. JO (offentlighetsprincipen, enskilda fall). Digg (öppna data – men vägledning, inte tillsyn). Ingen myndighet har tillsyn över att offentlig digitalisering dokumenteras, delas öppet eller görs granskningsbar.","lagstod":"TF 2 kap. (offentlighetsprincipen); RF 1 kap. 1 § (all offentlig makt utgår från folket); EU AI Act kap. IV (transparens för högrisk-AI)","tillsynslucka":"Nej – offentlighetsprincipen gäller handlingar men inte kod, designval eller systemdokumentation.","lucka_status":"Nej","empirisk_kalla":"Bara 32 % av statliga myndigheter har antagit principen \"öppet som standard\". Utan slutrapporter, öppen källkod och tillgänglig dokumentation kan varken invånare, forskare eller andra myndigheter granska eller lära av digitaliseringsprojekt. RiR 2025:8 s. 38–42: styrdokument upprättas inte systematiskt; utan slutrapporter sprids lärdomar ej; samverkan och erfarenhetsutbyte sker sällan. | Digg/PTS (2026) uppföljningsbilaga tabell 20: 23 400 datamängder på Sveriges dataportal varav 17 156 öppna – men bara 854 publicerade av kommuner. 32 % av myndigheter har antagit \"öppet som standard\". | Riksrevisionen (2025) Statliga strategiska digitaliseringsprojekt – stora gemensamma utmaningar. RiR 2025:8. s. 38–42: Samverkan och erfarenhetsutbyte sker sällan. Styrdokument (projektplaner, slutrapporter) upprättas inte systematiskt. Utan slutrapport: lärdomar sprids ej. Agila arbetssätt riskerar minskat helhetsperspektiv och att insikter stannar inom projektet. | Forbrukerrådet (2026) Breaking free: plattformar stänger API:er som forskare och journalister behöver för insyn.","beskrivning":"","lankar":[]}];

var SECTION_TEXTS = {"Systembarriärer":{"ingress":"Strukturella hinder i teknikens utformning och infrastruktur som skapar ojämlika villkor.","text":"Systembarriärer uppstår när digitala lösningar och infrastrukturer är utformade på sätt som inte tar hänsyn till alla människors behov, förutsättningar eller rättigheter. Dessa hinder är inbyggda i själva systemen genom exempelvis otillräcklig teknisk interoperabilitet eller ensidigt fokus på effektivisering. Resultatet blir att vissa utestängs redan i design- och implementeringsfasen."},"Ojämlikhetsfaktorer":{"ingress":"Omständigheter som systemen inte är utformade att hantera.","text":"Systembarriärer drabbar inte alla lika. Vissa omständigheter, till exempel ekonomisk utsatthet, funktionsnedsättning, skyddsbehov, livskris, migrationsstatus eller att vara barn eller ung, gör att systemens brister får allvarligare konsekvenser. Dessa omständigheter uppträder sällan ensamma och förstärker varandra: en person med funktionsnedsättning som samtidigt lever i ekonomisk utsatthet möter fler och högre barriärer än vad varje omständighet hade skapat för sig. Det är inte omständigheterna i sig som skapar exkludering, utan att systemen inte är utformade för den variation som finns i befolkningen.\n\nExkludering är ofta situationsbunden. En person som brukar hantera digitala samhällsfunktioner kan få problem när livssituationen förändras, som vid sjukdom, arbetslöshet, separation eller sorg. Det är just i dessa lägen som behovet av kontakt med välfärdssystemet ökar, samtidigt som förmågan att navigera digitala processer minskar (Wihlborg, Kaharevic & Lindgren 2026). Upprepade negativa erfarenheter kan minska tilliten till myndigheter och leda till att den enskilde undviker kontakt även när rätten till stöd kvarstår.\n\nDenna sektion kartlägger olika omständigheter som faller utanför systemens designantaganden. Syftet är inte att kategorisera människor utan att synliggöra var det allmänna brister i att utforma system som fungerar för alla."},"Bildning, egenmakt och delaktighet":{"ingress":"Det allmännas ansvar att upprätthålla förutsättningarna för att den enskilde ska kunna förstå, agera och delta i en digitaliserad välfärdsstat.","text":"Rätten att förstå sin situation, utöva inflytande och delta i samhället är en demokratisk grundförutsättning. Förvaltningen har alltid haft ansvar för att den enskilde kan orientera sig i samhället, förstå ett beslut, överklaga, söka information, bilda sig en uppfattning och delta i demokratiska processer. Det ansvaret består när samhällsfunktioner digitaliseras.\n\nI svensk digitaliseringspolicy är svaret på digital exkludering i huvudsak att stärka den enskildes kompetens. Men kompetens är inte en statisk egenskap hos individen. Enligt Ellström (1992) kan kompetens förstås som den potentiella handlingsförmågan i relation till en specifik situation, uppgift eller kontext. Förmågan uppstår i mötet mellan individens resurser och de krav och handlingsutrymmen som omgivningen skapar. I digitala system är handlingsutrymmet inte öppet utan inskrivet i teknikens utformning. De antaganden som designers byggt in avgör vilka handlingar som är möjliga och vilka som inte är det (Akrich 1992). Om systemen inte skapar handlingsutrymme är det inte säkert att ökad individuell digital kompetens kan kompensera för strukturella hinder.\n\nDet finns en avgörande skillnad mellan att utföra en uppgift och att förstå sin situation. Att delegera utförande är inte detsamma som att ha kontroll. Kontroll förutsätter förståelse: förmågan att bedöma om ett beslut är rimligt, att veta vilka rättigheter som finns och/eller att kunna avgöra om den information man möter är trovärdig. Bildning kan inte ersättas av teknik som agerar i den enskildes ställe."}};
var ABOUT_SECTIONS = [{"title":"Om ramverket för rättighetsefterlevnad","text":"Digitalisering av samhällsfunktioner förändrar villkoren för hur rättigheter utövas och skyldigheter fullgörs. Ramverket kartlägger var det allmänna brister i att säkerställa att detta kan ske på jämlika villkor. Här granskas systembarriärer i teknikens utformning, livsomständigheter som systemen inte är utformade att hantera och det allmännas ansvar för digital delaktighet. Ramverket utgår från gällande lagstiftning och riktar sig till beslutsfattare och styrgrupper med ansvar för digitalisering i offentlig sektor.\n\nRamverket utgör grunden i reformprojektet DigidelGov – Samhällskontraktet i en digital tid."},{"title":"Bakgrund","text":"Ett legitimt välfärdssystem förutsätter att rättigheter och skyldigheter inte bara finns formellt utan kan utövas och fullgöras på jämlika villkor. Digitalisering av samhällsfunktioner sätter den förutsättningen på prov.\n\nI svensk digitaliseringspolicy behandlas digital exkludering huvudsakligen som en kompetensfråga. Begrepp som digitalt utanförskap klumpar ihop vitt skilda situationer – otillgänglig teknik, livskriser, funktionsnedsättningar, bristande infrastruktur – och sorterar dem som ett gemensamt avstånd till en digital norm. Insatser för att öka digital inkludering riktas i huvudsak mot individens förmåga i form av utbildning, stödfunktioner och informationskampanjer. Dessa insatser fyller en funktion, men de förbigår ansvaret: när systemen själva skapar barriärerna kan svaret inte vara att anpassa människor till systemen.\n\nNär socialpolitiska, utbildningspolitiska och arbetsmarknadspolitiska frågor omformuleras till digitaliseringsfrågor förskjuts ansvaret. Bredare välfärdspolitiska brister behandlas som tekniska problem. Resultatet blir att insatser riktas mot symptom och inte mot de strukturella orsaker som avgör om digitalt förmedlade samhällsfunktioner faktiskt fungerar för alla.\n\nDetta ramverk utgår från det allmännas ansvar och granskar hur system, ansvarsfördelning och styrning villkorar möjligheten att utöva sociala rättigheter och fullgöra sina skyldigheter. Ramverket förhåller sig till Sveriges digitaliseringsstrategi 2025–2030, Sveriges AI-strategi och tillhörande handlingsplan (Regeringskansliet 2025, 2026)."},{"title":"Digital exkludering – ett strukturellt perspektiv","text":"I detta ramverk avser digital exkludering situationer där digitala system, processer eller styrformer i praktiken försvårar eller omöjliggör möjligheten att använda, förstå eller få stöd i digitalt förmedlade samhällsfunktioner. Begreppet riktar sig mot systemets utformning, inte mot individens förmåga.\n\nRamverket identifierar och strukturerar systembarriärer samt synliggör hur livsvillkor och styrning påverkar möjligheten att delta på lika villkor."},{"title":"Rättslig och normativ grund","text":"Ramverket vilar på tre typer av normativa grunder som tillsammans anger det allmännas ansvar för att sociala rättigheter ska kunna utövas i praktiken, även i den digitala välfärdsstaten.\n\nBindande svensk rätt: Nationell lagstiftning som kan åberopas, prövas och sanktioneras. Hit hör Regeringsformen, Förvaltningslagen, Diskrimineringslagen, Socialtjänstlagen, Hälso- och sjukvårdslagen och Konsumentköplagen, liksom EU-förordningar och EU-direktiv med direkt eller harmoniserad verkan i svensk rätt.\n\nFolkrätt: Internationella konventioner som Sverige ratificerat och som gäller parallellt med den nationella lagstiftningen. CRC är inkorporerad i svensk lag sedan 2020 medan övriga gäller som folkrättsliga åtaganden som ska beaktas vid tolkning och tillämpning.\n\nVägledande politiska principer: Den europeiska förklaringen om digitala rättigheter och principer för det digitala decenniet (2023) uttrycker politisk vilja och kan vägleda tolkning men är inte rättsligt bindande. Förklaringen formulerar principer som konkretiserar hur EU:s medlemsstater avser att tillämpa grundläggande rättigheter i digitala sammanhang."},{"title":"Teoretisk utgångspunkt","text":"Digitala system är inte neutrala verktyg. De är resultatet av förhandlingar där vissa behov värderas, prioriteras och byggs in, medan andra faller bort. Designval avgör vilka som exkluderas, ofta utan att det synliggörs eller ifrågasätts. Denna insikt har teoretisk förankring.\n\nAkrich (1992) introducerar begreppet inskription för att beskriva hur designers skriver in antaganden i tekniska artefakter: föreställningar om vilka användarna är, vad de kan och hur de förväntas agera. Tekniken delegerar därigenom roller och handlingsutrymme till dem som möter den. Akrich visar att när den verkliga användaren inte motsvarar den föreställda uppstår förskjutning (displacement): artefaktens inbyggda scenario och den faktiska användningssituationen går isär. Rose och Blume (2003) fördjupar detta och visar att inskriptioner konfigurerar alla som möter tekniken. De val och prioriteringar som redan gjorts begränsar handlingsutrymmet, och den enskilde har inte alltid möjlighet att kompensera för det som byggts in.\n\nWinner (1980) visar att sådana designval kan ha politiska konsekvenser långt bortom den enskilda artefakten: tekniska system kan ordna mänskliga relationer på sätt som gynnar vissa grupper och utestänger andra. Feenberg (1992) argumenterar för att denna ordning inte är given. Teknikens utformning kan demokratiseras genom att de som berörs ges möjlighet att påverka designprocessen. Hedström (2004) bekräftar detta empiriskt i studier av datorisering i äldreomsorg, där hon visar hur värden som effektivitet och kontroll skrevs in i system medan omsorgspersonalens och de äldres behov fick stå tillbaka."},{"title":"Rättighetsbärare och skyldighetsbärare","text":"I människorättslig terminologi innebär denna förskjutning att ansvaret i praktiken flyttas från skyldighetsbäraren till rättighetsbäraren. Formell tillgång till teknik och digitala tjänster är inte tillräcklig. Avgörande är om systemen är utformade så att rättigheter och skyldigheter faktiskt kan utövas. En rättighet som inte kan utövas i praktiken, eller en skyldighet som inte rimligen kan fullgöras, är en systembrist.\n\nRamverket utgår från den distinktion som är grundläggande i internationell människorätt: den mellan rättighetsbärare och skyldighetsbärare. Rättighetsbärare är den enskilde – den som har rätt att utöva sina rättigheter och fullgöra sina skyldigheter. Skyldighetsbärare är det allmänna – staten, kommunen, regionen och i vissa fall privata aktörer med offentliga uppdrag – som ansvarar för att denna rätt kan utövas i praktiken.\n\nNär digitala samhällsfunktioner utformas utan att beakta den enskildes förutsättningar förskjuts ansvaret i praktiken från skyldighetsbäraren till rättighetsbäraren. Det är rättighetsbäraren som förväntas anpassa sig, skaffa teknik, lära sig systemet, hitta stöd. Ramverket synliggör var denna förskjutning sker och pekar tillbaka ansvaret dit det hör hemma."},{"title":"Globala leveranskedjor","text":"Digitala system bär också spår av de villkor under vilka de producerats. AI-modeller som används i offentlig sektor vilar till exempel på globala leveranskedjor vars arbetsförhållanden inte alltid motsvarar de rättighetskrav som systemen förväntas uppfylla. Denna version av ramverket hanterar emellertid inte den globala dimensionen."},{"title":"Ramverkets struktur","text":"Ramverket är uppdelat i tre huvudsektioner som tillsammans belyser hur systemutformning, livsvillkor och stödstrukturer samverkar.\n\n1. Systembarriärer – Strukturella hinder i teknikens utformning, organisation och infrastruktur som skapar ojämlika villkor.\n\n2. Ojämlikhetsfaktorer – Livsomständigheter som systemen inte är utformade att hantera och som gör att systembarriärer får allvarligare konsekvenser.\n\n3. Bildning, egenmakt och delaktighet – Det allmännas ansvar att upprätthålla förutsättningarna för att den enskilde ska kunna förstå, agera och delta i en digitaliserad välfärdsstat."}];
var CAT_TEXTS = {"1.1":"Bristande digital infrastruktur skapar ojämlika villkor och underminerar det allmännas ansvar för jämlik delaktighet.\n\nDenna kategori omfattar fysisk och teknisk infrastruktur, där brister i utbyggnad, interoperabilitet eller marknadstillgång försvårar för det allmänna att uppfylla sitt ansvar verka för delaktighet och jämlikhet. Ramverket identifierar de strukturella konsekvenser som uppstår när marknaden inte levererar och det offentliga inte kompenserar.\n\nDigital infrastruktur har också en energi- och resursdimension som påverkar förutsättningarna för samhällsfunktioner. Datacenteretableringar konkurrerar om elkapacitet och IKT-sektorn beräknas stå för 2–4 procent av globala växthusgasutsläpp. Trots detta saknar det allmänna systematiska krav på att pröva energi- och resursdimensionen vid etablering av digital infrastruktur i offentlig verksamhet. Digg och PTS bedömer att det inom en snar framtid blir aktuellt att räkna på klimat- och miljöeffekter i alla nyetableringar och nya digitala projekt (Digg, PTS 2026).\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för att främja jämlikhet, vilket förutsätter digital infrastruktur som omfattar alla. Förvaltningslagen (2017:900) 7 § kräver att myndigheter ska vara tillgängliga. Konsumentköplagen (2022:260) 1 kap. 7 § omfattar digitala tjänster, även när konsumenten betalar med sina personuppgifter.\n\nEuropeiska digitala rättigheter och principer: EU-förklaringen om digitala rättigheter och principer för det digitala decenniet (2023) fastställer att alla i EU ska ha tillgång till konnektivitet med hög hastighet och till rimligt pris, inklusive personer med låga inkomster (artikel 3). Den digitala omställningen ska gagna alla och i synnerhet innefatta människor i landsbygdsområden, personer med funktionsnedsättning och marginaliserade grupper (artikel 2c). Marknadsaktörer som drar nytta av den digitala omställningen ska bidra till kostnaderna för kollektiva nyttigheter och offentliga infrastrukturer (artikel 2c). Digitala produkter och tjänster ska utformas med hänsyn till miljöpåverkan och hållbarhet (artikel 23).\n\nPolitikområden: Infrastrukturpolitik, regionalpolitik och konsumentpolitik.","1.2":"När digitala samhällsfunktioner kräver särskilda tekniska resurser riskerar tillgången att bli ojämlik.\n\nRättsliga, tekniska och administrativa barriärer – som krav på e-legitimation, kontokoppling eller teknisk utrustning – kan begränsa möjligheten att utöva rättigheter och fullgöra skyldigheter. Resultatet hindrar det allmänna från att uppfylla sitt ansvar för delaktighet och jämlikhet.\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § kräver begriplig information, 7 § tillgänglighet och 8 § samverkan mellan myndigheter. Hälso- och sjukvårdslagen (2017:30) 13a kap. 1 § kräver att primärvården ska vara lätt tillgänglig. Diskrimineringslagen (2008:567) 1 kap. 4 § förbjuder indirekt diskriminering, vilket kan uppstå när teknikvillkor missgynnar vissa grupper. Lagen om tillgänglighet till digital offentlig service (2018:1937) ställer krav på att digital offentlig service ska vara möjlig att uppfatta, hantera, begripa och robust. Europaparlamentets och rådets förordning (EU) 2022/2065 om digitala tjänster ställer krav på transparens, ansvarsskyldighet och insyn i algoritmiska system för plattformar som förmedlar samhällsinformation.\n\nEuropeiska digitala rättigheter och principer: Alla bör erbjudas möjlighet att använda en tillgänglig, frivillig, säker och tillförlitlig digital identitet som ger tillgång till ett brett utbud av onlinetjänster (artikel 7a). Utformning, utveckling och användning av tekniska lösningar ska respektera de grundläggande rättigheterna och göra det möjligt att utöva dessa (artikel 2a). Den digitala omställningen ska i synnerhet innefatta äldre, personer med funktionsnedsättning och marginaliserade grupper, ingen ska lämnas utanför (artikel 2b). Digitala offentliga tjänster ska vara sömlösa, säkra och interoperabla, i synnerhet digitala hälso- och sjukvårdstjänster (artikel 7c).\n\nPolitikområden: Förvaltningspolitik och socialpolitik.","1.3":"När samhällsfunktioner enbart erbjuds digitalt utan att beakta människors olika förutsättningar riskerar det digitala att bli ett filter snarare än en bro.\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Förvaltningslagen (2017:900) 6 § kräver begriplig information, 7 § tillgänglighet och 8 § rätt till biträde när det behövs. Hälso- och sjukvårdslagen (2017:30) 3 kap. 1 § fastställer vård på lika villkor och behovsbaserad prioritering, 13a kap. 1 § kräver att primärvården ska vara lätt tillgänglig. Socialtjänstlagen (2025:400) 8 kap. 10 § fastställer att personer med funktionsnedsättning ska ges möjlighet att delta i samhällets gemenskap. Lagen om tillgänglighet till digital offentlig service (2018:1937) ställer krav på att digital offentlig service ska vara möjlig att uppfatta, hantera, begripa och robust.\n\nEuropeiska digitala rättigheter och principer: Den digitala omställningen bör inte innebära en tillbakagång vad gäller rättigheter, och förklaringen påverkar inte rätten till tillgång till viktiga offentliga samhällsfunktioner offline (ingressen, punkt 3). Alla bör ha tillgång online till viktiga offentliga tjänster i hela EU (artikel 7).\n\nPolitikområden: Förvaltningspolitik och socialpolitik.","1.4":"Otransparenta tekniska miljöer underminerar den enskildes rätt till förståelse och självbestämmande.\n\nNär digitala system inte tydligt visar vad som händer med information, vem som har tillgång till uppgifter eller vilka konsekvenser ett val kan få, skapas en osäkerhet som det allmänna inte kan lämna åt individen att hantera ensam. Otrygghet är inte bara ett upplevt problem. Det är en systembrist när förutsättningarna för informerat handlande saknas. Bristerna tar sig olika uttryck beroende på arena – från välfärdsteknik och uppkopplade enheter i hemmet till appar som spårar rörelse – men grundproblemet är detsamma: den enskilde saknar insyn i vad som sker med deras uppgifter.\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Regeringsformen (RF 2 kap. 6 §) skyddar mot betydande intrång i den personliga integriteten, om det sker utan samtycke och innebär övervakning eller kartläggning av den enskildes personliga förhållanden. Förvaltningslagen (2017:900) 6 § kräver begriplig information, 7 § tillgänglighet och 10 § fastställer rätten att ta del av uppgifter. Hälso- och sjukvårdslagen (2017:30) 3 kap. 1 § fastställer vård på lika villkor. Diskrimineringslagen (2008:567) 1 kap. 4 § förbjuder diskriminering genom bristande tillgänglighet. Europaparlamentets och rådets förordning (EU) 2022/2065 om digitala tjänster ställer krav på transparens, ansvarsskyldighet och insyn i algoritmiska system för plattformar som förmedlar samhällsinformation.\n\nEuropeiska digitala rättigheter och principer: Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a). Alla ska ha kontroll över sina egna data (artikel 5). AI bör fungera som verktyg för människor med det slutliga målet att öka välbefinnande (artikel 8). Alla bör skyddas mot risker och negativa konsekvenser för hälsa, säkerhet och grundläggande rättigheter från algoritmiska system (artikel 9). Digitala offentliga tjänster, i synnerhet hälso- och sjukvårdstjänster, ska vara sömlösa, säkra och begripliga (artikel 7c). Alla har rätt till integritet och skydd av sina personuppgifter (artikel 17). Ingen ska utsättas för olaglig övervakning eller spårning online (artikel 18).\n\nPolitikområden: Förvaltningspolitik, rättspolitik, hälso- och sjukvårdspolitik.","1.5":"Designbeslut som förbiser mångfald i behov och förutsättningar skapar strukturell exkludering.\n\nDigitala gränssnitt, språkval, navigationslogik eller funktioner som utgår från stereotypa antaganden kan systematiskt missgynna vissa grupper. Resultatet är inte bara ett funktionsproblem utan faktisk rättighetsförlust. Grupper utestängs, felbedöms eller osynliggörs – inte för att de saknar digital kompetens, utan för att systemen aldrig var designade med deras behov i åtanke.\n\nStöd i lag: Regeringsformen (RF 1 kap. 2 §) fastställer det allmännas ansvar för delaktighet och jämlikhet. Diskrimineringslagen (2008:567) 1 kap. 4 § fastställer att bristande tillgänglighet kan utgöra diskriminering. FN:s funktionsrättskonvention kräver universell utformning. Förvaltningslagen (2017:900) 6 § kräver begriplig information och 13 § kräver tillgänglighet för den som inte behärskar svenska eller har funktionsnedsättning. Lagen om tillgänglighet till digital offentlig service (2018:1937) ställer krav på att digital offentlig service ska vara möjlig att uppfatta, hantera, begripa och robust. Lagen om vissa produkters och tjänsters tillgänglighet (2023:254) ställer tillgänglighetskrav på digitala produkter och tjänster på marknaden, med sanktionsavgifter vid bristande efterlevnad.\n\nEuropeiska digitala rättigheter och principer: Tekniska lösningar ska utformas så att de respekterar grundläggande rättigheter och möjliggör utövandet av dessa (artikel 2a). Den digitala omställningen ska i synnerhet innefatta äldre, personer med funktionsnedsättning och marginaliserade grupper, och bör främja kulturell och språklig mångfald (artikel 2b). Alla bör skyddas mot risker och negativa konsekvenser för hälsa, säkerhet och grundläggande rättigheter från algoritmiska system (artikel 9).\n\nPolitikområden: Förvaltningspolitik, funktionsrättspolitik, demokratipolitik,","1.6":"Den aktör som tillhandahåller en digital samhällsfunktion ansvarar för att den enskilde kan förstå och använda lösningen.\n\nTeknisk tillgänglighet är inte detsamma som användbarhet. En tjänst som finns men inte kan förstås, en process som förändras utan att användaren vägleds eller en rättighet som inte kommuniceras är brister i aktörens ansvar – inte brister hos användaren. När det som tidigare sköttes i ett möte med en handläggare ersätts av digital självbetjäning förskjuts utförandeansvaret till den enskilde. Den förskjutningen förutsätter att aktören tar ett motsvarande ansvar för att den enskilde klarar det som förväntas. Detta ansvar är inte en ambition om god service utan en rättslig skyldighet som följer av Förvaltningslagens krav på begriplighet, tillgänglighet och service i mötet med den enskilde.\n\nAnsvaret är odelbart. Det kan inte delegeras till folkbildning, bibliotek, anhöriga eller den enskilde själv. Det gäller även när tjänsten upphandlas från en extern leverantör. Den aktör som inför en digital samhällsfunktion äger hela kedjan – från utformning och lansering till löpande förvaltning och avveckling.\n\nStöd i lag: Förvaltningslagen (2017:900) 6 § kräver att kontakterna med enskilda blir smidiga och enkla, 7 § kräver tillgänglighet, 8 § kräver att myndigheten i rimlig utsträckning underlättar för den enskilde, 13 § kräver att information är begriplig även för den som inte behärskar svenska eller har funktionsnedsättning. Diskrimineringslagen (2008:567) 1 kap. 4 § fastställer att bristande tillgänglighet kan utgöra diskriminering. Lagen om tillgänglighet till digital offentlig service (2018:1937) ställer krav på att digital offentlig service ska vara möjlig att uppfatta, hantera, begripa och robust.\n\nEuropeiska digitala rättigheter och principer: Utformning, utveckling och användning av tekniska lösningar ska respektera de grundläggande rättigheterna och göra det möjligt att utöva dessa (artikel 2a). Digitala offentliga tjänster ska vara sömlösa, säkra och interoperabla (artikel 7c). Ingen ska lämnas utanför den digitala omställningen (artikel 2b).\n\nPolitikområden: Förvaltningspolitik, funktionsrättspolitik, konsumentpolitik.","1.7":"Många digitala system är in
