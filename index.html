ättigheter och fullgöra sina skyldigheter."}, {"title": "Digital exkludering – ett strukturellt perspektiv", "text": "I detta ramverk avser digital exkludering situationer där digitala system, processer eller styrformer i praktiken försvårar eller omöjliggör möjligheten att använda, förstå eller få stöd i digitalt förmedlade samhällsfunktioner. Begreppet riktar sig mot systemets utformning, inte mot individens förmåga.\n\nRamverket identifierar och strukturerar systembarriärer samt synliggör hur livsvillkor och styrning påverkar möjligheten att delta på lika villkor."}, {"title": "Rättslig och normativ grund", "text": "Ramverket vilar på tre typer av normativa grunder som tillsammans anger det allmännas ansvar för att sociala rättigheter ska kunna utövas i praktiken, även i den digitala välfärdsstaten.\n\nBindande svensk rätt: Nationell lagstiftning som kan åberopas, prövas och sanktioneras. Hit hör Regeringsformen, Förvaltningslagen, Diskrimineringslagen, Socialtjänstlagen, Hälso- och sjukvårdslagen och Konsumentköplagen, liksom EU-förordningar och EU-direktiv med direkt eller harmoniserad verkan i svensk rätt.\n\nBindande folkrätt: Internationella konventioner som Sverige ratificerat och som gäller parallellt med den nationella lagstiftningen. CRC är inkorporerad i svensk lag sedan 2020 medan övriga gäller som folkrättsliga åtaganden som ska beaktas vid tolkning och tillämpning.\n\nVägledande politiska principer: Den europeiska förklaringen om digitala rättigheter och principer för det digitala decenniet (2023) uttrycker politisk vilja och kan vägleda tolkning men är inte rättsligt bindande."}, {"title": "Konstitutionell grund – Regeringsformen", "text": "Regeringsformen (1974:152) slår fast det allmännas ansvar för att främja delaktighet och jämlikhet i samhället (1 kap. 2 § RF). Digitalisering av samhällstjänster får inte skapa nya former av ojämlikhet eller förstärka befintliga. Rättighetsefterlevnad innebär här exempelvis att varje digitalisering prövas mot detta konstitutionella krav."}, {"title": "Förvaltningsrättslig grund – Förvaltningslagen", "text": "Förvaltningslagen (2017:900) konkretiserar hur myndighetsutövning och service ska utformas i mötet med enskilda. En myndighet ska se till att kontakterna med enskilda blir smidiga och enkla (6 §), vara tillgänglig (7 §), samverka med andra myndigheter och i rimlig utsträckning underlätta för den enskilde genom att själv inhämta uppgifter (8 §), samt säkerställa att information är begriplig även för den som inte behärskar svenska eller har funktionsnedsättningar som begränsar förmågan att se, höra eller tala (13 §). Dessa krav gäller även i digitala kanaler.\n\nBristande tillgänglighet och begriplighet påverkar inte bara den enskildes möjlighet att utöva rättigheter utan även förutsättningarna att fullgöra sina skyldigheter. När digitala processer är svåra att förstå ökar risken för oavsiktliga fel, förseningar eller regelbrott, med konsekvenser för individen och för tilliten till systemen."}, {"title": "Antidiskriminerande grund – Diskrimineringslagen", "text": "Diskrimineringslagen (2008:567) fastställer att bristande tillgänglighet kan utgöra diskriminering när en person med funktionsnedsättning missgynnas genom att skäliga åtgärder inte vidtas (1 kap. 4 §). Tillgänglighet och universell utformning är inte tekniska ambitioner utan rättsliga krav."}, {"title": "Välfärdspolitisk grund – Socialtjänstlagen", "text": "Socialtjänstlagen (2025:400) fastställer att socialtjänsten ska främja jämlika och jämställda levnadsvillkor och aktivt deltagande i samhällslivet (2 kap. 1 §), arbeta förebyggande och vara lätt tillgänglig (2 kap. 4 §) samt bedriva uppsökande verksamhet och upplysa om socialtjänsten och vilka insatser den kan erbjuda (6 kap. 3 §). För äldre betonas särskilt självständighet och meningsfull tillvaro i gemenskap med andra (8 kap. 2–3 §§). För personer med funktionsnedsättning betonas delaktighet i samhällets gemenskap (8 kap. 10 §)."}, {"title": "Hälso- och sjukvårdsrättslig grund", "text": "Hälso- och sjukvårdslagen (2017:30) slår fast att målet är en god hälsa och vård på lika villkor för hela befolkningen (3 kap. 1 §). Vården ska ges med respekt för alla människors lika värde, och den som har det största behovet ska ges företräde. När digitala ingångar till vården i praktiken ger snabbare tillgång åt den som har digital kapacitet snarare än störst medicinskt behov, riskerar behovsprincipen att sättas ur spel."}, {"title": "Konsumentskyddande grund – Konsumentköplagen", "text": "Konsumentköplagen (2022:260) omfattar köp av digitala tjänster och digitalt innehåll. Lagen gäller även när konsumenten betalar med sina personuppgifter i stället för pengar (1 kap. 7 §). Många vardagsnära funktioner tillhandahålls i gränslandet mellan offentlig service och kommersiella aktörer."}, {"title": "Folkrättslig och konventionsbaserad grund", "text": "ICESCR fastslår att rätten till hälsa (artikel 12) och utbildning (artikel 13) gäller alla på ett lands territorium utan diskriminering. CRPD kräver universell utformning och icke-diskriminering (artiklarna 5 och 19). CRC fastslår att barnets bästa ska beaktas i alla processer som rör barn (artikel 3) och ger flyktingbarn särskilt skydd (artikel 22). Flyktingkonventionen och non-refoulement-principen ger folkrättslig grund åt rätten att inte registreras eller spåras på sätt som äventyrar skyddsbehovet.\n\nFN:s funktionsrättskommitté granskade Sverige 2024 och konstaterade bland annat att det saknas tillräckliga möjligheter för enskilda att klaga och få upprättelse i fall där kommuner och regioner brister i genomförandet av rättigheterna."}, {"title": "Europeisk förklaring om digitala rättigheter och principer", "text": "Den Europeiska förklaringen om digitala rättigheter och principer för det digitala decenniet (2023/C 23/01) är en interinstitutionell deklaration antagen av Europaparlamentet, rådet och kommissionen. Den är inte rättsligt bindande men utgör en gemensam politisk referensram för hur digitalisering ska utformas med respekt för grundläggande rättigheter.\n\nFörklaringen fastställer bland annat att alla ska ha tillgång till konnektivitet till rimligt pris (artikel 3), att ingen ska lämnas utanför den digitala omställningen (artikel 2b), att tekniska lösningar ska möjliggöra utövandet av grundläggande rättigheter (artikel 2a) och att alla bör kunna förvärva grundläggande digitala färdigheter (artikel 4). Ramverket refererar genomgående till förklaringen. Hänvisningarna anger riktning, inte rättslig skyldighet."}, {"title": "Teoretisk utgångspunkt", "text": "Digitala system är inte neutrala verktyg. De är resultatet av förhandlingar där vissa behov värderas, prioriteras och byggs in, medan andra faller bort. Designval avgör vilka som exkluderas, ofta utan att det synliggörs eller ifrågasätts.\n\nAkrich (1992) introducerar begreppet inskription för att beskriva hur designers skriver in antaganden i tekniska artefakter: föreställningar om vilka användarna är, vad de kan och hur de förväntas agera. Winner (1980) visar att sådana designval kan ha politiska konsekvenser långt bortom den enskilda artefakten: tekniska system kan ordna mänskliga relationer på sätt som gynnar vissa grupper och utestänger andra. Feenberg (1992) argumenterar för att denna ordning inte är given. Teknikens utformning kan demokratiseras genom att de som berörs ges möjlighet att påverka designprocessen. Hedström (2004) bekräftar detta empiriskt i studier av datorisering i äldreomsorg, där hon visar hur värden som effektivitet och kontroll skrevs in i system medan omsorgspersonalens och de äldres behov fick stå tillbaka."}, {"title": "Rättighetsbärare och skyldighetsbärare", "text": "I människorättslig terminologi innebär denna förskjutning att ansvaret i praktiken flyttas från skyldighetsbäraren till rättighetsbäraren. Formell tillgång till teknik och digitala tjänster är inte tillräcklig. Avgörande är om systemen är utformade så att rättigheter och skyldigheter faktiskt kan utövas. En rättighet som inte kan utövas i praktiken, eller en skyldighet som inte rimligen kan fullgöras, är en systembrist.\n\nRamverket utgår från den distinktion som är grundläggande i internationell människorätt: den mellan rättighetsbärare och skyldighetsbärare. Rättighetsbärare är den enskilde – den som har rätt att utöva sina rättigheter och fullgöra sina skyldigheter. Skyldighetsbärare är det allmänna – staten, kommunen, regionen och i vissa fall privata aktörer med offentliga uppdrag – som ansvarar för att denna rätt kan utövas i praktiken.\n\nNär digitala samhällsfunktioner utformas utan att beakta den enskildes förutsättningar förskjuts ansvaret i praktiken från skyldighetsbäraren till rättighetsbäraren. Det är rättighetsbäraren som förväntas anpassa sig, skaffa teknik, lära sig systemet, hitta stöd. Ramverket synliggör var denna förskjutning sker och pekar tillbaka ansvaret dit det hör hemma."}];


var counts={total:DATA.length,ja:0,delvis:0,nej:0};
DATA.forEach(function(d){if(d.lucka_status==='Ja')counts.ja++;else if(d.lucka_status==='Delvis')counts.delvis++;else if(d.lucka_status==='Nej')counts.nej++});

// Build section and category lookup
var SECTIONS={};
var CATEGORIES={};
DATA.forEach(function(d){
  var s=d.tax_huvusektion;
  if(s&&!SECTIONS[s]) SECTIONS[s]=d.tax_huvudsektion_beskrivning||'';
  var k=d.tax_kat;
  if(k&&!CATEGORIES[k]) CATEGORIES[k]={
    beskrivning:d.tax_kat_beskrivning||'',forklaring:d['tax_kat_förklaring']||'',
    stod_i_lag:d['tax_kat_stöd_i_lag']||'',eu_rights:d.tax_kat_eu_digital_rights||'',
    politik:d.tax_kat_politik||'',huvudsektion:d.tax_huvusektion||'',
    huvudsektion_beskrivning:d.tax_huvudsektion_beskrivning||''
  };
});

// view modes: 'none', 'section', 'kategori', 'underkat'
var state={search:'',sectionFilter:null,luckaFilter:null,viewMode:'none',viewKey:null,selectedIdx:null};

function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

function getFiltered(){
  return DATA.filter(function(d){
    if(state.sectionFilter&&d.tax_huvusektion!==state.sectionFilter)return false;
    if(state.luckaFilter&&d.lucka_status!==state.luckaFilter)return false;
    if(state.search){var s=state.search.toLowerCase();return['taxonomi_id','kategori','tax_kat','situation_exempel','tillsynslucka','tillsynsmyndighet','lagstod','empirisk_kalla','tax_kat_beskrivning','tax_underkat_beskrivning','barriartyp'].some(function(k){return d[k]&&d[k].toLowerCase().indexOf(s)>=0})}
    return true;
  });
}

function groupBy(items){var g={};items.forEach(function(d){var k=d.tax_kat||'';if(!g[k])g[k]=[];g[k].push(d)});return g}
function politikTags(s){if(!s)return'';return s.split(/[,;]/).map(function(p){return'<span class="ptag">'+esc(p.trim())+'</span>'}).join('')}
function katId(s){var m=(s||'').match(/^[\d.]+/);return m?m[0].replace(/\.$/,''):''}
function katName(s){return(s||'').replace(/^[\d.]+\s*/,'')}

function renderList(filtered){
  var grouped=groupBy(filtered);
  var html='';
  var gkeys=Object.keys(grouped);
  gkeys.forEach(function(gk){
    var isSelKat=(state.viewMode==='kategori'&&state.viewKey===gk);
    html+='<div class="grp-hdr'+(isSelKat?' selected':'')+'" data-kat="'+esc(gk)+'">'+esc(gk)+'</div>';
    grouped[gk].forEach(function(d){
      var idx=DATA.indexOf(d);
      var isSel=(state.viewMode==='underkat'&&state.selectedIdx===idx);
      html+='<div class="cat-item'+(isSel?' selected':'')+'" data-idx="'+idx+'">';
      html+='<span class="ci-id">'+d.taxonomi_id+'</span>';
      html+='<span class="ci-name">'+esc(d.kategori)+'</span>';
      html+='<span class="ci-dot '+d.lucka_status.toLowerCase()+'"></span></div>';
    });
  });
  return html;
}

function renderSectionDetail(sectionName){
  var desc=SECTIONS[sectionName]||'';
  var st=SECTION_TEXTS[sectionName];
  var kats=[];
  Object.keys(CATEGORIES).forEach(function(k){if(CATEGORIES[k].huvudsektion===sectionName)kats.push(k)});
  kats.sort();
  var ukCount=DATA.filter(function(d){return d.tax_huvusektion===sectionName}).length;

  var html='<div class="d-hdr">';
  html+='<div class="d-id">Huvudsektion</div>';
  html+='<div class="d-title">'+esc(sectionName)+'</div>';
  if(st&&st.ingress) html+='<div class="d-desc" style="font-weight:500;margin-bottom:8px">'+esc(st.ingress)+'</div>';
  html+='</div>';

  if(st&&st.text){
    var paragraphs=st.text.split('\n\n');
    html+='<div class="iblock">';
    paragraphs.forEach(function(p){
      if(p.trim()) html+='<div class="iblock-c" style="margin-bottom:12px">'+esc(p.trim())+'</div>';
    });
    html+='</div>';
  }

  html+='<div style="margin-top:8px;padding-top:16px;border-top:1px solid var(--border-light)">';
  html+='<div class="iblock-t" style="margin-bottom:14px">Kategorier ('+kats.length+') \u00b7 '+ukCount+' underkategorier</div>';
  kats.forEach(function(k){
    var c=CATEGORIES[k];
    var count=DATA.filter(function(d){return d.tax_kat===k}).length;
    html+='<div style="background:var(--surface2);border-radius:6px;padding:14px 18px;margin-bottom:10px;cursor:pointer" data-kat-click="'+esc(k)+'">';
    html+='<div style="font-size:12px;font-weight:600;color:var(--accent)">'+katId(k)+'</div>';
    html+='<div style="font-family:Source Serif 4,serif;font-size:15px;font-weight:600;margin:2px 0 4px">'+esc(katName(k))+'</div>';
    html+='<div style="font-size:12.5px;color:var(--text-dim);line-height:1.5">'+esc(c.beskrivning)+'</div>';
    html+='<div style="font-size:11px;color:var(--text-muted);margin-top:4px">'+count+' underkategorier</div>';
    html+='</div>';
  });
  html+='</div>';
  return html;
}

function renderKategoriDetail(katKey){
  var c=CATEGORIES[katKey];
  if(!c)return'';
  var underkats=DATA.filter(function(d){return d.tax_kat===katKey});
  var jaCount=underkats.filter(function(d){return d.lucka_status==='Ja'}).length;
  var delvisCount=underkats.filter(function(d){return d.lucka_status==='Delvis'}).length;

  var html='<div class="d-hdr">';
  html+='<div class="d-id">'+esc(c.huvudsektion)+' \u203A Kategori</div>';
  html+='<div class="d-title">'+esc(katKey)+'</div>';
  html+='<div class="d-desc">'+esc(c.beskrivning)+'</div>';
  if(jaCount||delvisCount){
    html+='<div class="d-tags" style="margin-top:10px">';
    if(jaCount)html+='<span class="mtag ja">'+jaCount+' tillsynsluckor</span>';
    if(delvisCount)html+='<span class="mtag delvis">'+delvisCount+' delvis</span>';
    html+='</div>';
  }
  html+='</div>';

  if(c.forklaring){
    html+='<div class="iblock"><div class="iblock-t">\u25C8 F\u00f6rklaring</div>';
    html+='<div class="iblock-c">'+esc(c.forklaring)+'</div></div>';
  }
  if(c.stod_i_lag){
    html+='<div class="law-box"><div class="iblock-t">\u00A7 St\u00f6d i lag</div>';
    html+='<div class="iblock-c" style="font-size:12.5px">'+esc(c.stod_i_lag)+'</div></div>';
  }
  if(c.eu_rights){
    html+='<div class="eu-box"><div class="iblock-t">\u2605 EU digitala r\u00e4ttigheter</div>';
    html+='<div class="iblock-c" style="font-size:12.5px">'+esc(c.eu_rights)+'</div></div>';
  }
  if(c.politik){
    html+='<div class="iblock"><div class="iblock-t">Politikomr\u00e5de</div><div>'+politikTags(c.politik)+'</div></div>';
  }

  html+='<div style="margin-top:20px;padding-top:14px;border-top:1px solid var(--border-light)">';
  html+='<div class="iblock-t">Underkategorier ('+underkats.length+')</div>';
  html+='<div class="uk-list-compact">';
  underkats.forEach(function(d){
    var idx=DATA.indexOf(d);
    html+='<div class="cat-item" data-idx="'+idx+'" style="border-radius:5px;margin-bottom:4px">';
    html+='<span class="ci-id">'+d.taxonomi_id+'</span>';
    html+='<span class="ci-name">'+esc(d.kategori)+'</span>';
    html+='<span class="ci-dot '+d.lucka_status.toLowerCase()+'"></span></div>';
  });
  html+='</div></div>';
  return html;
}

function renderUnderkatDetail(idx){
  var d=DATA[idx];
  if(!d)return'';
  var luckaLabel=d.lucka_status==='Ja'?'\u25CF Tillsynslucka':d.lucka_status==='Delvis'?'\u25D0 Delvis lucka':'\u25CB Tillsyn finns';

  var html='<div class="d-hdr">';
  html+='<div class="d-id" style="cursor:pointer" data-nav-kat="'+esc(d.tax_kat)+'">'+esc(d.tax_huvusektion)+' \u203A '+esc(d.tax_kat)+' \u203A</div>';
  html+='<div class="d-title">'+d.taxonomi_id+' '+esc(d.kategori)+'</div>';
  if(d.tax_underkat_beskrivning) html+='<div class="d-desc">'+esc(d.tax_underkat_beskrivning)+'</div>';
  html+='<div class="d-tags">';
  if(d.barriartyp)html+='<span class="mtag">'+esc(d.barriartyp)+'</span>';
  if(d.tillsynstyp)html+='<span class="mtag">'+esc(d.tillsynstyp)+'</span>';
  html+='<span class="mtag '+d.lucka_status.toLowerCase()+'">'+luckaLabel+'</span></div></div>';

  if(d.situation_exempel){
    html+='<div class="iblock"><div class="iblock-t">Situationsexempel</div>';
    html+='<div class="sit-quote">'+esc(d.situation_exempel)+'</div></div>';
  }

  html+='<div class="lucka-box '+d.lucka_status.toLowerCase()+'">';
  html+='<div class="iblock-t">Tillsynslucka</div>';
  html+='<div class="iblock-c" style="font-size:12.5px">'+esc(d.tillsynslucka)+'</div></div>';

  if(d.lagstod){
    html+='<div class="iblock"><div class="iblock-t">\u00A7 Lagst\u00f6d</div>';
    html+='<div class="iblock-c" style="font-size:12.5px">'+esc(d.lagstod)+'</div></div>';
  }

  html+='<div class="dgrid">';
  if(d.radgivning)html+='<div class="dcard"><div class="iblock-t">R\u00e5dgivning</div><div class="iblock-c">'+esc(d.radgivning)+'</div></div>';
  if(d.tvist)html+='<div class="dcard"><div class="iblock-t">Tvist</div><div class="iblock-c">'+esc(d.tvist)+'</div></div>';
  if(d.tillsynsmyndighet)html+='<div class="dcard"><div class="iblock-t">Tillsynsmyndighet</div><div class="iblock-c">'+esc(d.tillsynsmyndighet)+'</div></div>';
  html+='</div>';

  if(d.empirisk_kalla){
    html+='<div class="iblock" style="margin-top:14px"><div class="iblock-t">Empiriska k\u00e4llor</div>';
    html+='<div class="emp-scroll">'+esc(d.empirisk_kalla)+'</div></div>';
  }

  // Collapsed category context
  var c=CATEGORIES[d.tax_kat];
  if(c){
    html+='<div style="margin-top:20px;padding-top:14px;border-top:1px solid var(--border-light)">';
    html+='<button class="collapse-btn" id="toggleCtx">\u25B6 Visa kategori</button>';
    html+='<div class="collapsed" id="katCtx">';
    if(c.beskrivning){html+='<div class="iblock" style="margin-top:12px"><div class="iblock-t">Kategori: '+esc(d.tax_kat)+'</div><div class="iblock-c" style="font-style:italic;color:var(--text-dim)">'+esc(c.beskrivning)+'</div></div>';}
    if(c.forklaring){html+='<div class="iblock"><div class="iblock-t">\u25C8 F\u00f6rklaring</div><div class="iblock-c" style="font-size:12.5px;color:var(--text-dim)">'+esc(c.forklaring)+'</div></div>';}
    if(c.stod_i_lag){html+='<div class="law-box"><div class="iblock-t">\u00A7 Laggrund (kategori)</div><div class="iblock-c" style="font-size:12.5px">'+esc(c.stod_i_lag)+'</div></div>';}
    if(c.eu_rights){html+='<div class="eu-box"><div class="iblock-t">\u2605 EU digitala r\u00e4ttigheter</div><div class="iblock-c" style="font-size:12.5px">'+esc(c.eu_rights)+'</div></div>';}
    if(c.politik){html+='<div class="iblock"><div class="iblock-t">Politikomr\u00e5de</div><div>'+politikTags(c.politik)+'</div></div>';}
    html+='</div></div>';
  }
  return html;
}


function renderAbout(){
  var html='<div style="max-width:720px">';
  ABOUT_SECTIONS.forEach(function(s,i){
    if(i===0){
      html+='<div style="margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border-light)">';
      html+='<div class="d-title" style="font-size:22px;margin-bottom:12px">'+esc(s.title)+'</div>';
      html+='<div class="iblock-c" style="font-size:14px;line-height:1.7;color:var(--text-dim)">'+esc(s.text).replace(/\n\n/g,'</div><div class="iblock-c" style="font-size:14px;line-height:1.7;color:var(--text-dim);margin-top:12px">')+'</div>';
      html+='</div>';
    } else {
      html+='<div class="iblock" style="margin-bottom:20px">';
      html+='<div style="font-family:Source Serif 4,serif;font-size:16px;font-weight:600;margin-bottom:8px">'+esc(s.title)+'</div>';
      html+='<div class="iblock-c" style="font-size:13.5px;line-height:1.7">'+esc(s.text).replace(/\n\n/g,'</div><div class="iblock-c" style="font-size:13.5px;line-height:1.7;margin-top:10px">')+'</div>';
      html+='</div>';
    }
  });
  html+='</div>';
  return html;
}

function render(){
  var filtered=getFiltered();
  var html='<header><h1>Samh\u00e4llskontraktet i en digital tid</h1>';
  html+='<p style="display:flex;justify-content:space-between;align-items:center"><span>Taxonomi v1.4 \u2014 75 underkategorier \u00b7 18 huvudkategorier \u00b7 3 sektioner</span><button class="fbtn" id="aboutBtn" style="font-size:12px;padding:6px 14px">Om ramverket</button></p></header>';

  html+='<div class="stats">';
  html+='<div class="stat total"><div class="stat-val">'+counts.total+'</div><div class="stat-label">Kategorier</div></div>';
  html+='<div class="stat ja"><div class="stat-val">'+counts.ja+'</div><div class="stat-label">Tillsynslucka</div></div>';
  html+='<div class="stat delvis"><div class="stat-val">'+counts.delvis+'</div><div class="stat-label">Delvis</div></div>';
  html+='<div class="stat nej"><div class="stat-val">'+counts.nej+'</div><div class="stat-label">Tillsyn finns</div></div></div>';

  html+='<div class="controls"><div class="search-box"><input type="text" placeholder="S\u00f6k i taxonomin..." value="'+esc(state.search)+'" id="si"></div>';
  html+='<div class="fg"><span class="fg-label">Sektion</span>';
  ['Systembarri\u00e4rer','S\u00e5rbarheter','Kompetens och delaktighet'].forEach(function(s){
    var label=s==='Kompetens och delaktighet'?'Kompetens':s;
    html+='<button class="fbtn sec-btn'+(state.sectionFilter===s?' active':'')+'" data-sec="'+s+'">'+label+'</button>';
  });
  html+='</div><div class="fg"><span class="fg-label">Lucka</span>';
  [['Ja','Tillsynslucka'],['Delvis','Delvis'],['Nej','Tillsyn finns']].forEach(function(p){
    html+='<button class="fbtn'+(state.luckaFilter===p[0]?' active':'')+'" data-lucka="'+p[0]+'">'+p[1]+'</button>';
  });
  html+='</div></div>';

  html+='<div class="main"><div class="catlist">'+renderList(filtered)+'</div>';
  html+='<div class="detail">';

  if(state.viewMode==='about') html+=renderAbout();
  else if(state.viewMode==='section') html+=renderSectionDetail(state.viewKey);
  else if(state.viewMode==='kategori') html+=renderKategoriDetail(state.viewKey);
  else if(state.viewMode==='underkat'&&state.selectedIdx!==null) html+=renderUnderkatDetail(state.selectedIdx);
  else html+='<div class="d-empty">V\u00e4lj en sektion, kategori eller underkategori<br>i listan till v\u00e4nster</div>';

  html+='</div></div>';
  html+='<footer>DigidelGov \u2014 Samh\u00e4llskontraktet i en digital tid \u2014 Taxonomi v1.4 + Tillsynslager</footer>';

  document.getElementById('app').innerHTML=html;
  attachEvents();
}

function attachEvents(){
  var si=document.getElementById('si');
  if(si) si.addEventListener('input',function(){state.search=this.value;render();var el=document.getElementById('si');el.focus();el.setSelectionRange(state.search.length,state.search.length)});

  var secBtns=document.querySelectorAll('.sec-btn');
  for(var i=0;i<secBtns.length;i++) secBtns[i].addEventListener('click',function(){
    var s=this.getAttribute('data-sec');
    if(state.sectionFilter===s){state.sectionFilter=null;state.viewMode='none';state.viewKey=null}
    else{state.sectionFilter=s;state.viewMode='section';state.viewKey=s}
    state.selectedIdx=null;render();
  });

  var lBtns=document.querySelectorAll('[data-lucka]');
  for(var i=0;i<lBtns.length;i++) lBtns[i].addEventListener('click',function(){
    var v=this.getAttribute('data-lucka');
    state.luckaFilter=state.luckaFilter===v?null:v;state.selectedIdx=null;state.viewMode='none';render();
  });

  var grpHdrs=document.querySelectorAll('.grp-hdr');
  for(var i=0;i<grpHdrs.length;i++) grpHdrs[i].addEventListener('click',function(){
    state.viewMode='kategori';state.viewKey=this.getAttribute('data-kat');state.selectedIdx=null;render();
    document.querySelector('.detail').scrollTop=0;
  });

  var items=document.querySelectorAll('.cat-item[data-idx]');
  for(var i=0;i<items.length;i++) items[i].addEventListener('click',function(e){
    e.stopPropagation();
    state.viewMode='underkat';state.selectedIdx=parseInt(this.getAttribute('data-idx'));render();
    document.querySelector('.detail').scrollTop=0;
  });

  // Kat clicks inside detail panel
  var katClicks=document.querySelectorAll('[data-kat-click]');
  for(var i=0;i<katClicks.length;i++) katClicks[i].addEventListener('click',function(){
    state.viewMode='kategori';state.viewKey=this.getAttribute('data-kat-click');state.selectedIdx=null;render();
    document.querySelector('.detail').scrollTop=0;
  });

  var navKat=document.querySelectorAll('[data-nav-kat]');
  for(var i=0;i<navKat.length;i++) navKat[i].addEventListener('click',function(){
    state.viewMode='kategori';state.viewKey=this.getAttribute('data-nav-kat');state.selectedIdx=null;render();
    document.querySelector('.detail').scrollTop=0;
  });

  var aboutBtn=document.getElementById('aboutBtn');
  if(aboutBtn) aboutBtn.addEventListener('click',function(){
    if(state.viewMode==='about'){state.viewMode='none';state.viewKey=null}
    else{state.viewMode='about';state.viewKey=null;state.selectedIdx=null;state.sectionFilter=null;state.luckaFilter=null}
    render();document.querySelector('.detail').scrollTop=0;
  });

  var tog=document.getElementById('toggleCtx');
  if(tog) tog.addEventListener('click',function(){
    var ctx=document.getElementById('katCtx');
    if(ctx.classList.contains('collapsed')){ctx.classList.remove('collapsed');tog.textContent='\u25BC D\u00f6lj kategori'}
    else{ctx.classList.add('collapsed');tog.textContent='\u25B6 Visa kategori'}
  });
}

render();
</script>
</body>
</html>
